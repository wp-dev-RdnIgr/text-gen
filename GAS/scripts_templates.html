<script>
// ===========================================
// scripts_templates.html — Шаблони задач
// ===========================================

// --- Temp storage for editing ---
var _tplFlexBlocks = [];

function renderTemplateList() {
  var c = document.getElementById('template-list');
  if (!c) return;
  var tts = state.taskTemplates || [];
  if (!tts.length) {
    c.innerHTML = '<div class="placeholder-message" style="height:100px"><p>Немає шаблонів</p></div>';
    return;
  }
  var h = '';
  tts.forEach(function(tt) {
    var active = tt.id == state.selectedTemplateId ? ' active' : '';
    var clientCount = (tt.client_ids || []).length;
    var metaExtra = clientCount ? ' · ' + clientCount + ' кл.' : '';
    h += '<div class="template-item' + active + '" onclick="selectTemplate(\'' + tt.id + '\')">' +
      '<div class="template-item-name">' + escapeHtml(tt.name) + '</div>' +
      '<div class="template-item-meta">' + escapeHtml(tt.llm_model || '—') + metaExtra + '</div>' +
    '</div>';
  });
  c.innerHTML = h;
}

function filterTemplates(q) {
  var items = document.querySelectorAll('#template-list .template-item');
  q = q.toLowerCase();
  for (var i = 0; i < items.length; i++) {
    var name = items[i].querySelector('.template-item-name').textContent.toLowerCase();
    items[i].style.display = name.indexOf(q) !== -1 ? '' : 'none';
  }
}

function selectTemplate(ttId) {
  state.selectedTemplateId = ttId;
  var tt = (state.taskTemplates || []).find(function(x) { return x.id == ttId; });
  if (!tt) return;

  renderTemplateList();
  document.getElementById('template-placeholder').style.display = 'none';
  document.getElementById('template-editor-content').style.display = 'block';

  document.getElementById('tpl-name').value = tt.name || '';
  document.getElementById('tpl-description').value = tt.description || '';
  document.getElementById('tpl-system-prompt').value = tt.system_prompt || '';
  document.getElementById('tpl-user-prompt').value = tt.user_prompt || '';

  if (tt.llm_provider && tt.llm_model) {
    document.getElementById('tpl-llm-select').value = tt.llm_provider + '|' + tt.llm_model;
  }

  var opts = tt.options || {};
  document.getElementById('tpl-opt-humanize').checked = !!opts.humanize;
  document.getElementById('tpl-opt-uniqueness').checked = !!opts.uniqueness;
  document.getElementById('tpl-opt-factcheck').checked = !!opts.factcheck;
  document.getElementById('tpl-opt-ai-detector').checked = !!opts.ai_detector;

  // Client IDs
  state.tplClientIds = (tt.client_ids || []).slice();
  renderTplClientMultiselect();

  // Core fields config
  var cf = tt.core_fields || { url: true, keywords: true, topic: true, language: true, volume: true };
  document.getElementById('tpl-cf-url').checked = !!cf.url;
  document.getElementById('tpl-cf-keywords').checked = !!cf.keywords;
  document.getElementById('tpl-cf-topic').checked = !!cf.topic;
  document.getElementById('tpl-cf-language').checked = !!cf.language;
  document.getElementById('tpl-cf-volume').checked = !!cf.volume;

  // Flex blocks
  _tplFlexBlocks = (tt.flex_blocks || []).map(function(b) { return { key: b.key, label: b.label, type: b.type, enabled: b.enabled }; });
  renderTplFlexBlocksList();
}

function createNewTemplate() {
  state.selectedTemplateId = null;
  state.tplClientIds = [];
  _tplFlexBlocks = [
    { key: 'h2_structure', label: 'Структура H2', type: 'repeatable', enabled: true },
    { key: 'links', label: 'Обов\'язкові посилання', type: 'repeatable', enabled: false },
    { key: 'company_block', label: 'Блок про компанію', type: 'textarea', enabled: false },
    { key: 'expert_block', label: 'Блок про експерта', type: 'textarea', enabled: false },
    { key: 'notes', label: 'Примітки редактору', type: 'textarea', enabled: false }
  ];

  renderTemplateList();
  document.getElementById('template-placeholder').style.display = 'none';
  document.getElementById('template-editor-content').style.display = 'block';

  document.getElementById('tpl-name').value = '';
  document.getElementById('tpl-description').value = '';
  document.getElementById('tpl-system-prompt').value = '';
  document.getElementById('tpl-user-prompt').value = '';
  document.getElementById('tpl-llm-select').value = 'anthropic|Claude Sonnet';
  document.getElementById('tpl-opt-humanize').checked = false;
  document.getElementById('tpl-opt-uniqueness').checked = true;
  document.getElementById('tpl-opt-factcheck').checked = false;
  document.getElementById('tpl-opt-ai-detector').checked = false;

  document.getElementById('tpl-cf-url').checked = true;
  document.getElementById('tpl-cf-keywords').checked = true;
  document.getElementById('tpl-cf-topic').checked = true;
  document.getElementById('tpl-cf-language').checked = true;
  document.getElementById('tpl-cf-volume').checked = true;

  renderTplClientMultiselect();
  renderTplFlexBlocksList();
}

// --- Client multiselect ---
function renderTplClientMultiselect() {
  var opts = document.getElementById('tpl-client-ms-options');
  if (!opts) return;
  var h = '';
  (state.clients || []).forEach(function(cl) {
    var checked = state.tplClientIds.indexOf(cl.id) !== -1 ? ' checked' : '';
    h += '<label class="multiselect-option"><input type="checkbox" value="' + cl.id + '"' + checked + ' onchange="onTplClientChange()">' + escapeHtml(cl.name) + '</label>';
  });
  if (!state.clients.length) h = '<div style="padding:8px 12px;color:var(--text-muted);font-size:12px;">Немає клієнтів</div>';
  opts.innerHTML = h;
  updateTplClientLabel();
}

function onTplClientChange() {
  state.tplClientIds = getMultiselectSelected('tpl-client-ms-options');
  updateTplClientLabel();
}

function updateTplClientLabel() {
  var label = document.getElementById('tpl-client-ms-label');
  if (!label) return;
  if (state.tplClientIds.length === 0) {
    label.textContent = 'Всі клієнти';
    label.className = 'multiselect-placeholder';
  } else {
    var names = state.tplClientIds.map(function(id) {
      var cl = (state.clients || []).find(function(c) { return c.id == id; });
      return cl ? cl.name : '';
    }).join(', ');
    label.textContent = names;
    label.className = 'multiselect-placeholder has-selection';
  }
}

// --- Core fields config ---
function onTplCoreFieldChange() {
  // just stored in checkboxes, read at save time
}

function getTplCoreFields() {
  return {
    url: document.getElementById('tpl-cf-url').checked,
    keywords: document.getElementById('tpl-cf-keywords').checked,
    topic: document.getElementById('tpl-cf-topic').checked,
    language: document.getElementById('tpl-cf-language').checked,
    volume: document.getElementById('tpl-cf-volume').checked
  };
}

// --- Flex blocks config ---
function renderTplFlexBlocksList() {
  var c = document.getElementById('tpl-flex-blocks-list');
  if (!c) return;
  if (!_tplFlexBlocks.length) {
    c.innerHTML = '<div class="text-secondary" style="padding:8px 0;">Немає блоків</div>';
    return;
  }
  var typeLabels = { textarea: 'текст', repeatable: 'список' };
  var h = '';
  _tplFlexBlocks.forEach(function(b, i) {
    h += '<div class="tpl-flex-item">' +
      '<label class="checkbox-label" style="margin:0;padding:0;"><input type="checkbox"' + (b.enabled ? ' checked' : '') + ' onchange="toggleTplFlexEnabled(' + i + ',this.checked)"></label>' +
      '<span class="tpl-flex-item-name">' + escapeHtml(b.label) + '</span>' +
      '<span class="tpl-flex-item-type">' + (typeLabels[b.type] || b.type) + '</span>' +
      '<span class="tpl-flex-item-var">{{' + b.key + '}}</span>' +
      '<button class="tpl-flex-remove" onclick="removeTplFlexBlock(' + i + ')" title="Видалити">&times;</button>' +
    '</div>';
  });
  c.innerHTML = h;
}

function toggleTplFlexEnabled(index, checked) {
  if (_tplFlexBlocks[index]) _tplFlexBlocks[index].enabled = checked;
}

function removeTplFlexBlock(index) {
  _tplFlexBlocks.splice(index, 1);
  renderTplFlexBlocksList();
}

// --- Імпорт з Google Sheets ---
var _importedHeaders = [];

function openImportSheetModal() {
  document.getElementById('import-step-url').style.display = 'block';
  document.getElementById('import-step-select').style.display = 'none';
  document.getElementById('import-accept-btn').style.display = 'none';
  document.getElementById('import-sheet-url').value = '';
  document.getElementById('import-sheet-loading').style.display = 'none';
  document.getElementById('import-sheet-btn').style.display = 'block';
  _importedHeaders = [];
  openModal('modal-import-sheet');
}

function importSheetHeaders() {
  var url = document.getElementById('import-sheet-url').value.trim();
  if (!url) { showToast('Вставте посилання', 'error'); return; }

  document.getElementById('import-sheet-btn').style.display = 'none';
  document.getElementById('import-sheet-loading').style.display = 'block';

  google.script.run.withSuccessHandler(function(headers) {
    _importedHeaders = headers;
    document.getElementById('import-sheet-loading').style.display = 'none';
    document.getElementById('import-step-url').style.display = 'none';
    document.getElementById('import-step-select').style.display = 'block';
    document.getElementById('import-accept-btn').style.display = 'inline-block';

    // Рендер чекбоксів
    var h = '';
    headers.forEach(function(header, i) {
      h += '<label class="checkbox-label" style="padding:7px 0;border-bottom:1px solid var(--border-light);">' +
        '<input type="checkbox" checked value="' + i + '"> ' + escapeHtml(header) +
      '</label>';
    });
    document.getElementById('import-columns-list').innerHTML = h;

    showToast('Знайдено ' + headers.length + ' колонок', 'success');
  }).withFailureHandler(function(e) {
    document.getElementById('import-sheet-loading').style.display = 'none';
    document.getElementById('import-sheet-btn').style.display = 'block';
    showToast(e.message, 'error');
  }).getSheetHeaders(url);
}

function acceptImportedColumns() {
  var checkboxes = document.querySelectorAll('#import-columns-list input[type="checkbox"]');
  var selected = [];
  for (var i = 0; i < checkboxes.length; i++) {
    if (checkboxes[i].checked) {
      var idx = parseInt(checkboxes[i].value);
      selected.push(_importedHeaders[idx]);
    }
  }

  if (!selected.length) { showToast('Оберіть хоча б одну колонку', 'error'); return; }

  // Замінити всі поточні flex-блоки на обрані
  _tplFlexBlocks = selected.map(function(header) {
    var key = generateFlexKey(header);
    return { key: key, label: header, type: 'textarea', enabled: true };
  });

  renderTplFlexBlocksList();
  closeModal('modal-import-sheet');
  showToast(selected.length + ' блоків імпортовано', 'success');
}

function addTplFlexBlock() {
  var label = prompt('Назва нового блоку:');
  if (!label || !label.trim()) return;
  label = label.trim();
  var type = prompt('Тип блоку: textarea (текст) або repeatable (список):', 'textarea');
  if (type !== 'textarea' && type !== 'repeatable') type = 'textarea';

  var key = generateFlexKey(label);
  var exists = _tplFlexBlocks.some(function(b) { return b.key === key; });
  if (exists) key = key + '_' + Date.now();

  _tplFlexBlocks.push({ key: key, label: label, type: type, enabled: true });
  renderTplFlexBlocksList();
}

// --- Save / Delete / Duplicate ---
function saveCurrentTemplate() {
  var name = document.getElementById('tpl-name').value.trim();
  if (!name) { showToast('Вкажіть назву', 'error'); return; }

  var lSel = document.getElementById('tpl-llm-select');
  var parts = lSel.value.split('|');

  var userPrompt = document.getElementById('tpl-user-prompt').value;
  var systemPrompt = document.getElementById('tpl-system-prompt').value;
  var coreFields = getTplCoreFields();

  // Перевірка: чи всі {{ключі}} у шаблоні існують як core_field або flex_block
  var unknownKeys = [];
  var allText = userPrompt + '\n' + systemPrompt;
  var matches = allText.match(/\{\{(\w+)\}\}/g) || [];
  var seen = {};
  var validKeys = {};
  Object.keys(coreFields).forEach(function(k) { if (coreFields[k]) validKeys[k] = true; });
  _tplFlexBlocks.forEach(function(b) { validKeys[b.key] = true; });
  matches.forEach(function(m) {
    var key = m.replace(/[\{\}]/g, '');
    if (seen[key]) return;
    seen[key] = true;
    if (!validKeys[key]) unknownKeys.push(key);
  });
  if (unknownKeys.length) {
    var msg = 'У промптах є змінні, які не існують у ядрових полях чи гнучких блоках:\n\n' +
      unknownKeys.map(function(k) { return '• {{' + k + '}}'; }).join('\n') +
      '\n\nВони замінються на порожні рядки при генерації.\n\nЗберегти все одно?';
    if (!confirm(msg)) return;
  }

  var data = {
    name: name,
    description: document.getElementById('tpl-description').value.trim(),
    system_prompt: systemPrompt,
    user_prompt: userPrompt,
    client_ids: state.tplClientIds,
    core_fields: coreFields,
    flex_blocks: _tplFlexBlocks,
    llm_provider: parts[0] || '',
    llm_model: parts[1] || '',
    options: {
      humanize: document.getElementById('tpl-opt-humanize').checked,
      uniqueness: document.getElementById('tpl-opt-uniqueness').checked,
      factcheck: document.getElementById('tpl-opt-factcheck').checked,
      ai_detector: document.getElementById('tpl-opt-ai-detector').checked
    }
  };

  if (state.selectedTemplateId) data.id = state.selectedTemplateId;

  google.script.run.withSuccessHandler(function(s) {
    showToast('Шаблон збережено', 'success');
    state.selectedTemplateId = s.id;
    google.script.run.withSuccessHandler(function(list) {
      state.taskTemplates = list || [];
      renderTemplateList();
      selectTemplate(s.id);
    }).getTaskTemplates();
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).saveTaskTemplate(data);
}

function deleteCurrentTemplate() {
  if (!state.selectedTemplateId) return;
  if (!confirm('Видалити шаблон?')) return;
  google.script.run.withSuccessHandler(function() {
    showToast('Шаблон видалено', 'success');
    state.selectedTemplateId = null;
    document.getElementById('template-editor-content').style.display = 'none';
    document.getElementById('template-placeholder').style.display = 'flex';
    google.script.run.withSuccessHandler(function(list) {
      state.taskTemplates = list || [];
      renderTemplateList();
    }).getTaskTemplates();
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).deleteTaskTemplate(state.selectedTemplateId);
}

function duplicateTemplate() {
  if (!state.selectedTemplateId) return;
  var tt = (state.taskTemplates || []).find(function(x) { return x.id == state.selectedTemplateId; });
  if (!tt) return;
  var data = {
    name: tt.name + ' (копія)',
    description: tt.description || '',
    system_prompt: tt.system_prompt || '',
    user_prompt: tt.user_prompt || '',
    client_ids: (tt.client_ids || []).slice(),
    core_fields: tt.core_fields || {},
    flex_blocks: (tt.flex_blocks || []).map(function(b) { return { key: b.key, label: b.label, type: b.type, enabled: b.enabled }; }),
    llm_provider: tt.llm_provider || '',
    llm_model: tt.llm_model || '',
    options: tt.options || {}
  };
  google.script.run.withSuccessHandler(function(s) {
    showToast('Шаблон скопійовано', 'success');
    google.script.run.withSuccessHandler(function(list) {
      state.taskTemplates = list || [];
      renderTemplateList();
      selectTemplate(s.id);
    }).getTaskTemplates();
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).saveTaskTemplate(data);
}
</script>
