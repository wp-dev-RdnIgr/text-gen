<script>
// ===========================================
// scripts_clients.html — Керування клієнтами
// ===========================================

// Legacy no-op (викликається зі старих шляхів; dashboard sidebar більше не існує)
function renderClientList() {
  var c = document.getElementById('client-list');
  if (!c) return;
  if (!state.clients.length) {
    c.innerHTML = '<div class="placeholder-message" style="height:100px"><p>Немає клієнтів</p></div>';
    return;
  }
  var h = '';
  state.clients.forEach(function(cl) {
    h += '<div class="client-item" onclick="openClientTasks(\'' + cl.id + '\')">' +
      '<div class="client-item-name">' + escapeHtml(cl.name) + '</div>' +
    '</div>';
  });
  c.innerHTML = h;
}

// Legacy alias — тепер веде на розділ Задачі з фільтром по клієнту
function selectClient(clientId) {
  state.selectedClientId = clientId;
}

// Clicking client card → opens Tasks page filtered by this client
function openClientTasks(clientId) {
  state.filterClientId = clientId;
  navigateTo('#tasks');
}

// --- Client modal ---
function openClientModal(clientId) {
  var t = document.getElementById('modal-client-title');
  document.getElementById('mc-id').value = '';
  document.getElementById('mc-name').value = '';
  document.getElementById('mc-domain').value = '';
  document.getElementById('mc-niche').value = '';
  document.getElementById('mc-description').value = '';

  if (clientId) {
    t.textContent = 'Редагувати клієнта';
    var cl = state.clients.find(function(c) { return c.id == clientId; });
    if (cl) {
      document.getElementById('mc-id').value = cl.id;
      document.getElementById('mc-name').value = cl.name || '';
      document.getElementById('mc-domain').value = cl.website || '';
      document.getElementById('mc-niche').value = cl.niche || '';
      document.getElementById('mc-description').value = cl.notes || '';
    }
  } else {
    t.textContent = 'Новий клієнт';
  }
  openModal('modal-client');
}

function saveClientFromModal() {
  var d = {
    name: document.getElementById('mc-name').value.trim(),
    website: document.getElementById('mc-domain').value.trim(),
    niche: document.getElementById('mc-niche').value.trim(),
    notes: document.getElementById('mc-description').value.trim()
  };
  if (!d.name) { showToast('Вкажіть назву', 'error'); return; }
  var id = document.getElementById('mc-id').value;
  if (id) d.id = id;

  google.script.run.withSuccessHandler(function() {
    closeModal('modal-client');
    showToast(id ? 'Клієнта оновлено' : 'Клієнта створено', 'success');
    invalidateClientsCache();
    invalidateTasksCache();
    loadInitialData();
    // Перерендер сторінки клієнтів якщо ми на ній
    if (window.location.hash === '#clients') {
      setTimeout(renderClientsTable, 300);
    }
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).saveClient(d);
}

function deleteClientConfirm(cid) {
  if (!confirm('Видалити клієнта та всі його задачі?')) return;

  // Optimistic: одразу видаляємо з UI
  var backup = (state.clients || []).slice();
  state.clients = state.clients.filter(function(c) { return String(c.id) !== String(cid); });
  if (typeof updateSidebarCounts === 'function') updateSidebarCounts();
  if (window.location.hash === '#clients' && typeof renderClientsGrid === 'function') renderClientsGrid();

  // Також з кешу задач
  invalidateTasksCache();
  state.allTasks = (state.allTasks || []).filter(function(t) { return String(t._clientId) !== String(cid); });

  google.script.run.withSuccessHandler(function() {
    showToast('Клієнта видалено', 'success');
    state.selectedClientId = null;
    state._clientsFetchedAt = Date.now(); // кеш залишається актуальним після optimistic update
  }).withFailureHandler(function(e) {
    // Rollback
    state.clients = backup;
    if (typeof updateSidebarCounts === 'function') updateSidebarCounts();
    if (typeof renderClientsGrid === 'function') renderClientsGrid();
    showToast('Не вдалося видалити: ' + e.message, 'error');
  }).deleteClient(cid);
}

// --- Main render: Clients Grid ---
// (зберігаємо ім'я renderClientsTable для сумісності з роутером)
function renderClientsTable() {
  renderClientsGrid();
}

function renderClientsGrid() {
  var grid = document.getElementById('clients-grid-container');
  var empty = document.getElementById('clients-empty-state');
  if (!grid) return;

  var clients = state.clients || [];

  // Якщо клієнтів ще немає у state — показати skeleton
  if (!clients.length && !state._initialDataLoaded) {
    grid.innerHTML = skeletonClientCards(4);
    if (empty) empty.style.display = 'none';
    return;
  }

  if (!clients.length) {
    grid.innerHTML = '';
    if (empty) empty.style.display = 'flex';
    return;
  }
  if (empty) empty.style.display = 'none';

  // Якщо лічильники задач ще не завантажені і в кеші є allTasks — використати його
  var needsCounts = clients.some(function(c) { return c.tasks_count == null; });
  if (needsCounts && isCacheFresh(state._allTasksFetchedAt) && state.allTasks && state.allTasks.length) {
    var counts = {};
    state.allTasks.forEach(function(t) {
      counts[t._clientId] = (counts[t._clientId] || 0) + 1;
    });
    clients.forEach(function(c) { c.tasks_count = counts[c.id] || 0; });
    needsCounts = false;
    if (typeof updateSidebarCounts === 'function') updateSidebarCounts();
  }

  // Fallback: якщо досі немає лічильників — підвантажити у фоні (N+1)
  if (needsCounts) {
    var remaining = clients.length;
    clients.forEach(function(cl) {
      google.script.run.withSuccessHandler(function(tasks) {
        cl.tasks_count = (tasks || []).length;
        remaining--;
        if (remaining === 0) {
          if (typeof updateSidebarCounts === 'function') updateSidebarCounts();
          renderClientsGrid();
        }
      }).withFailureHandler(function() {
        remaining--;
        if (remaining === 0) renderClientsGrid();
      }).getTasks(cl.id);
    });
  }

  var h = '';
  clients.forEach(function(cl) {
    var initials = (cl.name || '?').split(' ').map(function(w) { return w.charAt(0); }).join('').substring(0, 2).toUpperCase();
    var niche = cl.niche ? escapeHtml(cl.niche) : '<span class="text-muted">Без ніші</span>';
    var domain = cl.website ? escapeHtml(cl.website) : '';
    var tasksCount = (cl.tasks_count != null) ? cl.tasks_count : '—';

    h += '<div class="client-card" data-client-id="' + cl.id + '" data-search="' + escapeHtml((cl.name || '') + ' ' + (cl.niche || '') + ' ' + (cl.website || '')).toLowerCase() + '">' +
      '<div style="display:flex; align-items:flex-start; gap:12px;">' +
        '<div style="width:40px; height:40px; border-radius:10px; background:var(--bg-subtle); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--text-secondary); flex-shrink:0;">' +
          escapeHtml(initials) +
        '</div>' +
        '<div style="flex:1; min-width:0;">' +
          '<div class="client-card-name">' + escapeHtml(cl.name) + '</div>' +
          '<div class="client-card-meta">' + niche + (domain ? ' · ' + domain : '') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="client-card-stats">' +
        '<span class="badge badge-neutral">' + tasksCount + ' задач</span>' +
      '</div>' +
      '<div class="client-card-actions">' +
        '<button class="btn btn-sm" onclick="openClientTasks(\'' + cl.id + '\')">Задачі</button>' +
        '<button class="btn btn-sm" onclick="openClientModal(\'' + cl.id + '\')">Редагувати</button>' +
        '<button class="btn btn-sm btn-danger" onclick="deleteClientConfirm(\'' + cl.id + '\')">Видалити</button>' +
      '</div>' +
    '</div>';
  });
  grid.innerHTML = h;
}

function filterClientsGrid() {
  var q = (document.getElementById('clients-grid-search') || {}).value || '';
  q = q.toLowerCase().trim();
  var cards = document.querySelectorAll('#clients-grid-container .client-card');
  var visible = 0;
  for (var i = 0; i < cards.length; i++) {
    var hay = cards[i].getAttribute('data-search') || '';
    if (!q || hay.indexOf(q) !== -1) {
      cards[i].style.display = '';
      visible++;
    } else {
      cards[i].style.display = 'none';
    }
  }
  var empty = document.getElementById('clients-empty-state');
  if (empty) empty.style.display = visible === 0 ? 'flex' : 'none';
}

// Legacy filterClients (used by dashboard inner sidebar — no-op now)
function filterClients(q) {
  // no-op
}
</script>
