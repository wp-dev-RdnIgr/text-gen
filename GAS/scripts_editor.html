<script>
// ===========================================
// scripts_editor.html - Блочный редактор текста
// ===========================================

function loadEditorScreen(taskId, textId) {
  state.editorTaskId = taskId;
  state.activeBlockIndex = -1;
  state.regenBlockIndex = -1;

  // Ссылка назад
  var backLink = document.getElementById('editor-breadcrumb-task-link');
  if (backLink) {
    backLink.setAttribute('onclick', "navigateTo('#task/" + taskId + "'); return false;");
    backLink.textContent = 'Задача';
  }

  google.script.run.withSuccessHandler(function(text) {
    if (!text) { showToast('Текст не знайдено', 'error'); return; }
    state.editorText = text;

    // Если нет блоков — парсим из контента
    if (!text.blocks || !text.blocks.length) {
      text.blocks = parseContentToBlocks(text.content);
    }

    // Завантажити назву задачі
    google.script.run.withSuccessHandler(function(task) {
      if (task) {
        backLink.textContent = task.name || 'Задача';
      }
    }).getTask(taskId);

    renderEditorMeta();
    renderEditorBlocks();
    renderEditorStats();
    hideScreenLoader();
  }).getGeneratedText(textId);
}

function navigateBackFromEditor() {
  if (state.editorTaskId) {
    navigateTo('#task/' + state.editorTaskId);
  } else {
    navigateTo('#dashboard');
  }
}

// --- Мета-информация ---
function renderEditorMeta() {
  var t = state.editorText;
  if (!t) return;
  var meta = document.getElementById('editor-meta');
  if (meta) {
    meta.textContent = formatDateTime(t.created_at) + ' · ' + (t.used_llm_model || '—');
  }
  var llmBadge = document.getElementById('editor-llm-badge');
  if (llmBadge) llmBadge.textContent = t.used_llm_model || '—';

  // Промпт
  var sp = document.getElementById('editor-system-prompt');
  var ui = document.getElementById('editor-user-input');
  if (sp) sp.textContent = t.used_system_prompt || '(пусто)';
  if (ui) ui.textContent = t.user_input || '(пусто)';
}

function saveEditorToGDoc() {
  if (!state.editorText || !state.editorText.id) {
    showToast('Немає тексту для збереження', 'error');
    return;
  }
  var btn = document.getElementById('btn-editor-save-gdoc');
  if (btn) { btn.disabled = true; btn.textContent = 'Збереження...'; }

  google.script.run.withSuccessHandler(function(url) {
    if (btn) { btn.disabled = false; btn.textContent = 'Зберегти в Google Doc'; }
    var link = document.getElementById('editor-gdoc-link');
    if (link && url) {
      link.href = url;
      link.style.display = 'inline';
    }
    showToast('Збережено в Google Doc!', 'success');
  }).withFailureHandler(function(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Зберегти в Google Doc'; }
    showToast(e.message, 'error');
  }).saveToGoogleDoc(state.editorText.id);
}

function renderEditorStats() {
  var t = state.editorText;
  if (!t) return;
  var u = document.getElementById('editor-stat-uniqueness');
  var a = document.getElementById('editor-stat-ai');
  var r = document.getElementById('editor-stat-regens');
  if (u) u.textContent = t.uniqueness_score != null ? t.uniqueness_score + '%' : '—';
  if (a) a.textContent = t.ai_score != null ? t.ai_score + '%' : '—';
  if (r) r.textContent = t.regeneration_count || 0;
}

function toggleEditorPromptInfo() {
  var el = document.getElementById('editor-prompt-info');
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// --- Рендер блоков ---
function renderEditorBlocks() {
  var container = document.getElementById('editor-blocks');
  if (!container || !state.editorText) return;

  var blocks = state.editorText.blocks || [];
  if (!blocks.length) {
    container.innerHTML = '<div class="placeholder-message" style="height:150px;"><p>Нет блоков текста</p></div>';
    return;
  }

  var h = '';
  blocks.forEach(function(block, index) {
    var isActive = state.activeBlockIndex === index;
    var activeClass = isActive ? ' active' : '';
    var content = '';

    if (block.type === 'heading') {
      content = '<' + block.tag + '>' + block.content + '</' + block.tag + '>';
    } else if (block.type === 'list') {
      content = block.content;
    } else {
      content = '<p>' + block.content + '</p>';
    }

    // Тулбар блока
    var toolbar = '<div class="block-toolbar">' +
      '<button class="block-toolbar-btn" onclick="event.stopPropagation();regenerateBlock(' + index + ')" title="Перегенерувати цей блок">&#x21bb; Перегенерувати</button>' +
      '<div class="block-toolbar-sep"></div>' +
      '<button class="block-toolbar-btn" onclick="event.stopPropagation();openBlockCommentModal(' + index + ')" title="Перегенерувати з коментарем">&#x270E; З коментарем</button>' +
      '<div class="block-toolbar-sep"></div>' +
      (index < blocks.length - 1 ?
        '<button class="block-toolbar-btn" onclick="event.stopPropagation();mergeBlocks(' + index + ')" title="Об\'єднати з наступним блоком">&#x2194; Об\'єднати</button>' +
        '<div class="block-toolbar-sep"></div>'
      : '') +
      '<button class="block-toolbar-btn" onclick="event.stopPropagation();promptSplitBlock(' + index + ')" title="Розбити блок на два">&#x2702; Розбити</button>' +
    '</div>';

    h += '<div class="editor-block' + activeClass + '" data-index="' + index + '" onclick="toggleBlock(' + index + ')">' +
      toolbar +
      content +
    '</div>';
  });

  container.innerHTML = h;
}

// --- Клик по блоку ---
function toggleBlock(index) {
  if (state.activeBlockIndex === index) {
    state.activeBlockIndex = -1;
  } else {
    state.activeBlockIndex = index;
  }
  renderEditorBlocks();
}

// --- Регенерация блока ---
function regenerateBlock(index) {
  var t = state.editorText;
  if (!t || !t.blocks || !t.blocks[index]) return;

  var blockEl = document.querySelectorAll('.editor-block')[index];
  if (blockEl) {
    blockEl.classList.add('regenerating');
    blockEl.innerHTML += '<div class="block-loader">Генерація блоку через AI...</div>';
  }

  showToast('Перегенерація блоку…', 'info');

  google.script.run.withSuccessHandler(function(updated) {
    state.editorText = updated;
    state.activeBlockIndex = -1;
    renderEditorBlocks();
    renderEditorStats();
    showToast('Блок перегенеровано', 'success');
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
    state.activeBlockIndex = -1;
    renderEditorBlocks();
  }).regenerateBlockWithAI(t.id, index, '');
}

// --- Регенерация блока с комментарием ---
function openBlockCommentModal(index) {
  state.regenBlockIndex = index;
  var t = state.editorText;
  if (!t || !t.blocks || !t.blocks[index]) return;

  var preview = document.getElementById('block-comment-preview');
  if (preview) {
    preview.textContent = truncate(t.blocks[index].content, 200);
  }
  document.getElementById('block-comment-text').value = '';
  openModal('modal-block-comment');
}

function confirmBlockRegeneration() {
  var comment = document.getElementById('block-comment-text').value.trim();
  closeModal('modal-block-comment');

  var index = state.regenBlockIndex;
  if (index < 0) return;

  var t = state.editorText;
  if (!t || !t.blocks || !t.blocks[index]) return;

  var block = t.blocks[index];
  var blockEl = document.querySelectorAll('.editor-block')[index];
  if (blockEl) {
    blockEl.classList.add('regenerating');
    blockEl.innerHTML += '<div class="block-loader">Генерация с комментарием...</div>';
  }

  showToast('Перегенерація блоку' + (comment ? ' з коментарем…' : '…'), 'info');

  google.script.run.withSuccessHandler(function(updated) {
    state.editorText = updated;
    state.activeBlockIndex = -1;
    state.regenBlockIndex = -1;
    renderEditorBlocks();
    renderEditorStats();
    showToast('Блок перегенеровано', 'success');
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
    state.activeBlockIndex = -1;
    renderEditorBlocks();
  }).regenerateBlockWithAI(t.id, index, comment);
}

// --- Повна перегенерація ---
function regenerateFullText() {
  if (!confirm('Перегенерувати весь текст? Поточний текст буде замінено.')) return;

  var t = state.editorText;
  if (!t) return;

  var container = document.getElementById('editor-blocks');
  if (container) {
    container.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;padding:60px;">' +
      '<div class="loader-dots"><span></span><span></span><span></span></div>' +
      '<p style="margin-top:16px;color:var(--text-secondary);font-size:13px;">Повна перегенерація тексту…</p>' +
    '</div>';
  }

  showToast('Повна перегенерація через AI…', 'info');

  google.script.run.withSuccessHandler(function(updated) {
    state.editorText = updated;
    state.activeBlockIndex = -1;
    renderEditorBlocks();
    renderEditorStats();
    showToast('Текст повністю перегенеровано', 'success');
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
    renderEditorBlocks();
  }).regenerateFullTextWithAI(t.id, '');
}

// --- Перегенерация с комментарием ---
function openRegenWithComment() {
  var el = document.getElementById('editor-regen-comment');
  if (!el) return;
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  document.getElementById('editor-regen-comment-text').value = '';
}

function closeRegenComment() {
  var el = document.getElementById('editor-regen-comment');
  if (el) el.style.display = 'none';
}

function regenerateFullTextWithComment() {
  var comment = document.getElementById('editor-regen-comment-text').value.trim();
  if (!comment) { showToast('Введіть коментар', 'error'); return; }
  closeRegenComment();

  var t = state.editorText;
  if (!t) return;

  var container = document.getElementById('editor-blocks');
  if (container) {
    container.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;padding:60px;">' +
      '<div class="loader-dots"><span></span><span></span><span></span></div>' +
      '<p style="margin-top:16px;color:var(--text-secondary);font-size:13px;">Перегенерація з урахуванням коментаря…</p>' +
      '<p style="color:var(--text-muted);font-size:11px;margin-top:4px;">«' + escapeHtml(truncate(comment, 60)) + '»</p>' +
    '</div>';
  }

  showToast('Перегенерація з коментарем через AI…', 'info');

  google.script.run.withSuccessHandler(function(updated) {
    state.editorText = updated;
    state.activeBlockIndex = -1;
    renderEditorBlocks();
    renderEditorStats();
    showToast('Текст перегенеровано з коментарем', 'success');
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
    renderEditorBlocks();
  }).regenerateFullTextWithAI(t.id, comment);
}

// --- Об'єднання блоків ---
function mergeBlocks(index) {
  var t = state.editorText;
  if (!t || !t.blocks || index + 1 >= t.blocks.length) return;

  var block = t.blocks[index];
  var nextBlock = t.blocks[index + 1];

  // Об'єднуємо контент
  if (block.type === 'heading' && nextBlock.type === 'paragraph') {
    // Заголовок + абзац = об'єднуємо в абзац
    block.type = 'paragraph';
    block.tag = 'p';
    block.content = block.content + '. ' + nextBlock.content;
  } else {
    block.content = block.content + ' ' + nextBlock.content;
  }

  t.blocks.splice(index + 1, 1);
  t.content = buildContentFromBlocks(t.blocks);

  google.script.run.updateGeneratedText(t.id, {
    content: t.content,
    blocks: t.blocks
  });

  state.activeBlockIndex = -1;
  renderEditorBlocks();
  showToast('Блоки об\'єднано', 'success');
}

// --- Разбивка блока ---
function promptSplitBlock(index) {
  var t = state.editorText;
  if (!t || !t.blocks || !t.blocks[index]) return;

  var block = t.blocks[index];
  var content = block.content;

  // Ищем точку разделения: середина по предложениям
  var sentences = content.split(/(?<=[.!?])\s+/);
  if (sentences.length < 2) {
    showToast('Блок занадто короткий для розбиття', 'error');
    return;
  }

  var midPoint = Math.ceil(sentences.length / 2);
  var part1 = sentences.slice(0, midPoint).join(' ');
  var part2 = sentences.slice(midPoint).join(' ');

  // Створюємо новий блок
  var newBlock = {
    id: 'b_' + Date.now(),
    type: block.type,
    tag: block.tag,
    content: part2
  };

  block.content = part1;
  t.blocks.splice(index + 1, 0, newBlock);
  t.content = buildContentFromBlocks(t.blocks);

  google.script.run.updateGeneratedText(t.id, {
    content: t.content,
    blocks: t.blocks
  });

  state.activeBlockIndex = -1;
  renderEditorBlocks();
  showToast('Блок розбито на два', 'success');
}
</script>
