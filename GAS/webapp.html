<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>
  <!-- Screen preloader -->
  <div id="screen-loader" class="screen-loader" style="display:none;">
    <div class="screen-loader-content">
      <div class="loader-spinner"></div>
      <span>Завантаження...</span>
    </div>
  </div>

  <!-- Головний контейнер: sidebar + контент -->
  <div class="app-container">

    <!-- ============ SIDEBAR ============ -->
    <aside class="app-sidebar" id="app-sidebar">
      <div class="sidebar-brand" onclick="navigateTo('#dashboard')" style="cursor:pointer;">
        <div class="sidebar-brand-mark">T</div>
        <div class="sidebar-brand-text">TextGen</div>
      </div>

      <div class="sidebar-search" onclick="showToast('Пошук скоро зʼявиться', 'info')" title="Пошук">
        <span style="font-size:13px;">⌕</span>
        <span class="sidebar-search-text">Пошук…</span>
        <span class="sidebar-search-kbd">⌘K</span>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">Workspace</div>
        <button class="sidebar-item" data-hash="#dashboard" onclick="navigateTo('#dashboard')">
          <span class="sidebar-item-icon">▣</span>
          <span class="sidebar-item-label">Дашборд</span>
        </button>
        <button class="sidebar-item" data-hash="#tasks" onclick="navigateTo('#tasks')">
          <span class="sidebar-item-icon">✎</span>
          <span class="sidebar-item-label">Задачі</span>
          <span class="sidebar-item-count" id="sidebar-tasks-count"></span>
        </button>
        <button class="sidebar-item" data-hash="#templates" onclick="navigateTo('#templates')">
          <span class="sidebar-item-icon">⊞</span>
          <span class="sidebar-item-label">Шаблони</span>
        </button>
        <button class="sidebar-item" data-hash="#clients" onclick="navigateTo('#clients')">
          <span class="sidebar-item-icon">☻</span>
          <span class="sidebar-item-label">Клієнти</span>
          <span class="sidebar-item-count" id="sidebar-clients-count"></span>
        </button>
      </div>

      <div class="sidebar-section sidebar-recent" id="sidebar-recent">
        <div class="sidebar-section-title">Нещодавнє</div>
        <!-- Заповнюється динамічно через renderRecentTasks() -->
      </div>

      <div class="sidebar-footer">
        <button class="sidebar-toggle" onclick="toggleSidebar()" title="Згорнути / розгорнути">
          <span style="font-size:14px;">◧</span>
        </button>
        <div id="autosave-status" class="autosave-indicator"></div>
      </div>
    </aside>

    <!-- ============ MAIN CONTENT ============ -->
    <main class="app-content">
      <?!= include('page_dashboard'); ?>
      <?!= include('page_tasks'); ?>
      <?!= include('page_task'); ?>
      <?!= include('page_task_editor'); ?>
      <?!= include('page_templates'); ?>
      <?!= include('page_clients'); ?>
    </main>
  </div>

  <!-- Модалка: Клієнт -->
  <div id="modal-client" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modal-client-title">Новий клієнт</h3>
        <button class="modal-close" onclick="closeModal('modal-client')">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="mc-id">
        <div class="field-group">
          <label class="field-label">Назва</label>
          <input type="text" id="mc-name" class="input-field" placeholder="Назва компанії">
        </div>
        <div class="field-group">
          <label class="field-label">Сайт</label>
          <input type="text" id="mc-domain" class="input-field" placeholder="example.com">
        </div>
        <div class="field-group">
          <label class="field-label">Ніша</label>
          <input type="text" id="mc-niche" class="input-field" placeholder="E-commerce, Медицина, …">
        </div>
        <div class="field-group">
          <label class="field-label">Нотатки</label>
          <textarea id="mc-description" class="input-field" rows="3" placeholder="Нотатки про клієнта…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('modal-client')">Скасувати</button>
        <button class="btn btn-primary" onclick="saveClientFromModal()">Зберегти</button>
      </div>
    </div>
  </div>

  <!-- Модалка: Створення задачі -->
  <div id="modal-new-task" class="modal-overlay" style="display:none;">
    <div class="modal-card" style="max-width:700px;">
      <div class="modal-header">
        <h3>Створити задачу</h3>
        <button class="modal-close" onclick="closeModal('modal-new-task')">&times;</button>
      </div>
      <div class="modal-body">
        <p class="text-secondary" style="margin-bottom:14px;">Оберіть клієнта та шаблон, або створіть задачу з нуля</p>

        <!-- Клієнт — обов'язковий -->
        <div class="field-group">
          <label class="field-label">Клієнт <span style="color:var(--danger);">*</span></label>
          <select id="new-task-client-select" class="input-field" onchange="onNewTaskClientChange()">
            <option value="">— Оберіть клієнта —</option>
          </select>
          <div class="field-hint">Задача буде створена для цього клієнта. Шаблони нижче фільтруються автоматично.</div>
        </div>

        <!-- Список шаблонів -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin:14px 0 8px;">
          <label class="field-label" style="margin:0;">Шаблон (необов'язково)</label>
          <label class="checkbox-label" style="font-size:11px; padding:0;">
            <input type="checkbox" id="new-task-show-all-templates" onchange="renderNewTaskTemplateList()">
            Показати всі шаблони
          </label>
        </div>
        <div id="new-task-template-list" class="task-template-grid">
          <!-- Заповнюється динамічно -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('modal-new-task')">Скасувати</button>
        <button class="btn btn-primary" onclick="createTaskFromScratch()">Порожня задача</button>
      </div>
    </div>
  </div>

  <!-- Toast повідомлення -->
  <div id="toast-container" class="toast-container"></div>

  <?!= include('scripts_core'); ?>
  <?!= include('scripts_clients'); ?>
  <?!= include('scripts_dashboard'); ?>
  <?!= include('scripts_tasks'); ?>
  <?!= include('scripts_task'); ?>
  <?!= include('scripts_editor'); ?>
  <?!= include('scripts_templates'); ?>
</body>
</html>
