<script>
// ===========================================
// scripts.html - Клиентская логика (SPA)
// ===========================================

// --- Глобальный стейт ---
var state = {
  clients: [],
  tasks: [],
  templates: [],
  texts: [],
  selectedClientId: null,
  selectedTemplateId: null,
  currentTask: null,
  genSimulationTimer: null,
  expandedTextId: null,
  expandedProgressTextId: null,
  progressTexts: [],
  templateVersions: [],
  viewingVersionId: null,
  genTemplateVersions: [],
  longTextEdit: { rowIndex: -1, colKey: '' },
  taskTemplates: [],
  selectedTaskTemplateId: null,
  editingTaskTemplate: null
};

// --- Инициализация ---
document.addEventListener('DOMContentLoaded', function() {
  loadInitialData();
  handleHashRoute();
  window.addEventListener('hashchange', handleHashRoute);
});

function loadInitialData() {
  google.script.run.withSuccessHandler(function(clients) {
    state.clients = clients || [];
    renderClientList();
    renderClientsTable();
  }).getClients();
  google.script.run.withSuccessHandler(function(templates) {
    state.templates = templates || [];
    renderTemplateList();
  }).getTemplates();
  google.script.run.withSuccessHandler(function(tt) {
    state.taskTemplates = tt || [];
  }).getTaskTemplates();
}

// --- Роутер ---
function handleHashRoute() {
  var hash = window.location.hash || '#dashboard';
  var parts = hash.split('/');
  var screen = parts[0];
  hideAllScreens();
  updateActiveNav(screen);
  switch (screen) {
    case '#dashboard': showScreen('screen-dashboard'); break;
    case '#clients': showScreen('screen-clients'); renderClientsTable(); break;
    case '#templates': showScreen('screen-templates'); renderTemplateList(); break;
    case '#task': showScreen('screen-task'); if (parts[1]) loadTaskScreen(parts[1]); break;
    case '#progress': showScreen('screen-progress'); if (parts[1]) loadProgressScreen(parts[1]); break;
    case '#task-templates': showScreen('screen-task-templates'); renderTaskTemplateListSidebar(); break;
    default: showScreen('screen-dashboard');
  }
}
function navigateTo(hash) { window.location.hash = hash; }
function hideAllScreens() { var s = document.querySelectorAll('.screen'); for (var i = 0; i < s.length; i++) s[i].style.display = 'none'; }
function showScreen(id) { var el = document.getElementById(id); if (el) el.style.display = 'block'; }
function updateActiveNav(hash) {
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); if (tabs[i].getAttribute('data-hash') === hash) tabs[i].classList.add('active'); }
}

// --- Toast ---
function showToast(msg, type) {
  type = type || 'info';
  var c = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

// --- Модалки ---
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// --- Утилиты ---
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d) { if (!d) return '—'; var x=new Date(d); return ('0'+x.getDate()).slice(-2)+'.'+('0'+(x.getMonth()+1)).slice(-2)+'.'+x.getFullYear(); }
function formatDateTime(d) { if (!d) return '—'; var x=new Date(d); return ('0'+x.getDate()).slice(-2)+'.'+('0'+(x.getMonth()+1)).slice(-2)+'.'+x.getFullYear()+' '+('0'+x.getHours()).slice(-2)+':'+('0'+x.getMinutes()).slice(-2); }
function extractVariables(text) {
  var m = text.match(/\{\{(\w+)\}\}/g);
  if (!m) return [];
  var u = [];
  m.forEach(function(x) { var n = x.replace(/\{\{|\}\}/g,''); if (u.indexOf(n)===-1) u.push(n); });
  return u;
}
function generateColumnKey(label) {
  var cyr = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'shch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
  var r = label.toLowerCase().trim(), out = '';
  for (var i=0;i<r.length;i++){var c=r[i]; if(cyr[c])out+=cyr[c]; else if(/[a-z0-9]/.test(c))out+=c; else if(c===' '||c==='-'||c==='_')out+='_';}
  out = out.replace(/_+/g,'_').replace(/^_|_$/g,'');
  return out || ('col_'+Date.now());
}

// ===========================================
// Клиенты
// ===========================================
function renderClientList() {
  var c = document.getElementById('client-list'); if (!c) return;
  if (!state.clients.length) { c.innerHTML = '<div class="placeholder-message" style="height:100px"><p>Нет клиентов</p></div>'; return; }
  var h = '';
  state.clients.forEach(function(cl) {
    h += '<div class="client-item'+(cl.id===state.selectedClientId?' active':'')+'" onclick="selectClient(\''+cl.id+'\')">' +
      '<div class="client-item-name">'+escapeHtml(cl.name)+'</div></div>';
  });
  c.innerHTML = h;
}
function filterClients(q) {
  var items = document.querySelectorAll('.client-item'); q = q.toLowerCase();
  for (var i=0;i<items.length;i++) { items[i].style.display = items[i].querySelector('.client-item-name').textContent.toLowerCase().indexOf(q)!==-1?'':'none'; }
}
function selectClient(clientId) {
  state.selectedClientId = clientId;
  renderClientList();
  document.getElementById('dashboard-placeholder').style.display = 'none';
  document.getElementById('dashboard-client-content').style.display = 'block';
  google.script.run.withSuccessHandler(function(data) {
    state.tasks = data.tasks || [];
    document.getElementById('dashboard-client-name').textContent = data.client ? data.client.name : '';
    document.getElementById('dashboard-client-niche').textContent = data.client ? (data.client.niche||'') : '';
    renderTasksTable();
  }).getAllDataForDashboard(clientId);
}
function openClientModal(clientId) {
  var t = document.getElementById('modal-client-title');
  document.getElementById('mc-id').value=''; document.getElementById('mc-name').value='';
  document.getElementById('mc-domain').value=''; document.getElementById('mc-niche').value='';
  document.getElementById('mc-description').value='';
  if (clientId) {
    t.textContent = 'Редактировать клиента';
    var cl = state.clients.find(function(c){return c.id===clientId;});
    if (cl) { document.getElementById('mc-id').value=cl.id; document.getElementById('mc-name').value=cl.name||''; document.getElementById('mc-domain').value=cl.website||cl.domain||''; document.getElementById('mc-niche').value=cl.niche||''; document.getElementById('mc-description').value=cl.notes||cl.description||''; }
  } else { t.textContent = 'Новый клиент'; }
  openModal('modal-client');
}
function saveClientFromModal() {
  var d = { name: document.getElementById('mc-name').value.trim(), website: document.getElementById('mc-domain').value.trim(), niche: document.getElementById('mc-niche').value.trim(), notes: document.getElementById('mc-description').value.trim() };
  if (!d.name) { showToast('Укажите название','error'); return; }
  var id = document.getElementById('mc-id').value; if (id) d.id = id;
  google.script.run.withSuccessHandler(function(){closeModal('modal-client');showToast(id?'Клиент обновлён':'Клиент создан','success');loadInitialData();if(state.selectedClientId)selectClient(state.selectedClientId);}).withFailureHandler(function(e){showToast(e.message,'error');}).saveClient(d);
}
function deleteClientConfirm(cid) {
  if (!confirm('Удалить клиента?')) return;
  google.script.run.withSuccessHandler(function(){showToast('Клиент удалён','success');state.selectedClientId=null;loadInitialData();}).withFailureHandler(function(e){showToast(e.message,'error');}).deleteClient(cid);
}
function renderClientsTable() {
  var tb = document.getElementById('clients-table-body'); if (!tb) return;
  if (!state.clients.length) { tb.innerHTML='<tr><td colspan="5" class="text-center text-secondary">Нет клиентов</td></tr>'; return; }
  var h='';
  state.clients.forEach(function(c){
    h+='<tr><td><strong>'+escapeHtml(c.name)+'</strong></td><td>'+escapeHtml(c.website||c.domain||'—')+'</td><td>'+escapeHtml(c.niche||'—')+'</td><td id="client-tc-'+c.id+'">—</td><td><button class="btn btn-sm" onclick="selectClient(\''+c.id+'\');navigateTo(\'#dashboard\')">Задачи</button> <button class="btn btn-sm" onclick="openClientModal(\''+c.id+'\')">Ред.</button> <button class="btn btn-sm btn-danger" onclick="deleteClientConfirm(\''+c.id+'\')">Уд.</button></td></tr>';
  });
  tb.innerHTML=h;
  state.clients.forEach(function(c){ google.script.run.withSuccessHandler(function(tasks){var el=document.getElementById('client-tc-'+c.id);if(el)el.textContent=tasks.length;}).getTasks(c.id); });
}
function seedDemoData(){showToast('Загрузка...','info');google.script.run.withSuccessHandler(function(){showToast('Демо-данные загружены!','success');loadInitialData();}).withFailureHandler(function(e){showToast(e.message,'error');}).seedData();}

// ===========================================
// Дашборд — таблица задач
// ===========================================
function renderTasksTable() {
  var tb = document.getElementById('tasks-table-body'); if (!tb) return;
  if (!state.tasks.length) { tb.innerHTML='<tr><td colspan="7" class="text-center text-secondary">Нет задач. Создайте первую!</td></tr>'; return; }
  var sL={draft:'Черновик',running:'В процессе',completed:'Завершена',failed:'Ошибка',stopped:'Остановлена'};
  var sC={draft:'badge-neutral',running:'badge-warning',completed:'badge-success',failed:'badge-danger',stopped:'badge-danger'};
  var sorted = state.tasks.slice().sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
  var h='';
  sorted.forEach(function(t){
    var tn='—'; if(t.template_id){var tp=state.templates.find(function(x){return x.id===t.template_id;});if(tp)tn=tp.name;}
    h+='<tr class="clickable" onclick="navigateTo(\'#task/'+t.id+'\')"><td><strong>'+escapeHtml(t.name)+'</strong></td><td>'+escapeHtml(tn)+'</td><td>'+escapeHtml(t.llm_model||'—')+'</td><td>'+(t.completed_texts||0)+'/'+(t.total_texts||t.rows.length)+'</td><td>'+formatDate(t.created_at)+'</td><td><span class="badge '+(sC[t.status]||'')+'">'+(sL[t.status]||t.status)+'</span></td><td><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteTaskConfirm(\''+t.id+'\')">Уд.</button></td></tr>';
  });
  tb.innerHTML=h;
}
function createNewTask(){
  if(!state.selectedClientId){showToast('Сначала выберите клиента','error');return;}
  renderTaskTemplateList();
  openModal('modal-task-template');
}
function createTaskFromScratch(){
  closeModal('modal-task-template');
  var task={client_id:state.selectedClientId,name:'Новая задача',columns:[{key:'url',label:'URL',type:'short'},{key:'keywords',label:'Ключевые слова',type:'short'},{key:'topic',label:'Тема',type:'short'},{key:'brief',label:'ТЗ',type:'long'}],rows:[{url:'',keywords:'',topic:'',brief:''}],status:'draft'};
  google.script.run.withSuccessHandler(function(s){showToast('Задача создана','success');navigateTo('#task/'+s.id);}).withFailureHandler(function(e){showToast(e.message,'error');}).saveTask(task);
}
function createTaskFromTemplate(ttId){
  closeModal('modal-task-template');
  var tt=(state.taskTemplates||[]).find(function(x){return x.id===ttId;});
  if(!tt){createTaskFromScratch();return;}
  var cols=(tt.columns||[]).map(function(c){return {key:c.key,label:c.label,type:c.type};});
  var row={};cols.forEach(function(c){row[c.key]='';});
  var task={
    client_id:state.selectedClientId,
    name:tt.name,
    columns:cols,
    rows:[row],
    status:'draft',
    template_id:tt.template_id||'',
    llm_provider:tt.llm_provider||'',
    llm_model:tt.llm_model||'',
    options:tt.options||{},
    drive_folder:tt.drive_folder||'',
    local_system_prompt:tt.local_system_prompt||null,
    local_user_prompt:tt.local_user_prompt||null
  };
  google.script.run.withSuccessHandler(function(s){showToast('Задача создана из шаблона','success');navigateTo('#task/'+s.id);}).withFailureHandler(function(e){showToast(e.message,'error');}).saveTask(task);
}
function renderTaskTemplateList(){
  var c=document.getElementById('task-template-list');if(!c)return;
  var tts=state.taskTemplates||[];
  if(!tts.length){c.innerHTML='<div class="placeholder-message" style="height:100px;grid-column:1/-1;"><p>Нет сохранённых шаблонов задач</p></div>';return;}
  var h='';
  tts.forEach(function(tt){
    var colTags=(tt.columns||[]).map(function(col){return '<span class="task-template-card-tag">'+escapeHtml(col.label)+'</span>';}).join('');
    var tplName='—';if(tt.template_id){var tpl=state.templates.find(function(x){return x.id===tt.template_id;});if(tpl)tplName=tpl.name;}
    h+='<div class="task-template-card" onclick="createTaskFromTemplate(\''+tt.id+'\')">' +
      '<div class="task-template-card-name">'+escapeHtml(tt.name)+'</div>' +
      '<div class="task-template-card-desc">'+escapeHtml(tt.description||'')+'</div>' +
      '<div class="task-template-card-meta">' +
        '<span class="task-template-card-tag" style="background:#EBF5FF;color:#1A5FB4;">'+escapeHtml(tplName)+'</span>' +
        '<span class="task-template-card-tag">'+escapeHtml(tt.llm_model||'—')+'</span>' +
        colTags +
      '</div>' +
      '<div class="task-template-card-actions">' +
        '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteTaskTemplate(\''+tt.id+'\')">Уд.</button>' +
      '</div>' +
    '</div>';
  });
  c.innerHTML=h;
}
function deleteTaskConfirm(tid){
  if(!confirm('Удалить задачу?'))return;
  google.script.run.withSuccessHandler(function(){showToast('Задача удалена','success');if(state.selectedClientId)selectClient(state.selectedClientId);}).withFailureHandler(function(e){showToast(e.message,'error');}).deleteTask(tid);
}
function deleteCurrentTask(){
  if(!state.currentTask)return;
  if(!confirm('Удалить задачу?'))return;
  google.script.run.withSuccessHandler(function(){showToast('Задача удалена','success');navigateTo('#dashboard');}).withFailureHandler(function(e){showToast(e.message,'error');}).deleteTask(state.currentTask.id);
}

// ===========================================
// Шаблоны
// ===========================================
function renderTemplateList(){var c=document.getElementById('template-list');if(!c)return;if(!state.templates.length){c.innerHTML='<div class="placeholder-message" style="height:100px"><p>Нет шаблонов</p></div>';return;}var cL={blog:'Блог',product_card:'Товары',category:'Категории',service:'Услуги',custom:'Произвольный',system_humanizer:'Системный'};var h='';state.templates.forEach(function(t){h+='<div class="template-item'+(t.id===state.selectedTemplateId?' active':'')+'" onclick="selectTemplate(\''+t.id+'\')"><div class="template-item-name">'+escapeHtml(t.name)+'</div><div class="template-item-meta"><span class="badge badge-sm">'+escapeHtml(cL[t.category]||t.category)+'</span> <span class="text-secondary">v'+(t.version||1)+'</span></div></div>';});c.innerHTML=h;}
function filterTemplates(q){var items=document.querySelectorAll('.template-item');q=q.toLowerCase();for(var i=0;i<items.length;i++){items[i].style.display=items[i].querySelector('.template-item-name').textContent.toLowerCase().indexOf(q)!==-1?'':'none';}}
function filterTemplatesByCategory(cat){var btns=document.querySelectorAll('#template-category-filters .tag-btn');for(var i=0;i<btns.length;i++){btns[i].classList.remove('active');if(btns[i].getAttribute('data-category')===cat)btns[i].classList.add('active');}if(cat==='all'){renderTemplateList();return;}var f=state.templates.filter(function(t){return t.category===cat;});var c=document.getElementById('template-list');var cL={blog:'Блог',product_card:'Товары',category:'Категории',service:'Услуги',custom:'Произвольный',system_humanizer:'Системный'};var h='';f.forEach(function(t){h+='<div class="template-item'+(t.id===state.selectedTemplateId?' active':'')+'" onclick="selectTemplate(\''+t.id+'\')"><div class="template-item-name">'+escapeHtml(t.name)+'</div><div class="template-item-meta"><span class="badge badge-sm">'+escapeHtml(cL[t.category]||t.category)+'</span> <span class="text-secondary">v'+(t.version||1)+'</span></div></div>';});c.innerHTML=h||'<div class="placeholder-message" style="height:100px"><p>Нет</p></div>';}
function selectTemplate(tid){state.selectedTemplateId=tid;state.viewingVersionId=null;renderTemplateList();document.getElementById('template-placeholder').style.display='none';document.getElementById('template-editor-content').style.display='block';var t=state.templates.find(function(x){return x.id===tid;});if(!t)return;document.getElementById('tpl-name').value=t.name||'';document.getElementById('tpl-category').value=t.category||'blog';document.getElementById('tpl-system-prompt').value=t.system_prompt||'';document.getElementById('tpl-user-prompt').value=t.user_prompt||'';document.getElementById('tpl-version-badge').textContent='v'+(t.version||1);document.getElementById('tpl-stat-version').textContent=t.version||1;document.getElementById('tpl-stat-usage').textContent=t.usage_count||0;document.getElementById('tpl-stat-uniqueness').textContent=t.avg_uniqueness?t.avg_uniqueness+'%':'—';var vc=document.getElementById('tpl-variables');var vs=extractVariables(t.user_prompt||'');vc.innerHTML=vs.length?vs.map(function(v){return '<span class="variable-tag">{{'+escapeHtml(v)+'}}</span>';}).join(' '):'<span class="text-secondary">Нет переменных. Используйте {{имя}} в промпте.</span>';closeVersionViewer();loadTemplateVersions(tid);}
function createNewTemplate(){state.selectedTemplateId=null;state.templateVersions=[];state.viewingVersionId=null;document.getElementById('template-placeholder').style.display='none';document.getElementById('template-editor-content').style.display='block';document.getElementById('tpl-name').value='';document.getElementById('tpl-category').value='blog';document.getElementById('tpl-system-prompt').value='';document.getElementById('tpl-user-prompt').value='';document.getElementById('tpl-version-badge').textContent='v1';document.getElementById('tpl-stat-version').textContent='1';document.getElementById('tpl-stat-usage').textContent='0';document.getElementById('tpl-stat-uniqueness').textContent='—';document.getElementById('tpl-variables').innerHTML='<span class="text-secondary">Нет переменных</span>';document.getElementById('tpl-versions-section').style.display='none';closeVersionViewer();}
function saveCurrentTemplate(){var d={name:document.getElementById('tpl-name').value.trim(),category:document.getElementById('tpl-category').value,system_prompt:document.getElementById('tpl-system-prompt').value,user_prompt:document.getElementById('tpl-user-prompt').value};if(!d.name){showToast('Укажите название','error');return;}if(state.selectedTemplateId)d.id=state.selectedTemplateId;google.script.run.withSuccessHandler(function(s){showToast('Шаблон сохранён','success');state.selectedTemplateId=s.id;google.script.run.withSuccessHandler(function(t){state.templates=t||[];renderTemplateList();selectTemplate(s.id);}).getTemplates();}).withFailureHandler(function(e){showToast(e.message,'error');}).saveTemplate(d);}
function deleteCurrentTemplate(){if(!state.selectedTemplateId)return;if(!confirm('Удалить?'))return;google.script.run.withSuccessHandler(function(){showToast('Удалён','success');state.selectedTemplateId=null;document.getElementById('template-editor-content').style.display='none';document.getElementById('template-placeholder').style.display='block';google.script.run.withSuccessHandler(function(t){state.templates=t||[];renderTemplateList();}).getTemplates();}).withFailureHandler(function(e){showToast(e.message,'error');}).deleteTemplate(state.selectedTemplateId);}
function duplicateTemplate(){if(!state.selectedTemplateId)return;var t=state.templates.find(function(x){return x.id===state.selectedTemplateId;});if(!t)return;google.script.run.withSuccessHandler(function(s){showToast('Скопирован','success');google.script.run.withSuccessHandler(function(t){state.templates=t||[];renderTemplateList();selectTemplate(s.id);}).getTemplates();}).withFailureHandler(function(e){showToast(e.message,'error');}).saveTemplate({name:t.name+' (копия)',category:t.category,system_prompt:t.system_prompt,user_prompt:t.user_prompt});}
function loadTemplateVersions(tid){google.script.run.withSuccessHandler(function(v){state.templateVersions=v||[];renderTemplateVersions();}).getTemplateVersions(tid);}
function renderTemplateVersions(){var s=document.getElementById('tpl-versions-section'),tb=document.getElementById('tpl-versions-table');if(!tb||!s)return;var vs=state.templateVersions||[];var t=state.templates.find(function(x){return x.id===state.selectedTemplateId;});var all=[];if(t)all.push({id:'__current__',version:t.version||1,saved_at:null,usage_count:t.usage_count||0,avg_uniqueness:t.avg_uniqueness||0,isCurrent:true});vs.forEach(function(v){all.push({id:v.id,version:v.version,saved_at:v.saved_at,usage_count:v.usage_count||0,avg_uniqueness:v.avg_uniqueness||0,isCurrent:false});});if(all.length<=1){s.style.display='none';return;}s.style.display='block';var h='';all.forEach(function(r){var iv=state.viewingVersionId===r.id,ac=iv?' active':'',ec=iv?' expanded':'',cb=r.isCurrent?'<span class="version-badge-current">текущая</span>':'';if(r.isCurrent){h+='<tr class="version-row'+ac+'"><td><span class="version-expand-icon'+ec+'">&#9654;</span></td><td><strong>v'+r.version+'</strong>'+cb+'</td><td>—</td><td>'+r.usage_count+'</td><td>'+(r.avg_uniqueness?r.avg_uniqueness+'%':'—')+'</td><td></td></tr>';}else{h+='<tr class="version-row'+ac+'" onclick="viewVersion(\''+r.id+'\')"><td><span class="version-expand-icon'+ec+'">&#9654;</span></td><td>v'+r.version+'</td><td>'+formatDateTime(r.saved_at)+'</td><td>'+r.usage_count+'</td><td>'+(r.avg_uniqueness?r.avg_uniqueness+'%':'—')+'</td><td><button class="btn btn-sm" onclick="event.stopPropagation();viewVersion(\''+r.id+'\')">Просмотр</button></td></tr>';}});tb.innerHTML=h;}
function viewVersion(vid){if(state.viewingVersionId===vid){closeVersionViewer();return;}var v=state.templateVersions.find(function(x){return x.id===vid;});if(!v)return;state.viewingVersionId=vid;document.getElementById('version-viewer-num').textContent='v'+v.version;document.getElementById('version-viewer-system').textContent=v.system_prompt||'(пусто)';document.getElementById('version-viewer-user').textContent=v.user_prompt||'(пусто)';document.getElementById('version-viewer-usage').textContent=v.usage_count||0;document.getElementById('version-viewer-uniqueness').textContent=v.avg_uniqueness?v.avg_uniqueness+'%':'—';document.getElementById('tpl-version-viewer').style.display='block';renderTemplateVersions();}
function closeVersionViewer(){state.viewingVersionId=null;var v=document.getElementById('tpl-version-viewer');if(v)v.style.display='none';}
function restoreVersion(){if(!state.viewingVersionId||!state.selectedTemplateId)return;if(!confirm('Восстановить?'))return;google.script.run.withSuccessHandler(function(s){showToast('Восстановлено','success');closeVersionViewer();google.script.run.withSuccessHandler(function(t){state.templates=t||[];renderTemplateList();selectTemplate(s.id);}).getTemplates();}).withFailureHandler(function(e){showToast(e.message,'error');}).restoreTemplateVersion(state.selectedTemplateId,state.viewingVersionId);}
// ===========================================
// Шаблоны задач (Task Templates)
// ===========================================
function saveAsTaskTemplate(){
  if(!state.currentTask){showToast('Нет задачи','error');return;}
  var t=state.currentTask;
  document.getElementById('task-tpl-name').value=t.name||'';

// ===========================================
// Экран задачи — загрузка, колонки, таблица данных
// ===========================================
function loadTaskScreen(taskId) {
  google.script.run.withSuccessHandler(function(task) {
    if (!task) { showToast('Задача не найдена','error'); return; }
    state.currentTask = task;
    document.getElementById('task-name-input').value = task.name || '';
    document.getElementById('task-breadcrumb-name').textContent = task.name || '';
    var sL={draft:'Черновик',running:'В процессе',completed:'Завершена',failed:'Ошибка',stopped:'Остановлена'};
    var sC={draft:'badge-neutral',running:'badge-warning',completed:'badge-success',failed:'badge-danger',stopped:'badge-danger'};
    var badge = document.getElementById('task-status-badge');
    badge.textContent = sL[task.status]||task.status;
    badge.className = 'badge '+(sC[task.status]||'');
    // Клиент
    google.script.run.withSuccessHandler(function(clients) {
      var cl = (clients||[]).find(function(c){return c.id===task.client_id;});
      document.getElementById('task-breadcrumb-client').textContent = cl?cl.name:'';
    }).getClients();
    renderColumnsGrid();
    renderDynamicDataTable();
    populateTemplateSelect();
    // Восстановить настройки
    if (task.template_id) {
      document.getElementById('gen-template-select').value = task.template_id;
      onTemplateChange();
    } else {
      document.getElementById('gen-no-template-hint').style.display = 'flex';
      document.getElementById('gen-local-prompt-group').style.display = 'none';
    }
    if (task.llm_provider && task.llm_model) { document.getElementById('gen-llm-select').value = task.llm_provider+'|'+task.llm_model; }
    if (task.options) {
      document.getElementById('opt-humanize').checked = !!task.options.humanize;
      document.getElementById('opt-uniqueness').checked = !!task.options.uniqueness;
      document.getElementById('opt-factcheck').checked = !!task.options.factcheck;
      document.getElementById('opt-ai-detector').checked = !!task.options.ai_detector;
    }
    if (task.drive_folder) document.getElementById('gen-drive-folder').value = task.drive_folder;
    updateCostEstimate();
    switchTaskTab('data');
    // Загрузить тексты если есть
    if (task.status !== 'draft') {
      google.script.run.withSuccessHandler(function(texts) {
        state.texts = texts || [];
        if (state.texts.length) { renderProgressTab(); renderResultsTab(); }
      }).getGeneratedTexts(taskId);
    }
  }).getTask(taskId);
}

function saveTaskName() {
  if (!state.currentTask) return;
  state.currentTask.name = document.getElementById('task-name-input').value.trim();
  document.getElementById('task-breadcrumb-name').textContent = state.currentTask.name;

}

function autoSaveTask() {

// --- Вкладки задачи ---
function switchTaskTab(tab) {
  var tabs = document.querySelectorAll('#screen-task .tab');
  for (var i=0;i<tabs.length;i++){tabs[i].classList.remove('active');if(tabs[i].getAttribute('data-tab')===tab)tabs[i].classList.add('active');}
  var contents = document.querySelectorAll('#screen-task .tab-content');
  for (var j=0;j<contents.length;j++) contents[j].style.display='none';
  var target = document.getElementById('task-tab-'+tab);
  if (target) target.style.display='block';
}

// --- Колонки + переменные (единый блок) ---
function renderColumnsGrid() {
  var grid = document.getElementById('columns-grid'); if (!grid || !state.currentTask) return;
  var cols = state.currentTask.columns || [];
  var typeLabels = { short: 'строка', long: 'текст' };
  var h = '';
  cols.forEach(function(col) {
    var reqBadge = col.required ? '<span class="column-card-required">обяз.</span>' : '';
    h += '<div class="column-card">' +
      '<button class="column-card-delete" onclick="removeColumn(\''+col.key+'\')" title="Удалить колонку">&times;</button>' +
      '<div class="column-card-top">' +
        '<span class="column-card-name" ondblclick="renameColumnPrompt(\''+col.key+'\')" title="Двойной клик для переименования">'+escapeHtml(col.label)+'</span>' +
        reqBadge +
        '<span class="column-card-type">'+escapeHtml(typeLabels[col.type]||col.type)+'</span>' +
      '</div>' +
      '<div class="column-card-variable">' +
        '<span class="column-card-var-tag" onclick="copyVariable(\''+col.key+'\')" title="Нажмите, чтобы скопировать">{{'+escapeHtml(col.key)+'}}</span>' +
      '</div>' +

  });

function copyVariable(key) {
  var text = '{{'+key+'}}';

  showToast('Скопировано: '+text, 'info');
}

// --- Добавление/удаление колонок ---
function confirmAddColumn() {
  var label = document.getElementById('new-col-label').value.trim();
  var type = document.getElementById('new-col-type').value;
  if (!label) { showToast('Укажите название','error'); return; }
  var key = generateColumnKey(label);
  // Проверить уникальность ключа
  var exists = (state.currentTask.columns||[]).some(function(c){return c.key===key;});
  if (exists) key = key + '_' + Date.now();
  var required = document.getElementById('new-col-required').checked;
  state.currentTask.columns.push({ key: key, label: label, type: type, required: required });
  // Добавить в каждую строку
  (state.currentTask.rows||[]).forEach(function(row){ row[key] = ''; });
  closeModal('modal-addcolumn');
  document.getElementById('new-col-label').value = '';
  document.getElementById('new-col-required').checked = false;
  renderColumnsGrid();
  renderDynamicDataTable();
  autoSaveTask();
}

function removeColumn(key) {
  if (!confirm('Удалить колонку?')) return;
  state.currentTask.columns = state.currentTask.columns.filter(function(c){return c.key!==key;});
  (state.currentTask.rows||[]).forEach(function(row){ delete row[key]; });
  renderColumnsGrid();
  renderDynamicDataTable();
  autoSaveTask();
}

function renameColumnPrompt(key) {
  var col = state.currentTask.columns.find(function(c){return c.key===key;});
  if (!col) return;
  var newLabel = prompt('Новое название колонки:', col.label);
  if (newLabel && newLabel.trim()) {
    col.label = newLabel.trim();
    renderColumnsGrid();
    autoSaveTask();
  }
}

// --- Динамическая таблица данных ---
function renderDynamicDataTable() {
  if (!state.currentTask) return;
  var cols = state.currentTask.columns || [];
  var rows = state.currentTask.rows || [];
  // Заголовки
  var thead = document.getElementById('task-data-thead');
  var thHtml = '<tr><th style="width:40px">#</th>';
  cols.forEach(function(col) { thHtml += '<th>'+escapeHtml(col.label)+'</th>'; });
  thHtml += '<th style="width:40px"></th></tr>';
  thead.innerHTML = thHtml;
  // Строки
  var tbody = document.getElementById('task-data-table');
  var tbHtml = '';
  rows.forEach(function(row, i) {
    tbHtml += '<tr><td>'+(i+1)+'</td>';
    cols.forEach(function(col) {
      var val = row[col.key] || '';
      if (col.type === 'long') {
        var preview = val.length > 50 ? escapeHtml(val.substring(0,50))+'…' : escapeHtml(val);
        tbHtml += '<td class="cell-long" onclick="openLongTextEditor('+i+',\''+col.key+'\')" title="Нажмите для редактирования">' +
          '<div class="cell-long-preview">'+(preview||'<span class="text-secondary">Нажмите...</span>')+'</div></td>';
      } else {
        tbHtml += '<td><input type="text" class="input-field input-sm" value="'+escapeHtml(val)+'" onchange="updateDataRow('+i+',\''+col.key+'\',this.value)"></td>';
      }
    });
    tbHtml += '<td><button class="btn btn-sm btn-danger" onclick="removeDataRow('+i+')">×</button></td></tr>';
  });
  tbody.innerHTML = tbHtml;
}

function updateDataRow(index, key, value) {
  if (state.currentTask && state.currentTask.rows[index]) {
    state.currentTask.rows[index][key] = value;
    autoSaveTask();
    updateCostEstimate();
  }
}

function addDataRow() {
  if (!state.currentTask) return;
  var row = {};
  (state.currentTask.columns||[]).forEach(function(col){ row[col.key] = ''; });
  state.currentTask.rows.push(row);
  renderDynamicDataTable();
  autoSaveTask();
  updateCostEstimate();
}

function removeDataRow(index) {
  if (!state.currentTask) return;
  state.currentTask.rows.splice(index, 1);
  renderDynamicDataTable();
  autoSaveTask();
  updateCostEstimate();
}

// --- Выбор шаблона и версии ---
function populateTemplateSelect() {
  var sel = document.getElementById('gen-template-select'); if (!sel) return;
  var h = '<option value="">— Выберите шаблон —</option>';
  state.templates.forEach(function(t){ h += '<option value="'+t.id+'">'+escapeHtml(t.name)+'</option>'; });

}

function onTemplateChange() {
  var sel = document.getElementById('gen-template-select');
  var vg = document.getElementById('gen-version-group');
  var vs = document.getElementById('gen-version-select');
  var lpg = document.getElementById('gen-local-prompt-group');
  var hint = document.getElementById('gen-no-template-hint');
  var tpl = state.templates.find(function(t){return t.id===sel.value;});
  if (tpl) {
    vg.style.display = 'block';
    lpg.style.display = 'block';
    if (hint) hint.style.display = 'none';
    vs.innerHTML = '<option value="current">v'+(tpl.version||1)+' (текущая)</option>';
    // Заполнить локальный промт: если уже есть сохранённый — использовать его, иначе взять из шаблона
    if (state.currentTask && state.currentTask.local_system_prompt != null) {
      document.getElementById('gen-local-system-prompt').value = state.currentTask.local_system_prompt;
      document.getElementById('gen-local-user-prompt').value = state.currentTask.local_user_prompt || '';
    } else {
      document.getElementById('gen-local-system-prompt').value = tpl.system_prompt || '';
      document.getElementById('gen-local-user-prompt').value = tpl.user_prompt || '';
    }
    google.script.run.withSuccessHandler(function(versions){
      state.genTemplateVersions=versions||[];
      versions.forEach(function(v){ var o=document.createElement('option'); o.value=v.id; o.textContent='v'+v.version+' ('+formatDateTime(v.saved_at)+')'; vs.appendChild(o); });
    }).getTemplateVersions(tpl.id);
  } else {
    vg.style.display='none'; lpg.style.display='none'; state.genTemplateVersions=[];
    if (hint) hint.style.display = 'flex';
  }

function onVersionChange() {
  var vs=document.getElementById('gen-version-select'), ts=document.getElementById('gen-template-select');
  if (vs.value==='current') {
    var tpl=state.templates.find(function(t){return t.id===ts.value;});
    if(tpl){
      document.getElementById('gen-local-system-prompt').value = tpl.system_prompt || '';
      document.getElementById('gen-local-user-prompt').value = tpl.user_prompt || '';
      saveLocalPrompt();

  } else {
    var v=(state.genTemplateVersions||[]).find(function(x){return x.id===vs.value;});
    if(v){
      document.getElementById('gen-local-system-prompt').value = v.system_prompt || '';
      document.getElementById('gen-local-user-prompt').value = v.user_prompt || '';
      saveLocalPrompt();
    }
  }
}

// --- Стоимость ---

// --- Запуск генерации ---
function startGeneration() {
  if (!state.currentTask) return;
  var filledRows = (state.currentTask.rows||[]).filter(function(r){for(var k in r){if(r[k])return true;}return false;});
  if (!filledRows.length) { showToast('Добавьте данные','error'); return; }
  // Сохранить настройки в задачу
  var tSel = document.getElementById('gen-template-select');
  var lSel = document.getElementById('gen-llm-select');
  var parts = lSel.value.split('|');
  state.currentTask.template_id = tSel.value;
  var vSel = document.getElementById('gen-version-select');
  state.currentTask.template_version_id = (vSel&&vSel.value!=='current') ? vSel.value : null;
  state.currentTask.llm_provider = parts[0];
  state.currentTask.llm_model = parts[1];
  state.currentTask.options = {
    humanize: document.getElementById('opt-humanize').checked,
    uniqueness: document.getElementById('opt-uniqueness').checked,
    factcheck: document.getElementById('opt-factcheck').checked,
    ai_detector: document.getElementById('opt-ai-detector').checked
  };
  state.currentTask.drive_folder = document.getElementById('gen-drive-folder').value;
  // Сохранить локальные промты
  state.currentTask.local_system_prompt = document.getElementById('gen-local-system-prompt').value;
  state.currentTask.local_user_prompt = document.getElementById('gen-local-user-prompt').value;
  autoSaveTask();

  showToast('Запуск генерации...','info');
  document.getElementById('task-stop-btn').style.display = 'inline-block';

  google.script.run.withSuccessHandler(function(result) {
    state.currentTask = result.task;
    state.texts = result.texts;
    showToast('Генерация запущена!','success');
    switchTaskTab('progress');
    simulateGeneration();
  }).withFailureHandler(function(e){showToast(e.message,'error');}).startTask(state.currentTask.id);
}

// --- Симуляция ---
function simulateGeneration() {
  if (!state.currentTask || !state.texts.length) return;
  var pending = state.texts.filter(function(t){return t.status==='pending';});
  if (!pending.length) { finishGeneration(); return; }
  var next = pending[0];
  next.status = 'processing';
  renderProgressTab();
  state.genSimulationTimer = setTimeout(function() {
    if (Math.random()>0.2) {
      next.status='completed'; next.uniqueness_score=Math.floor(Math.random()*20+80);
      next.ai_score=Math.floor(Math.random()*30+5); next.gdoc_url='#doc-'+next.id;
      next.content=generateFakeContent(next.source_data); next.comment=''; next.regeneration_count=0;
      state.currentTask.completed_texts++;
    } else {
      next.status='failed'; next.error_message='API timeout (симуляция)';
      state.currentTask.failed_texts++;
    }
    renderProgressTab();
    simulateGeneration();
  }, 1500+Math.random()*2000);
}
function stopGeneration() {
  if(state.genSimulationTimer){clearTimeout(state.genSimulationTimer);state.genSimulationTimer=null;}
  if(state.currentTask)state.currentTask.status='stopped';
  document.getElementById('task-stop-btn').style.display='none';
  showToast('Остановлена','info'); renderProgressTab();
}
function finishGeneration() {
  if(state.currentTask){state.currentTask.status='completed';state.currentTask.completed_at=new Date().toISOString();}
  document.getElementById('task-stop-btn').style.display='none';
  showToast('Генерация завершена!','success');
  renderProgressTab(); renderResultsTab();
}

function generateFakeContent(srcData) {
  var topic = '';
  if (srcData) { for (var k in srcData) { if (srcData[k] && srcData[k].length > 3) { topic = srcData[k]; break; } } }
  topic = topic || 'Текст';
  return '<h1>'+escapeHtml(topic)+'</h1>\n<p>В данной статье рассмотрим ключевые аспекты темы «'+escapeHtml(topic)+'».</p>\n<h2>Основные критерии</h2>\n<p>Современный рынок предлагает множество решений. Рассмотрим каждый подробнее.</p>\n<h2>Заключение</h2>\n<p>Используйте рекомендации из этой статьи для оптимального выбора.</p>';
}

// --- Рендер прогресса ---
function renderProgressTab() {
  if (!state.currentTask||!state.texts.length) return;
  var total=state.texts.length, completed=state.texts.filter(function(t){return t.status==='completed';}).length;
  var processing=state.texts.filter(function(t){return t.status==='processing';}).length;
  var pending=state.texts.filter(function(t){return t.status==='pending';}).length;
  var pct=total>0?Math.round((completed/total)*100):0;
  document.getElementById('progress-text').textContent=completed+' из '+total;
  document.getElementById('progress-bar-fill').style.width=pct+'%';
  document.getElementById('stat-completed').textContent=completed;
  document.getElementById('stat-processing').textContent=processing;
  document.getElementById('stat-pending').textContent=pending;
  var ws=state.texts.filter(function(t){return t.uniqueness_score!=null;});
  document.getElementById('stat-uniqueness').textContent=ws.length?Math.round(ws.reduce(function(s,t){return s+t.uniqueness_score;},0)/ws.length)+'%':'—';
  var tb=document.getElementById('progress-texts-table');
  var sL={pending:'Ожидает',processing:'Обработка...',completed:'Готово',failed:'Ошибка'};
  var sC={pending:'',processing:'badge-warning',completed:'badge-success',failed:'badge-danger'};
  var h='';
  state.texts.forEach(function(t,i){
    var label = getRowLabel(t.source_data);
    h+='<tr><td>'+(i+1)+'</td><td>'+escapeHtml(label)+'</td><td><span class="badge '+(sC[t.status]||'')+'">'+(sL[t.status]||t.status)+'</span></td><td>'+(t.uniqueness_score!=null?t.uniqueness_score+'%':'—')+'</td><td>'+(t.gdoc_url?'<a href="'+t.gdoc_url+'" target="_blank">Открыть</a>':'—')+'</td></tr>';
  });
  tb.innerHTML=h;
}

function getRowLabel(srcData) {
  if (!srcData) return '—';
  for (var k in srcData) { if (srcData[k] && srcData[k].length > 2) return srcData[k]; }
  return '—';
}

// --- Рендер результатов ---
function renderResultsTab() {
  if (!state.currentTask) return;
  var completed=state.texts.filter(function(t){return t.status==='completed';}).length;
  var failed=state.texts.filter(function(t){return t.status==='failed';}).length;
  document.getElementById('results-not-ready').style.display='none';
  document.getElementById('results-content').style.display='block';
  document.getElementById('res-total').textContent=state.texts.length;
  document.getElementById('res-completed').textContent=completed;
  document.getElementById('res-failed').textContent=failed;
  var ws=state.texts.filter(function(t){return t.uniqueness_score!=null;});
  document.getElementById('res-uniqueness').textContent=ws.length?Math.round(ws.reduce(function(s,t){return s+t.uniqueness_score;},0)/ws.length)+'%':'—';
  var tb=document.getElementById('results-texts-table');
  var sL={completed:'Готово',failed:'Ошибка',pending:'Ожидает',processing:'Обработка...'};
  var sC={completed:'badge-success',failed:'badge-danger',pending:'',processing:'badge-warning'};
  var h='';
  state.texts.forEach(function(t,i){
    var isExp=state.expandedTextId===t.id, label=getRowLabel(t.source_data);
    var regenBadge=t.regeneration_count?'<span class="regeneration-badge">×'+t.regeneration_count+'</span>':'';
    h+='<tr class="result-row" onclick="toggleTextPreview(\''+t.id+'\')"><td><span class="result-expand-icon'+(isExp?' expanded':'')+'">&#9654;</span></td><td>'+(i+1)+'</td><td>'+escapeHtml(label)+regenBadge+'</td><td><span class="badge '+(sC[t.status]||'')+'">'+(sL[t.status]||t.status)+'</span></td><td>'+(t.uniqueness_score!=null?t.uniqueness_score+'%':'—')+'</td><td>'+(t.ai_score!=null?t.ai_score+'%':'—')+'</td><td>'+(t.gdoc_url?'<a href="'+t.gdoc_url+'" target="_blank" onclick="event.stopPropagation();">Открыть</a>':'—')+'</td><td><button class="btn btn-sm btn-regenerate" onclick="event.stopPropagation();regenerateText(\''+t.id+'\')">Перегенерировать</button></td></tr>';
    h+='<tr class="result-detail-row" id="detail-'+t.id+'" style="display:'+(isExp?'table-row':'none')+';"><td colspan="8"><div class="result-detail-content">'+(t.error_message?'<div class="result-error-box">Ошибка: '+escapeHtml(t.error_message)+'</div>':'')+'<div class="result-text-preview">'+(t.content||'<span class="text-secondary">Нет текста</span>')+'</div><div class="result-actions-bar"><div class="result-comment-area"><div class="result-comment-label">Комментарий к правкам</div><textarea id="comment-'+t.id+'" placeholder="Что изменить при перегенерации..." onchange="saveTextComment(\''+t.id+'\')" onclick="event.stopPropagation();">'+escapeHtml(t.comment||'')+'</textarea></div><div class="result-action-buttons"><button class="btn btn-sm btn-regenerate" onclick="event.stopPropagation();regenerateText(\''+t.id+'\')">Перегенерировать</button></div></div></div></td></tr>';
  });
  tb.innerHTML=h;
}

function toggleTextPreview(textId) {
  var dr=document.getElementById('detail-'+textId); if(!dr)return;
  if(state.expandedTextId===textId){dr.style.display='none';state.expandedTextId=null;}
  else{if(state.expandedTextId){var p=document.getElementById('detail-'+state.expandedTextId);if(p)p.style.display='none';}dr.style.display='table-row';state.expandedTextId=textId;}
  var icons=document.querySelectorAll('.result-expand-icon');for(var i=0;i<icons.length;i++)icons[i].classList.remove('expanded');
  if(state.expandedTextId){var row=dr.previousElementSibling;if(row){var ic=row.querySelector('.result-expand-icon');if(ic)ic.classList.add('expanded');}}
}

function saveTextComment(textId) {
  var ta=document.getElementById('comment-'+textId); if(!ta)return;
  var t=state.texts.find(function(x){return x.id===textId;}); if(t){t.comment=ta.value.trim();showToast('Комментарий сохранён','success');}
}

function regenerateText(textId) {
  var t=state.texts.find(function(x){return x.id===textId;}); if(!t)return;
  var ce=document.getElementById('comment-'+textId); if(ce)t.comment=ce.value.trim();
  t.status='processing'; t.regeneration_count=(t.regeneration_count||0)+1;
  renderResultsTab(); state.expandedTextId=textId;
  var dr=document.getElementById('detail-'+textId); if(dr)dr.style.display='table-row';
  showToast('Перегенерация...'+(t.comment?' (с комментарием)':''),'info');
  setTimeout(function(){
    if(Math.random()>0.1){t.status='completed';t.uniqueness_score=Math.floor(Math.random()*15+85);t.ai_score=Math.floor(Math.random()*25+5);t.content=generateFakeContent(t.source_data);t.error_message=null;showToast('Перегенерировано','success');}
    else{t.status='failed';t.error_message='Timeout (симуляция)';showToast('Ошибка','error');}
    renderResultsTab();state.expandedTextId=textId;var d2=document.getElementById('detail-'+textId);if(d2)d2.style.display='table-row';
  },2000+Math.random()*2000);
}

// ===========================================
// Экран прогресса (отдельная страница)
// ===========================================
function loadProgressScreen(taskId) {
  google.script.run.withSuccessHandler(function(task) {
    if (!task){showToast('Задача не найдена','error');return;}
    var sL={completed:'Завершена',running:'В процессе',pending:'Ожидает',failed:'Ошибка',stopped:'Остановлена'};
    var sC={completed:'badge-success',running:'badge-warning',pending:'badge-info',failed:'badge-danger',stopped:'badge-danger'};
    document.getElementById('prog-status-badge').textContent=sL[task.status]||task.status;
    document.getElementById('prog-status-badge').className='badge '+(sC[task.status]||'');
    document.getElementById('prog-llm').textContent=task.llm_model||'';
    document.getElementById('prog-created').textContent=formatDate(task.created_at);
    document.getElementById('prog-breadcrumb-task').textContent=task.name||'';
    var pct=task.total_texts>0?Math.round((task.completed_texts/task.total_texts)*100):0;
    document.getElementById('prog-progress-text').textContent=(task.completed_texts||0)+' из '+(task.total_texts||0);
    document.getElementById('prog-progress-fill').style.width=pct+'%';
    document.getElementById('prog-stat-completed').textContent=task.completed_texts||0;
    document.getElementById('prog-stat-failed').textContent=task.failed_texts||0;
    document.getElementById('prog-stat-pending').textContent=Math.max(0,(task.total_texts||0)-(task.completed_texts||0)-(task.failed_texts||0));
    document.getElementById('prog-stat-processing').textContent=task.status==='running'?1:0;
    if(task.template_id){google.script.run.withSuccessHandler(function(tpl){document.getElementById('prog-template').textContent=tpl?tpl.name:'—';}).getTemplate(task.template_id);}
    google.script.run.withSuccessHandler(function(texts){
      state.progressTexts=texts||[];renderProgressTextsTable();
    }).getGeneratedTexts(taskId);
  }).getTask(taskId);
}

function renderProgressTextsTable() {
  var tb=document.getElementById('prog-texts-table'); if(!tb)return;
  var texts=state.progressTexts||[];
  if(!texts.length){tb.innerHTML='<tr><td colspan="8" class="text-center text-secondary">Нет текстов</td></tr>';return;}
  var sL={pending:'Ожидает',processing:'Обработка',completed:'Готово',failed:'Ошибка'};
  var sC={pending:'',processing:'badge-warning',completed:'badge-success',failed:'badge-danger'};
  var h='';
  texts.forEach(function(t,i){
    var isExp=state.expandedProgressTextId===t.id, label=getRowLabel(t.source_data);
    h+='<tr class="result-row" onclick="toggleProgressTextPreview(\''+t.id+'\')"><td><span class="result-expand-icon'+(isExp?' expanded':'')+'">&#9654;</span></td><td>'+(i+1)+'</td><td>'+escapeHtml(label)+'</td><td><span class="badge '+(sC[t.status]||'')+'">'+(sL[t.status]||t.status)+'</span></td><td>'+(t.uniqueness_score!=null?t.uniqueness_score+'%':'—')+'</td><td>'+(t.ai_score!=null?t.ai_score+'%':'—')+'</td><td>'+(t.gdoc_url?'<a href="'+t.gdoc_url+'" target="_blank" onclick="event.stopPropagation();">Открыть</a>':'—')+'</td><td>'+(t.status==='completed'||t.status==='failed'?'<button class="btn btn-sm btn-regenerate" onclick="event.stopPropagation();regenerateProgressText(\''+t.id+'\')">Перегенерировать</button>':'')+'</td></tr>';
    h+='<tr class="result-detail-row" id="prog-detail-'+t.id+'" style="display:'+(isExp?'table-row':'none')+';"><td colspan="8"><div class="result-detail-content">'+(t.error_message?'<div class="result-error-box">'+escapeHtml(t.error_message)+'</div>':'')+'<div class="result-text-preview">'+(t.content||'<span class="text-secondary">Нет текста</span>')+'</div></div></td></tr>';
  });
  tb.innerHTML=h;
}

function toggleProgressTextPreview(textId){
  var dr=document.getElementById('prog-detail-'+textId);if(!dr)return;
  if(state.expandedProgressTextId===textId){dr.style.display='none';state.expandedProgressTextId=null;}
  else{if(state.expandedProgressTextId){var p=document.getElementById('prog-detail-'+state.expandedProgressTextId);if(p)p.style.display='none';}dr.style.display='table-row';state.expandedProgressTextId=textId;}
}

function regenerateProgressText(textId){
  var t=(state.progressTexts||[]).find(function(x){return x.id===textId;});if(!t)return;
  t.status='processing';t.regeneration_count=(t.regeneration_count||0)+1;
  renderProgressTextsTable();showToast('Перегенерация...','info');
  setTimeout(function(){
    if(Math.random()>0.1){t.status='completed';t.uniqueness_score=Math.floor(Math.random()*15+85);t.ai_score=Math.floor(Math.random()*25+5);t.content=generateFakeContent(t.source_data);t.error_message=null;showToast('Перегенерировано','success');}
    else{t.status='failed';t.error_message='Timeout (симуляция)';showToast('Ошибка','error');}
    google.script.run.updateGeneratedText(textId,{status:t.status,uniqueness_score:t.uniqueness_score,ai_score:t.ai_score,content:t.content,error_message:t.error_message,regeneration_count:t.regeneration_count});
    renderProgressTextsTable();
  },2000+Math.random()*2000);
}

// ===========================================
// Экран «Шаблоны задач» — редактор
// ===========================================
function renderTaskTemplateListSidebar() {
  var c = document.getElementById('tt-list'); if (!c) return;
  var tts = state.taskTemplates || [];
  if (!tts.length) { c.innerHTML = '<div class="placeholder-message" style="height:100px"><p>Нет шаблонов</p></div>'; return; }
  var h = '';
  tts.forEach(function(tt) {
    var colCount = (tt.columns || []).length;
    h += '<div class="template-item' + (tt.id === state.selectedTaskTemplateId ? ' active' : '') + '" onclick="selectTaskTemplate(\'' + tt.id + '\')">' +
      '<div class="template-item-name">' + escapeHtml(tt.name) + '</div>' +
      '<div class="template-item-meta">' + colCount + ' колонок</div>' +
    '</div>';
  });
  c.innerHTML = h;
}

function filterTaskTemplateList(q) {
  var items = document.querySelectorAll('#tt-list .template-item'); q = q.toLowerCase();
  for (var i = 0; i < items.length; i++) {
    items[i].style.display = items[i].querySelector('.template-item-name').textContent.toLowerCase().indexOf(q) !== -1 ? '' : 'none';
  }
}

function selectTaskTemplate(ttId) {
  state.selectedTaskTemplateId = ttId;
  var tt = (state.taskTemplates || []).find(function(x) { return x.id === ttId; });
  if (!tt) return;
  state.editingTaskTemplate = JSON.parse(JSON.stringify(tt));
  renderTaskTemplateListSidebar();
  document.getElementById('tt-placeholder').style.display = 'none';
  document.getElementById('tt-editor-content').style.display = 'block';
  document.getElementById('tt-name').value = tt.name || '';
  document.getElementById('tt-description').value = tt.description || '';
  renderTTClientTags();
  renderTTColumnsGrid();
  populateTTTemplateSelect();
  if (tt.template_id) {
    document.getElementById('tt-template-select').value = tt.template_id;
  }
  document.getElementById('tt-system-prompt').value = tt.local_system_prompt || '';
  document.getElementById('tt-user-prompt').value = tt.local_user_prompt || '';
  if (tt.llm_provider && tt.llm_model) {
    document.getElementById('tt-llm-select').value = tt.llm_provider + '|' + tt.llm_model;
  }
  var opts = tt.options || {};
  document.getElementById('tt-opt-humanize').checked = !!opts.humanize;
  document.getElementById('tt-opt-uniqueness').checked = !!opts.uniqueness;
  document.getElementById('tt-opt-factcheck').checked = !!opts.factcheck;
  document.getElementById('tt-opt-ai-detector').checked = !!opts.ai_detector;
  document.getElementById('tt-drive-folder').value = tt.drive_folder || '';
}

function createNewTaskTemplate() {
  state.selectedTaskTemplateId = null;
  state.editingTaskTemplate = {
    columns: [
      { key: 'url', label: 'URL', type: 'short', required: false },
      { key: 'keywords', label: 'Ключевые слова', type: 'short', required: false },
      { key: 'topic', label: 'Тема', type: 'short', required: false }
    ],
    client_ids: [],
    options: {}
  };
  document.getElementById('tt-placeholder').style.display = 'none';
  document.getElementById('tt-editor-content').style.display = 'block';
  document.getElementById('tt-name').value = '';
  document.getElementById('tt-description').value = '';
  document.getElementById('tt-system-prompt').value = '';
  document.getElementById('tt-user-prompt').value = '';
  document.getElementById('tt-drive-folder').value = '';
  document.getElementById('tt-opt-humanize').checked = false;
  document.getElementById('tt-opt-uniqueness').checked = true;
  document.getElementById('tt-opt-factcheck').checked = false;
  document.getElementById('tt-opt-ai-detector').checked = false;
  renderTTClientTags();
  renderTTColumnsGrid();
  populateTTTemplateSelect();
  renderTaskTemplateListSidebar();
}

function saveCurrentTaskTemplate() {
  var name = document.getElementById('tt-name').value.trim();
  if (!name) { showToast('Укажите название', 'error'); return; }
  var et = state.editingTaskTemplate || {};
  var lSel = document.getElementById('tt-llm-select');
  var parts = lSel.value.split('|');
  var tSel = document.getElementById('tt-template-select');
  var data = {
    name: name,
    description: document.getElementById('tt-description').value.trim(),
    columns: et.columns || [],
    client_ids: et.client_ids || [],
    template_id: tSel.value || '',
    local_system_prompt: document.getElementById('tt-system-prompt').value || '',
    local_user_prompt: document.getElementById('tt-user-prompt').value || '',
    llm_provider: parts[0] || '',
    llm_model: parts[1] || '',
    options: {
      humanize: document.getElementById('tt-opt-humanize').checked,
      uniqueness: document.getElementById('tt-opt-uniqueness').checked,
      factcheck: document.getElementById('tt-opt-factcheck').checked,
      ai_detector: document.getElementById('tt-opt-ai-detector').checked
    },
    drive_folder: document.getElementById('tt-drive-folder').value
  };
  if (state.selectedTaskTemplateId) data.id = state.selectedTaskTemplateId;
  google.script.run.withSuccessHandler(function(s) {
    showToast('Шаблон задачи сохранён', 'success');
    state.selectedTaskTemplateId = s.id;
    google.script.run.withSuccessHandler(function(list) {
      state.taskTemplates = list || [];
      renderTaskTemplateListSidebar();
      selectTaskTemplate(s.id);
    }).getTaskTemplates();
  }).withFailureHandler(function(e) { showToast(e.message, 'error'); }).saveTaskTemplate(data);
}

function deleteCurrentTaskTemplate() {
  if (!state.selectedTaskTemplateId) return;
  if (!confirm('Удалить шаблон задачи?')) return;
  google.script.run.withSuccessHandler(function() {
    showToast('Удалён', 'success');
    state.selectedTaskTemplateId = null;
    state.editingTaskTemplate = null;
    document.getElementById('tt-editor-content').style.display = 'none';
    document.getElementById('tt-placeholder').style.display = 'block';
    google.script.run.withSuccessHandler(function(list) {
      state.taskTemplates = list || [];
      renderTaskTemplateListSidebar();
    }).getTaskTemplates();
  }).withFailureHandler(function(e) { showToast(e.message, 'error'); }).deleteTaskTemplate(state.selectedTaskTemplateId);
}

// --- Client tags for task template ---
function renderTTClientTags() {
  var c = document.getElementById('tt-client-tags'); if (!c) return;
  var et = state.editingTaskTemplate || {};
  var linked = et.client_ids || [];
  var h = '';
  (state.clients || []).forEach(function(cl) {
    var isLinked = linked.indexOf(cl.id) !== -1;
    h += '<span class="tt-client-tag' + (isLinked ? ' active' : '') + '" onclick="toggleTTClient(\'' + cl.id + '\')">' + escapeHtml(cl.name) + '</span>';
  });
  if (!state.clients.length) h = '<span class="text-secondary">Нет клиентов</span>';
  c.innerHTML = h;
}

function toggleTTClient(clientId) {
  var et = state.editingTaskTemplate; if (!et) return;
  if (!et.client_ids) et.client_ids = [];
  var idx = et.client_ids.indexOf(clientId);
  if (idx === -1) { et.client_ids.push(clientId); }
  else { et.client_ids.splice(idx, 1); }
  renderTTClientTags();
}

// --- Columns for task template ---
function renderTTColumnsGrid() {
  var grid = document.getElementById('tt-columns-grid'); if (!grid) return;
  var et = state.editingTaskTemplate || {};
  var cols = et.columns || [];
  var typeLabels = { short: 'строка', long: 'текст' };
  var h = '';
  cols.forEach(function(col, i) {
    var reqBadge = col.required ? '<span class="column-card-required">обяз.</span>' : '';
    h += '<div class="column-card">' +
      '<button class="column-card-delete" onclick="removeTTColumn(' + i + ')" title="Удалить">&times;</button>' +
      '<div class="column-card-top">' +
        '<span class="column-card-name">' + escapeHtml(col.label) + '</span>' +
        reqBadge +
        '<span class="column-card-type">' + escapeHtml(typeLabels[col.type] || col.type) + '</span>' +
      '</div>' +
      '<div class="column-card-variable">' +
        '<span class="column-card-var-tag">{{' + escapeHtml(col.key) + '}}</span>' +
      '</div>' +
    '</div>';
  });
  grid.innerHTML = h;
}

function confirmAddTTColumn() {
  var label = document.getElementById('tt-new-col-label').value.trim();
  var type = document.getElementById('tt-new-col-type').value;
  var required = document.getElementById('tt-new-col-required').checked;
  if (!label) { showToast('Укажите название', 'error'); return; }
  var key = generateColumnKey(label);
  var et = state.editingTaskTemplate; if (!et) return;
  if (!et.columns) et.columns = [];
  var exists = et.columns.some(function(c) { return c.key === key; });
  if (exists) key = key + '_' + Date.now();
  et.columns.push({ key: key, label: label, type: type, required: required });
  closeModal('modal-tt-addcolumn');
  document.getElementById('tt-new-col-label').value = '';
  document.getElementById('tt-new-col-required').checked = false;
  renderTTColumnsGrid();
}

function removeTTColumn(index) {
  if (!confirm('Удалить колонку?')) return;
  var et = state.editingTaskTemplate; if (!et || !et.columns) return;
  et.columns.splice(index, 1);
  renderTTColumnsGrid();
}

// --- Template select for task template editor ---
function populateTTTemplateSelect() {
  var sel = document.getElementById('tt-template-select'); if (!sel) return;
  var h = '<option value="">— Без шаблона промта —</option>';
  state.templates.forEach(function(t) { h += '<option value="' + t.id + '">' + escapeHtml(t.name) + '</option>'; });
  sel.innerHTML = h;
}

function onTTTemplateChange() {
  var sel = document.getElementById('tt-template-select');
  var tpl = state.templates.find(function(t) { return t.id === sel.value; });
  if (tpl) {
    document.getElementById('tt-system-prompt').value = tpl.system_prompt || '';
    document.getElementById('tt-user-prompt').value = tpl.user_prompt || '';
  }
}

// ===========================================
// Модалка выбора шаблона при создании задачи — с фильтром по клиенту
// ===========================================
function renderTaskTemplateList() {
  var c = document.getElementById('task-template-list'); if (!c) return;
  var filterEl = document.getElementById('task-tpl-client-filter');
  var filterOn = filterEl ? filterEl.checked : false;
  var tts = state.taskTemplates || [];
  if (filterOn && state.selectedClientId) {
    tts = tts.filter(function(tt) {
      return (tt.client_ids || []).indexOf(state.selectedClientId) !== -1;
    });
  }
  if (!tts.length) {
    c.innerHTML = '<div class="placeholder-message" style="height:100px;grid-column:1/-1;"><p>' + (filterOn ? 'Нет шаблонов для этого клиента' : 'Нет сохранённых шаблонов задач') + '</p></div>';
    return;
  }
  var h = '';
  tts.forEach(function(tt) {
    var colTags = (tt.columns || []).map(function(col) { return '<span class="task-template-card-tag">' + escapeHtml(col.label) + '</span>'; }).join('');
    var tplName = '—';
    if (tt.template_id) { var tpl = state.templates.find(function(x) { return x.id === tt.template_id; }); if (tpl) tplName = tpl.name; }
    h += '<div class="task-template-card" onclick="createTaskFromTemplate(\'' + tt.id + '\')">' +
      '<div class="task-template-card-name">' + escapeHtml(tt.name) + '</div>' +
      '<div class="task-template-card-desc">' + escapeHtml(tt.description || '') + '</div>' +
      '<div class="task-template-card-meta">' +
        '<span class="task-template-card-tag" style="background:#EBF5FF;color:#1A5FB4;">' + escapeHtml(tplName) + '</span>' +
        '<span class="task-template-card-tag">' + escapeHtml(tt.llm_model || '—') + '</span>' +
        colTags +
      '</div>' +
    '</div>';
  });
  c.innerHTML = h;
}
