<script>
// ===========================================
// scripts_core.html — Стан, роутер, утиліти
// ===========================================

// --- Глобальний стан ---
var state = {
  clients: [],
  taskTemplates: [],
  selectedClientId: null,
  dashboardTasks: [],
  currentTask: null,
  currentTexts: [],
  lastGeneratedText: null,
  editorText: null,
  editorTaskId: null,
  activeBlockIndex: -1,
  regenBlockIndex: -1,
  selectedTemplateId: null,
  tplClientIds: [],
  // Нові поля для wizard / task list
  allTasks: [],
  tasksSort: 'updated',
  filterClientId: null,
  currentWizardStep: 1,
  // --- TTL-кеші ---
  _allTasksFetchedAt: 0,
  _clientsFetchedAt: 0,
  _initialDataLoaded: false
};

// --- TTL-кеш константи ---
var CACHE_TTL_MS = 30000; // 30 секунд

// --- Skeleton helper ---
function skeletonTaskCards(count) {
  var h = '';
  for (var i = 0; i < (count || 6); i++) {
    h += '<div class="task-card" style="pointer-events:none;">' +
      '<div class="skeleton skeleton-title" style="width:65%;"></div>' +
      '<div class="skeleton skeleton-text" style="width:90%;"></div>' +
      '<div class="skeleton skeleton-text" style="width:75%;"></div>' +
      '<div style="display:flex;gap:6px;margin-top:10px;">' +
        '<div class="skeleton" style="width:55px;height:16px;border-radius:999px;"></div>' +
        '<div class="skeleton" style="width:70px;height:16px;border-radius:999px;"></div>' +
      '</div>' +
    '</div>';
  }
  return h;
}

function skeletonClientCards(count) {
  var h = '';
  for (var i = 0; i < (count || 4); i++) {
    h += '<div class="client-card" style="pointer-events:none;">' +
      '<div style="display:flex;gap:12px;align-items:flex-start;">' +
        '<div class="skeleton" style="width:40px;height:40px;border-radius:10px;"></div>' +
        '<div style="flex:1;">' +
          '<div class="skeleton skeleton-title" style="width:70%;"></div>' +
          '<div class="skeleton skeleton-text" style="width:55%;"></div>' +
        '</div>' +
      '</div>' +
      '<div class="skeleton" style="width:70px;height:18px;border-radius:999px;margin-top:8px;"></div>' +
    '</div>';
  }
  return h;
}

function isCacheFresh(timestamp) {
  return timestamp && (Date.now() - timestamp < CACHE_TTL_MS);
}

function invalidateTasksCache() {
  state._allTasksFetchedAt = 0;
}

function invalidateClientsCache() {
  state._clientsFetchedAt = 0;
}

// --- Prefetch тасків на hover (кеш у state._prefetchedTasks) ---
state._prefetchedTasks = state._prefetchedTasks || {};
var _prefetchTimer = null;
function prefetchTask(taskId) {
  if (!taskId || state._prefetchedTasks[taskId]) return;
  clearTimeout(_prefetchTimer);
  _prefetchTimer = setTimeout(function() {
    google.script.run.withSuccessHandler(function(task) {
      if (task) state._prefetchedTasks[taskId] = task;
    }).withFailureHandler(function() { /* ignore */ }).getTask(taskId);
  }, 150); // невелика затримка — не стріляємо на миттєвих hover
}

// --- Утиліта: debounce ---
function debounce(fn, delay) {
  var timer = null;
  return function() {
    var ctx = this, args = arguments;
    clearTimeout(timer);
    timer = setTimeout(function() { fn.apply(ctx, args); }, delay);
  };
}

// --- Autosave індикатор ---

var _autosaveTimer = null;
function showAutosaveStatus(status) {
  var el = document.getElementById('autosave-status');
  if (!el) return;
  if (status === 'saving') {
    el.textContent = 'Зберігається...';
    el.className = 'autosave-indicator saving';
  } else if (status === 'saved') {
    el.textContent = 'Збережено ✓';
    el.className = 'autosave-indicator saved';
    clearTimeout(_autosaveTimer);
    _autosaveTimer = setTimeout(function() { el.className = 'autosave-indicator'; el.textContent = ''; }, 2000);
  } else if (status === 'error') {
    el.textContent = 'Помилка збереження';
    el.className = 'autosave-indicator error';
  }
}

// --- Screen transition ---
function showScreenLoader() {
  var el = document.getElementById('screen-loader');
  if (el) el.style.display = 'flex';
}
function hideScreenLoader() {
  var el = document.getElementById('screen-loader');
  if (el) el.style.display = 'none';
}

// --- Ініціалізація ---
document.addEventListener('DOMContentLoaded', function() {
  restoreSidebarState();
  loadInitialData();
  handleHashRoute();
  window.addEventListener('hashchange', handleHashRoute);
});

function loadInitialData(force) {
  // TTL-кеш: якщо дані свіжі й не force — не качаємо
  if (!force && isCacheFresh(state._clientsFetchedAt) && state.clients.length) {
    if (typeof renderClientList === 'function') renderClientList();
    if (typeof renderClientsTable === 'function') renderClientsTable();
    updateSidebarCounts();
    var hash = window.location.hash || '#dashboard';
    if (hash === '#dashboard' && typeof renderDashboardOverview === 'function') {
      renderDashboardOverview();
    }
    return;
  }

  // Один RPC замість двох+N — паралельна batch-підкачка на сервері
  google.script.run.withSuccessHandler(function(data) {
    data = data || {};
    state.clients = data.clients || [];
    state.taskTemplates = data.templates || [];
    state.allTasks = data.tasks || [];
    var now = Date.now();
    state._clientsFetchedAt = now;
    state._allTasksFetchedAt = now;
    state._initialDataLoaded = true;

    // Оновити всі UI елементи, що залежать від state
    if (typeof renderClientList === 'function') renderClientList();
    if (typeof renderClientsTable === 'function') renderClientsTable();
    updateSidebarCounts();

    var tplCountEl = document.getElementById('stat-templates-count');
    if (tplCountEl) tplCountEl.textContent = state.taskTemplates.length;

    // Перерендерити поточну сторінку якщо вона використовує ці дані
    var hash = window.location.hash || '#dashboard';
    if (hash === '#dashboard' && typeof renderDashboardOverview === 'function') {
      renderDashboardOverview();
    } else if (hash === '#tasks' && typeof renderTasksPage === 'function') {
      renderTasksPage();
    }
  }).withFailureHandler(function(e) {
    console.error('getBootstrap error, fallback to legacy:', e);
    // Fallback: окремі виклики (для сумісності якщо Handlers.gs ще старий)
    _loadInitialDataLegacy();
  }).getBootstrap();

  renderRecentTasks();
}

// Fallback (якщо getBootstrap недоступний)
function _loadInitialDataLegacy() {
  google.script.run.withSuccessHandler(function(clients) {
    state.clients = clients || [];
    state._clientsFetchedAt = Date.now();
    state._initialDataLoaded = true;
    if (typeof renderClientList === 'function') renderClientList();
    if (typeof renderClientsTable === 'function') renderClientsTable();
    updateSidebarCounts();
    var hash = window.location.hash || '#dashboard';
    if (hash === '#dashboard' && typeof renderDashboardOverview === 'function') {
      renderDashboardOverview();
    }
  }).withFailureHandler(function(e) {
    console.error('loadClients error:', e);
  }).getClients();

  google.script.run.withSuccessHandler(function(tt) {
    state.taskTemplates = tt || [];
    var el = document.getElementById('stat-templates-count');
    if (el) el.textContent = tt.length;
  }).withFailureHandler(function(e) {
    console.error('loadTaskTemplates error:', e);
  }).getTaskTemplates();
}

// --- Sidebar counts (Задачі / Клієнти) ---
function updateSidebarCounts() {
  var clientsEl = document.getElementById('sidebar-clients-count');
  if (clientsEl && state.clients) {
    clientsEl.textContent = state.clients.length || '';
  }
  var tasksEl = document.getElementById('sidebar-tasks-count');
  if (tasksEl) {
    var total = 0;
    if (state.clients) {
      for (var i = 0; i < state.clients.length; i++) {
        total += (state.clients[i].tasks_count || 0);
      }
    }
    tasksEl.textContent = total || '';
  }
}

// --- Recent tasks (localStorage) ---
function pushRecentTask(taskId, taskName) {
  if (!taskId) return;
  try {
    var key = 'tg_recent_tasks';
    var list = JSON.parse(localStorage.getItem(key) || '[]');
    list = list.filter(function(t) { return t.id !== taskId; });
    list.unshift({ id: taskId, name: taskName || 'Задача', ts: Date.now() });
    if (list.length > 5) list = list.slice(0, 5);
    localStorage.setItem(key, JSON.stringify(list));
    renderRecentTasks();
  } catch (e) {}
}

function renderRecentTasks() {
  var host = document.getElementById('sidebar-recent');
  if (!host) return;
  var list = [];
  try { list = JSON.parse(localStorage.getItem('tg_recent_tasks') || '[]'); } catch (e) {}
  var html = '<div class="sidebar-section-title">Нещодавнє</div>';
  if (!list.length) {
    html += '<div class="sidebar-recent-item" style="color:var(--text-muted); cursor:default;"><span style="opacity:.6;">порожньо</span></div>';
  } else {
    for (var i = 0; i < list.length; i++) {
      var t = list[i];
      html += '<div class="sidebar-recent-item" onclick="navigateTo(\'#task/' + escapeHtml(t.id) + '\')" title="' + escapeHtml(t.name) + '">' + escapeHtml(t.name) + '</div>';
    }
  }
  host.innerHTML = html;
}

// --- Роутер ---
function handleHashRoute() {
  var hash = window.location.hash || '#dashboard';
  var parts = hash.split('/');
  var screen = parts[0];

  hideAllScreens();
  updateActiveNav(screen);

  switch (screen) {
    case '#dashboard':
      showScreen('screen-dashboard');
      if (typeof renderDashboardOverview === 'function') renderDashboardOverview();
      break;
    case '#tasks':
      showScreen('screen-tasks');
      if (typeof renderTasksPage === 'function') renderTasksPage();
      break;
    case '#clients':
      showScreen('screen-clients');
      renderClientsTable();
      break;
    case '#templates':
      showScreen('screen-templates');
      renderTemplateList();
      break;
    case '#task':
      showScreen('screen-task');
      if (parts[1]) {
        showScreenLoader();
        loadTaskScreen(parts[1]);
      }
      break;
    case '#editor':
      showScreen('screen-editor');
      if (parts[1] && parts[2]) {
        showScreenLoader();
        loadEditorScreen(parts[1], parts[2]);
      }
      break;
    default:
      showScreen('screen-dashboard');
  }
}

function navigateTo(hash) {
  window.location.hash = hash;
}

function hideAllScreens() {
  var s = document.querySelectorAll('.screen');
  for (var i = 0; i < s.length; i++) s[i].style.display = 'none';
}

function showScreen(id) {
  var el = document.getElementById(id);
  if (el) el.style.display = 'block';
}

function updateActiveNav(hash) {
  // Підсвітка активного пункту sidebar (і старих .nav-tab для сумісності)
  var items = document.querySelectorAll('[data-hash]');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.remove('active');
    if (items[i].getAttribute('data-hash') === hash) items[i].classList.add('active');
  }
  // #task — також підсвічуємо "Задачі" в sidebar
  if (hash === '#task') {
    var tasksItem = document.querySelector('[data-hash="#tasks"]');
    if (tasksItem) tasksItem.classList.add('active');
  }
}

// --- Sidebar toggle (collapsed / expanded) ---
function toggleSidebar() {
  var sb = document.getElementById('app-sidebar');
  if (!sb) return;
  sb.classList.toggle('collapsed');
  try {
    localStorage.setItem('tg_sidebar_collapsed', sb.classList.contains('collapsed') ? '1' : '0');
  } catch (e) {}
}

function restoreSidebarState() {
  try {
    if (localStorage.getItem('tg_sidebar_collapsed') === '1') {
      var sb = document.getElementById('app-sidebar');
      if (sb) sb.classList.add('collapsed');
    }
  } catch (e) {}
}

// --- Toast ---
function showToast(msg, type) {
  type = type || 'info';
  var c = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.remove(); }, 3500);
}

// --- Модалки ---

function openModal(id) {
  document.getElementById(id).style.display = 'flex';
}

function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}

// --- Утиліти ---
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatDate(d) {
  if (!d) return '—';
  var x = new Date(d);
  return ('0' + x.getDate()).slice(-2) + '.' + ('0' + (x.getMonth() + 1)).slice(-2) + '.' + x.getFullYear();
}

function formatDateTime(d) {
  if (!d) return '—';
  var x = new Date(d);
  return ('0' + x.getDate()).slice(-2) + '.' + ('0' + (x.getMonth() + 1)).slice(-2) + '.' + x.getFullYear() +
    ' ' + ('0' + x.getHours()).slice(-2) + ':' + ('0' + x.getMinutes()).slice(-2);
}

function truncate(str, max) {
  if (!str) return '';
  return str.length > max ? str.substring(0, max) + '...' : str;
}

// --- Парсинг HTML у блоки ---
function parseContentToBlocks(html) {
  if (!html) return [];
  var div = document.createElement('div');
  div.innerHTML = html;
  var blocks = [];
  var children = div.childNodes;

  for (var i = 0; i < children.length; i++) {
    var node = children[i];
    if (node.nodeType === 3) {
      // текстовий вузол
      var text = node.textContent.trim();
      if (text) {
        blocks.push({ id: 'b_' + Date.now() + '_' + i, type: 'paragraph', tag: 'p', content: text });
      }
    } else if (node.nodeType === 1) {
      var tagName = node.tagName.toLowerCase();
      if (tagName === 'h1' || tagName === 'h2' || tagName === 'h3') {
        blocks.push({ id: 'b_' + Date.now() + '_' + i, type: 'heading', tag: tagName, content: node.innerHTML });
      } else if (tagName === 'ul' || tagName === 'ol') {
        blocks.push({ id: 'b_' + Date.now() + '_' + i, type: 'list', tag: tagName, content: node.outerHTML });
      } else if (tagName === 'p') {
        blocks.push({ id: 'b_' + Date.now() + '_' + i, type: 'paragraph', tag: 'p', content: node.innerHTML });
      } else {
        // div, section тощо — рекурсивно беремо вміст
        var inner = node.innerHTML.trim();
        if (inner) {
          blocks.push({ id: 'b_' + Date.now() + '_' + i, type: 'paragraph', tag: 'p', content: inner });
        }
      }
    }
  }

  return blocks;
}

// --- Збирання контенту з блоків ---
function buildContentFromBlocks(blocks) {
  return blocks.map(function(b) {
    if (b.type === 'heading') return '<' + b.tag + '>' + b.content + '</' + b.tag + '>';
    if (b.type === 'list') return b.content;
    return '<p>' + b.content + '</p>';
  }).join('\n');
}

// --- Генерація фейкового контенту (симуляція) ---
function generateFakeContent(userInput) {
  var topic = userInput || 'Текст';
  if (topic.length > 80) topic = topic.substring(0, 80);
  return '<h1>' + escapeHtml(topic) + '</h1>\n' +
    '<p>У цій статті розглянемо ключові аспекти теми «' + escapeHtml(topic) + '». Це важлива тема, що заслуговує на детальний аналіз.</p>\n' +
    '<h2>Основні критерії</h2>\n' +
    '<p>Сучасний ринок пропонує безліч рішень. Розглянемо кожне з них детальніше, щоб ви могли зробити оптимальний вибір.</p>\n' +
    '<p>Під час вибору зверніть увагу на якість, ціну та відгуки інших користувачів. Ці три фактори є визначальними.</p>\n' +
    '<h2>Практичні рекомендації</h2>\n' +
    '<p>Використовуйте наші рекомендації для досягнення кращих результатів. Кожна порада перевірена на практиці.</p>\n' +
    '<h2>Висновок</h2>\n' +
    '<p>Використовуйте інформацію з цієї статті для оптимального вибору. Ми впевнені, що наші поради допоможуть вам ухвалити правильне рішення.</p>';
}

// --- Збирання промпта з полів ---
function assemblePrompt(promptTemplate, fieldValues) {
  if (!promptTemplate && !fieldValues) return '';
  var result = promptTemplate || '';
  var usedKeys = {};
  var fieldLabels = {
    url: 'URL сторінки', keywords: 'Анкор', topic: 'Тема / H1',
    language: 'Мова', volume: "Об'єм (збп)"
  };

  // 1. Підставити {{змінні}} в шаблон
  for (var key in fieldValues) {
    var val = fieldValues[key];
    if (Array.isArray(val)) {
      val = val.filter(function(v) { return v && v.trim(); }).join('\n');
    }
    var regex = new RegExp('\\{\\{' + key + '\\}\\}', 'g');
    if (regex.test(result)) {
      result = result.replace(regex, val || '');
      usedKeys[key] = true;
    }
  }
  // Видалити невикористані змінні
  result = result.replace(/\{\{\w+\}\}/g, '');

  // 2. Усі поля, які НЕ потрапили через {{змінні}} — додати в кінець
  var extras = [];
  for (var k in fieldValues) {
    if (usedKeys[k]) continue;
    var v = fieldValues[k];
    if (Array.isArray(v)) {
      v = v.filter(function(x) { return x && x.trim(); }).join('; ');
    }
    if (!v || !String(v).trim()) continue;
    var label = fieldLabels[k] || k;
    extras.push(label + ': ' + v);
  }
  if (extras.length) {
    result += '\n\nДодаткові дані:\n' + extras.join('\n');
  }

  // 3. Жорсткі інструкції щодо обʼєму (якщо заданий)
  var volumeInstruction = buildVolumeInstruction(fieldValues && fieldValues.volume);
  if (volumeInstruction) {
    result += '\n\n' + volumeInstruction;
  }

  return result.trim();
}

// --- Жорсткі інструкції щодо обʼєму ---
// Парсить "2500-3000", "2500–3000", "2500", "~2500" та повертає інструкцію
function buildVolumeInstruction(volumeStr) {
  if (!volumeStr) return '';
  var str = String(volumeStr).replace(/\s+/g, '').replace(/знб|збп|зн\./gi, '');
  var min = null, max = null;

  // Діапазон: 2500-3000, 2500–3000, 2500—3000
  var rangeMatch = str.match(/(\d{3,6})[\-\u2013\u2014](\d{3,6})/);
  if (rangeMatch) {
    min = parseInt(rangeMatch[1], 10);
    max = parseInt(rangeMatch[2], 10);
  } else {
    // Одиночне значення: 2500, ~2500
    var singleMatch = str.match(/(\d{3,6})/);
    if (singleMatch) {
      var n = parseInt(singleMatch[1], 10);
      min = Math.round(n * 0.95);
      max = Math.round(n * 1.05);
    }
  }

  if (!min || !max) return '';
  var target = Math.round((min + max) / 2);

  return '=== КРИТИЧНА ВИМОГА ДО ОБʼЄМУ ===\n' +
    'Цільовий обʼєм тексту: ' + min + '–' + max + ' знаків із пробілами (збп).\n' +
    'Оптимально: ~' + target + ' збп.\n\n' +
    'ПРАВИЛА:\n' +
    '1. НЕ перевищуй ' + max + ' збп за жодних обставин.\n' +
    '2. НЕ пиши менше ' + min + ' збп.\n' +
    '3. Перед відповіддю порахуй приблизний обсяг (символи + пробіли).\n' +
    '4. Якщо тема широка — зосередься на найважливішому, не розширюй штучно.\n' +
    '5. Якщо тема вузька — додай конкретні приклади, факти, деталі, НЕ воду.\n' +
    '6. Заголовки (H1, H2, H3) входять в загальний обсяг.\n' +
    '7. Баланс: вступ ~10%, основні H2-розділи ~75-80%, висновок ~10-15%.\n' +
    '8. Якщо текст виходить >' + max + ' — скороти другорядні деталі, але зберігай структуру.\n' +
    '9. Якщо текст <' + min + ' — додай глибину експертних деталей, а НЕ загальні фрази.\n' +
    '10. Абзаци: 3-5 речень кожен, не більше.';
}

// --- Генерація ключа з назви ---
function generateFlexKey(label) {
  var cyr = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'shch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya','і':'i','ї':'yi','є':'ye','ґ':'g'};
  var r = label.toLowerCase().trim(), out = '';
  for (var i = 0; i < r.length; i++) {
    var c = r[i];
    if (cyr[c]) out += cyr[c];
    else if (/[a-z0-9]/.test(c)) out += c;
    else if (c === ' ' || c === '-' || c === '_') out += '_';
  }
  out = out.replace(/_+/g, '_').replace(/^_|_$/g, '');
  return out || ('block_' + Date.now());
}

// --- Мультиселект ---

function toggleMultiselect(boxId) {
  var dd = document.getElementById(boxId + '-dropdown');
  if (!dd) return;
  dd.style.display = dd.style.display === 'none' ? 'flex' : 'none';
}

function filterMultiselectOptions(dropdownId, q) {
  var opts = document.querySelectorAll('#' + dropdownId + ' .multiselect-option');
  q = q.toLowerCase();
  for (var i = 0; i < opts.length; i++) {
    opts[i].classList.toggle('hidden', opts[i].textContent.toLowerCase().indexOf(q) === -1);
  }
}

function getMultiselectSelected(optionsId) {
  var opts = document.querySelectorAll('#' + optionsId + ' input[type="checkbox"]:checked');
  var r = [];
  for (var i = 0; i < opts.length; i++) r.push(opts[i].value);
  return r;
}

// Close dropdowns on outside click
document.addEventListener('click', function(e) {
  var dds = document.querySelectorAll('.multiselect-dropdown');
  for (var i = 0; i < dds.length; i++) {
    var boxId = dds[i].id.replace('-dropdown', '');
    var box = document.getElementById(boxId);
    if (box && !box.contains(e.target) && !dds[i].contains(e.target)) {
      dds[i].style.display = 'none';
    }
  }
});
