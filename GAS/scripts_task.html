<script>
// ===========================================
// scripts_task.html - Экран задачи, генерация, история
// ===========================================

function loadTaskScreen(taskId) {
  google.script.run.withSuccessHandler(function(task) {
    if (!task) { showToast('Задачу не знайдено', 'error'); hideScreenLoader(); return; }
    state.currentTask = task;
    state.lastGeneratedText = null;

    // Заполнить UI
    document.getElementById('task-name-input').value = task.name || '';
    document.getElementById('task-breadcrumb-name').textContent = task.name || '';
    document.getElementById('task-system-prompt').value = task.system_prompt || '';
    document.getElementById('task-user-prompt').value = task.user_prompt || '';

    // Шаблон
    var tplName = '—';
    if (task.template_id) {
      var tpl = (state.taskTemplates || []).find(function(x) { return x.id == task.template_id; });
      if (tpl) tplName = tpl.name;
    }
    document.getElementById('task-template-name').textContent = tplName;

    // LLM
    if (task.llm_provider && task.llm_model) {
      document.getElementById('task-llm-select').value = task.llm_provider + '|' + task.llm_model;
    }

    // Опции
    var opts = task.options || {};
    document.getElementById('task-opt-humanize').checked = !!opts.humanize;
    document.getElementById('task-opt-uniqueness').checked = !!opts.uniqueness;
    document.getElementById('task-opt-factcheck').checked = !!opts.factcheck;
    document.getElementById('task-opt-ai-detector').checked = !!opts.ai_detector;
    document.getElementById('task-opt-voice-clone').checked = !!opts.voice_clone;
    document.getElementById('task-opt-interview').checked = !!opts.interview;
    document.getElementById('task-opt-draft-review').checked = !!opts.draft_review;

    // Клиент в хлебных крошках
    google.script.run.withSuccessHandler(function(clients) {
      var cl = (clients || []).find(function(c) { return c.id == task.client_id; });
      document.getElementById('task-breadcrumb-client').textContent = cl ? cl.name : '';
    }).getClients();

    // Рендер core fields
    renderCoreFields();

    // Спеціаліст email
    document.getElementById('task-specialist-email').value = task.specialist_email || '';

    // Рендер flex blocks
    renderFlexToggleBar();
    renderActiveFlexBlocks();

    // Заполнить field values
    populateFieldValues();

    // Обновить превью промптов
    updatePromptPreviews();

    // Сбросить UI генерации
    document.getElementById('gen-result').style.display = 'none';
    document.getElementById('gen-loading').style.display = 'none';
    document.getElementById('gen-user-input').value = '';

    switchTaskTab('generate');
    loadTaskHistory(taskId);
    hideScreenLoader();
  }).getTask(taskId);
}

// --- Core Fields ---
function renderCoreFields() {
  var task = state.currentTask;
  if (!task) return;
  var cf = task.core_fields || { url: true, keywords: true, topic: true, language: true, volume: true };

  var fields = ['url', 'keywords', 'topic', 'language', 'volume'];
  for (var fi = 0; fi < fields.length; fi++) {
    var el = document.getElementById('cf-' + fields[fi]);
    if (el) el.style.display = cf[fields[fi]] ? '' : 'none';
  }
}

function populateFieldValues() {
  var task = state.currentTask;
  if (!task) return;
  var fv = task.field_values || {};

  // Core fields
  if (fv.url) document.getElementById('fv-url').value = fv.url;
  if (fv.keywords) document.getElementById('fv-keywords').value = fv.keywords;
  if (fv.topic) document.getElementById('fv-topic').value = fv.topic;
  if (fv.language) document.getElementById('fv-language').value = fv.language;
  if (fv.volume) document.getElementById('fv-volume').value = fv.volume;
}

// --- Flex Blocks ---
function renderFlexToggleBar() {
  // Now uses dropdown instead — render dropdown list
  renderFlexDropdownList();
}

// --- Хранилище раскрытых блоков и режимов ---
var _expandedFlexBlocks = {};
var _editingFlexBlocks = {};

function toggleFlexDropdown() {
  var dd = document.getElementById('flex-dropdown-list');
  if (!dd) return;
  var isHidden = dd.style.display === 'none';
  dd.style.display = isHidden ? 'block' : 'none';
  if (isHidden) renderFlexDropdownList();
}

// Close flex dropdown on outside click
document.addEventListener('click', function(e) {
  var dd = document.getElementById('flex-dropdown-list');
  var toggle = document.querySelector('.flex-dropdown-toggle');
  if (dd && toggle && dd.style.display === 'block' &&
      !dd.contains(e.target) && !toggle.contains(e.target)) {
    dd.style.display = 'none';
  }
});

function renderFlexDropdownList() {
  var dd = document.getElementById('flex-dropdown-list');
  if (!dd || !state.currentTask) return;
  var blocks = state.currentTask.flex_blocks || [];
  var active = state.currentTask.active_flex_blocks || [];

  var h = '';
  for (var i = 0; i < blocks.length; i++) {
    var b = blocks[i];
    var checked = active.indexOf(b.key) !== -1 ? ' checked' : '';
    h += '<label><input type="checkbox" value="' + b.key + '"' + checked + ' onchange="onFlexDropdownChange(\'' + b.key + '\',this.checked)"> ' + escapeHtml(b.label) + '</label>';
  }
  dd.innerHTML = h || '<div style="padding:8px 12px;color:#AAA;font-size:12px;">Немає блоків</div>';
  updateFlexDropdownLabel();
}

function onFlexDropdownChange(key, checked) {
  var task = state.currentTask;
  if (!task) return;
  if (!task.active_flex_blocks) task.active_flex_blocks = [];
  var idx = task.active_flex_blocks.indexOf(key);
  if (checked && idx === -1) task.active_flex_blocks.push(key);
  if (!checked && idx !== -1) task.active_flex_blocks.splice(idx, 1);
  updateFlexDropdownLabel();
  renderActiveFlexBlocks();
  autoSaveTask();
}

function updateFlexDropdownLabel() {
  var label = document.getElementById('flex-dropdown-label');
  if (!label || !state.currentTask) return;
  var active = state.currentTask.active_flex_blocks || [];
  var blocks = state.currentTask.flex_blocks || [];
  var total = blocks.length;
  if (active.length === 0) {
    label.textContent = 'Обрати блоки (' + total + ' доступно)';
    label.style.color = '#888';
  } else {
    label.textContent = 'Додаткові блоки: ' + active.length + ' з ' + total;
    label.style.color = '#1A1A1A';
  }
}

function renderActiveFlexBlocks() {
  var container = document.getElementById('flex-blocks-container');
  if (!container || !state.currentTask) return;

  var blocks = state.currentTask.flex_blocks || [];
  var active = state.currentTask.active_flex_blocks || [];
  var fv = state.currentTask.field_values || {};

  var h = '';
  for (var bi = 0; bi < blocks.length; bi++) {
    var b = blocks[bi];
    if (active.indexOf(b.key) === -1) continue;

    var val = fv[b.key] || '';
    var isExpanded = !!_expandedFlexBlocks[b.key];
    var hasValue = false;

    // Превью значения
    var preview = '';
    if (b.type === 'repeatable') {
      var items = val;
      if (!Array.isArray(items)) items = val ? [String(val)] : [];
      var filled = [];
      for (var ii = 0; ii < items.length; ii++) { if (items[ii] && items[ii].trim()) filled.push(items[ii].trim()); }
      hasValue = filled.length > 0;
      preview = hasValue ? filled.join('; ') : '';
    } else {
      hasValue = val && String(val).trim().length > 0;
      preview = hasValue ? String(val).trim() : '';
    }
    if (preview.length > 80) preview = preview.substring(0, 80) + '...';

    h += '<div class="flex-accordion-item' + (isExpanded ? ' expanded' : '') + '">';

    // Заголовок-строка (всегда видна)
    h += '<div class="flex-accordion-header" onclick="toggleFlexExpand(\'' + b.key + '\')">';
    h += '<div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">';
    h += '<span class="flex-accordion-chevron' + (isExpanded ? ' open' : '') + '">&#9654;</span>';
    h += '<span class="flex-accordion-label">' + escapeHtml(b.label) + '</span>';
    if (hasValue && !isExpanded) {
      h += '<span class="flex-accordion-preview">' + escapeHtml(preview) + '</span>';
    }
    h += '</div>';
    h += '<button class="flex-block-close" onclick="event.stopPropagation();toggleFlexBlock(\'' + b.key + '\')" title="Вимкнути">&times;</button>';
    h += '</div>';

    // Раскрывающееся тело
    if (isExpanded) {
      var isEditing = !hasValue || !!_editingFlexBlocks[b.key];
      h += '<div class="flex-accordion-body">';

      if (b.type === 'repeatable') {
        // Repeatable всегда в режиме редактирования
        var repItems = fv[b.key] || [''];
        if (!Array.isArray(repItems)) repItems = val ? [String(val)] : [''];
        h += '<div class="repeatable-list" id="rep-' + b.key + '">';
        for (var ri = 0; ri < repItems.length; ri++) {
          h += '<div class="repeatable-item">';
          h += '<span class="repeatable-item-prefix">' + (ri + 1) + '.</span>';
          h += '<input type="text" value="' + escapeHtml(repItems[ri]) + '" onchange="updateRepeatableItem(\'' + b.key + '\',' + ri + ',this.value)" placeholder="...">';
          h += '<button class="repeatable-remove" onclick="removeRepeatableItem(\'' + b.key + '\',' + ri + ')">&times;</button>';
          h += '</div>';
        }
        h += '</div>';
        h += '<button class="repeatable-add" onclick="addRepeatableItem(\'' + b.key + '\')">+ Ще</button>';
      } else if (hasValue && !isEditing) {
        // Readonly mode — показать текст + кнопка "Редагувати"
        h += '<div class="flex-readonly-value">' + escapeHtml(String(val)) + '</div>';
        h += '<div class="flex-readonly-actions">';
        h += '<button class="flex-edit-btn" onclick="event.stopPropagation();enableFlexEdit(\'' + b.key + '\')">Редагувати</button>';
        h += '</div>';
      } else {
        // Edit mode — textarea + кнопки підтвердження
        h += '<textarea id="flex-ta-' + b.key + '" placeholder="Введіть текст...">' + escapeHtml(val) + '</textarea>';
        h += '<div style="display:flex;justify-content:flex-end;gap:6px;margin-top:6px;">';
        h += '<button class="btn btn-sm" style="font-size:10px;" onclick="event.stopPropagation();cancelFlexEdit(\'' + b.key + '\')">Скасувати</button>';
        h += '<button class="btn btn-sm btn-primary" style="font-size:10px;" onclick="event.stopPropagation();confirmFlexEdit(\'' + b.key + '\')">Зберегти</button>';
        h += '</div>';
      }
      h += '</div>';
    }

    h += '</div>';
  }

  container.innerHTML = h;

  // Show/hide empty hint
  var emptyHint = document.getElementById('flex-empty-hint');
  if (emptyHint) {
    var activeCount = 0;
    for (var ci = 0; ci < blocks.length; ci++) {
      if (active.indexOf(blocks[ci].key) !== -1) activeCount++;
    }
    emptyHint.style.display = activeCount === 0 ? 'block' : 'none';
  }
}

function toggleFlexExpand(key) {
  _expandedFlexBlocks[key] = !_expandedFlexBlocks[key];
  if (!_expandedFlexBlocks[key]) _editingFlexBlocks[key] = false;
  renderActiveFlexBlocks();
}

function enableFlexEdit(key) {
  _editingFlexBlocks[key] = true;
  renderActiveFlexBlocks();
  setTimeout(function() {
    var ta = document.getElementById('flex-ta-' + key);
    if (ta) ta.focus();
  }, 50);
}

function confirmFlexEdit(key) {
  var ta = document.getElementById('flex-ta-' + key);
  if (ta) {
    updateFlexValue(key, ta.value);
  }
  _editingFlexBlocks[key] = false;
  renderActiveFlexBlocks();
  showToast('Збережено', 'success');
}

function saveSpecialistEmail() {
  if (!state.currentTask) return;
  state.currentTask.specialist_email = document.getElementById('task-specialist-email').value.trim();
  autoSaveTask();
}

function cancelFlexEdit(key) {
  _editingFlexBlocks[key] = false;
  renderActiveFlexBlocks();
}

function toggleFlexBlock(key) {
  var task = state.currentTask;
  if (!task) return;

  if (!task.active_flex_blocks) task.active_flex_blocks = [];
  var idx = task.active_flex_blocks.indexOf(key);
  if (idx !== -1) {
    task.active_flex_blocks.splice(idx, 1);
  } else {
    task.active_flex_blocks.push(key);
  }

  renderFlexToggleBar();
  renderActiveFlexBlocks();
  autoSaveTask();
}

// --- Repeatable items ---
function updateRepeatableItem(key, index, value) {
  var task = state.currentTask;
  if (!task) return;
  if (!task.field_values) task.field_values = {};
  if (!task.field_values[key]) task.field_values[key] = [];
  task.field_values[key][index] = value;
  autoSaveTask();
}

function addRepeatableItem(key) {
  var task = state.currentTask;
  if (!task) return;
  if (!task.field_values) task.field_values = {};
  if (!task.field_values[key]) task.field_values[key] = [];
  task.field_values[key].push('');
  renderActiveFlexBlocks();
  autoSaveTask();
}

function removeRepeatableItem(key, index) {
  var task = state.currentTask;
  if (!task || !task.field_values || !task.field_values[key]) return;
  task.field_values[key].splice(index, 1);
  if (task.field_values[key].length === 0) task.field_values[key] = [''];
  renderActiveFlexBlocks();
  autoSaveTask();
}

function updateFlexValue(key, value) {
  var task = state.currentTask;
  if (!task) return;
  if (!task.field_values) task.field_values = {};
  task.field_values[key] = value;
  autoSaveTask();
}

// --- Добавление пользовательского блока ---
function confirmAddFlexBlock() {
  var label = document.getElementById('new-flex-label').value.trim();
  var type = document.getElementById('new-flex-type').value;
  if (!label) { showToast('Вкажіть назву блоку', 'error'); return; }

  var key = generateFlexKey(label);
  var task = state.currentTask;
  if (!task) return;
  if (!task.flex_blocks) task.flex_blocks = [];

  // Проверить уникальность ключа
  var exists = task.flex_blocks.some(function(b) { return b.key === key; });
  if (exists) key = key + '_' + Date.now();

  task.flex_blocks.push({ key: key, label: label, type: type, enabled: true });
  if (!task.active_flex_blocks) task.active_flex_blocks = [];
  task.active_flex_blocks.push(key);

  // Init value
  if (!task.field_values) task.field_values = {};
  task.field_values[key] = type === 'repeatable' ? [''] : '';

  closeModal('modal-add-flex-block');
  document.getElementById('new-flex-label').value = '';

  renderFlexToggleBar();
  renderActiveFlexBlocks();
  autoSaveTask();
  showToast('Блок «' + label + '» додано', 'success');
}

// --- Сохранение field values ---
function saveFieldValues() {
  var task = state.currentTask;
  if (!task) return;
  if (!task.field_values) task.field_values = {};

  task.field_values.url = document.getElementById('fv-url').value;
  task.field_values.keywords = document.getElementById('fv-keywords').value;
  task.field_values.topic = document.getElementById('fv-topic').value;
  task.field_values.language = document.getElementById('fv-language').value;
  task.field_values.volume = document.getElementById('fv-volume').value;

  autoSaveTask();
}

// --- Компактная правая панель ---
var _promptModalType = '';

function updatePromptPreviews() {
  var sp = document.getElementById('task-system-prompt').value || '';
  var up = document.getElementById('task-user-prompt').value || '';
  var spPreview = document.getElementById('task-system-prompt-preview');
  var upPreview = document.getElementById('task-user-prompt-preview');
  if (spPreview) spPreview.textContent = sp ? (sp.length > 150 ? sp.substring(0, 150) + '...' : sp) : '(порожньо)';
  if (upPreview) upPreview.textContent = up ? (up.length > 150 ? up.substring(0, 150) + '...' : up) : '(порожньо)';
}

function toggleSettingsSection(sectionId) {
  var el = document.getElementById(sectionId);
  var chevron = document.getElementById('chevron-' + sectionId);
  if (!el) return;
  var isHidden = el.style.display === 'none';
  el.style.display = isHidden ? 'block' : 'none';
  if (chevron) chevron.classList.toggle('open', isHidden);
}

function openPromptModal(type) {
  _promptModalType = type;
  var title = type === 'system' ? 'Системний промт' : 'Шаблон промту';
  var hint = type === 'system' ? 'Задає роль і стиль генерації' : 'Змінні: {{url}}, {{keywords}}, {{topic}}, {{language}}, {{volume}} + ключі блоків';
  var value = type === 'system' ? document.getElementById('task-system-prompt').value : document.getElementById('task-user-prompt').value;

  document.getElementById('prompt-modal-title').textContent = title;
  document.getElementById('prompt-modal-hint').textContent = hint;
  document.getElementById('prompt-modal-textarea').value = value || '';
  openModal('modal-prompt-editor');
  setTimeout(function() { document.getElementById('prompt-modal-textarea').focus(); }, 100);
}

function savePromptFromModal() {
  var value = document.getElementById('prompt-modal-textarea').value;
  if (_promptModalType === 'system') {
    document.getElementById('task-system-prompt').value = value;
  } else {
    document.getElementById('task-user-prompt').value = value;
  }
  saveTaskPrompts();
  updatePromptPreviews();
  closeModal('modal-prompt-editor');
  showToast('Промт збережено', 'success');
}

function loadTaskHistory(taskId) {
  google.script.run.withSuccessHandler(function(texts) {
    state.currentTexts = texts || [];
    var countEl = document.getElementById('task-history-count');
    if (countEl) countEl.textContent = state.currentTexts.length;
    renderHistoryList();
  }).getGeneratedTexts(taskId);
}

// --- Табы задачи ---
function switchTaskTab(tab) {
  var tabs = document.querySelectorAll('.task-tabs .tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('active');
    if (tabs[i].getAttribute('data-tab') === tab) tabs[i].classList.add('active');
  }
  document.getElementById('task-tab-generate').style.display = tab === 'generate' ? 'flex' : 'none';
  document.getElementById('task-tab-history').style.display = tab === 'history' ? 'flex' : 'none';
}

// --- Сохранение настроек ---
function saveTaskName() {
  if (!state.currentTask) return;
  state.currentTask.name = document.getElementById('task-name-input').value.trim();
  document.getElementById('task-breadcrumb-name').textContent = state.currentTask.name;
  autoSaveTask();
}

function saveTaskPrompts() {
  if (!state.currentTask) return;
  state.currentTask.system_prompt = document.getElementById('task-system-prompt').value;
  state.currentTask.user_prompt = document.getElementById('task-user-prompt').value;
  autoSaveTask();
}

function saveTaskSettings() {
  if (!state.currentTask) return;
  var lSel = document.getElementById('task-llm-select');
  var parts = lSel.value.split('|');
  state.currentTask.llm_provider = parts[0];
  state.currentTask.llm_model = parts[1];
  state.currentTask.options = {
    humanize: document.getElementById('task-opt-humanize').checked,
    uniqueness: document.getElementById('task-opt-uniqueness').checked,
    factcheck: document.getElementById('task-opt-factcheck').checked,
    ai_detector: document.getElementById('task-opt-ai-detector').checked,
    voice_clone: document.getElementById('task-opt-voice-clone').checked,
    interview: document.getElementById('task-opt-interview').checked,
    draft_review: document.getElementById('task-opt-draft-review').checked
  };
  autoSaveTask();
}

var _debouncedSave = debounce(function() {
  if (!state.currentTask) return;
  showAutosaveStatus('saving');
  google.script.run.withSuccessHandler(function() {
    showAutosaveStatus('saved');
  }).withFailureHandler(function(e) {
    showAutosaveStatus('error');
    showToast(e.message, 'error');
  }).saveTask(state.currentTask);
}, 500);

function autoSaveTask() {
  _debouncedSave();
}

function deleteCurrentTask() {
  if (!state.currentTask) return;
  if (!confirm('Видалити задачу та всі її тексти?')) return;
  google.script.run.withSuccessHandler(function() {
    showToast('Задачу видалено', 'success');
    navigateTo('#dashboard');
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).deleteTask(state.currentTask.id);
}

// --- Генерация (multi-step flow) ---
function startGeneration() {
  if (!state.currentTask) return;

  // Собрать все field values
  saveFieldValues();

  var task = state.currentTask;
  var fv = task.field_values || {};

  // Собрать промпт
  var assembledPrompt = assemblePrompt(task.user_prompt || '', fv);

  // Дополнительные инструкции
  var extra = document.getElementById('gen-user-input').value.trim();
  if (extra) {
    assembledPrompt += '\n\nДодаткові інструкції:\n' + extra;
  }

  if (!assembledPrompt.trim()) {
    showToast('Заповніть поля або додайте промт', 'error');
    return;
  }

  var opts = task.options || {};

  // Step 1: If interview enabled → generate questions first
  if (opts.interview) {
    _pendingGenArgs = { assembledPrompt: assembledPrompt, fv: fv };
    document.getElementById('gen-result').style.display = 'none';
    document.getElementById('gen-loading').style.display = 'block';
    document.getElementById('gen-send-btn').disabled = true;

    var topic = fv.topic || task.name || '';
    google.script.run.withSuccessHandler(function(questions) {
      document.getElementById('gen-loading').style.display = 'none';
      document.getElementById('gen-send-btn').disabled = false;
      showInterviewModal(questions);
    }).withFailureHandler(function(e) {
      resetGenUI();
      showToast('Помилка генерації питань: ' + e.message, 'error');
      // Fallback: continue without interview
      executeGeneration(assembledPrompt, fv);
    }).generateInterviewQuestions(task.id, topic);
    return;
  }

  // No interview → go straight to generation
  executeGeneration(assembledPrompt, fv);
}

function executeGeneration(assembledPrompt, fv) {
  // Показать лоадер
  document.getElementById('gen-result').style.display = 'none';
  document.getElementById('gen-loading').style.display = 'block';
  document.getElementById('gen-send-btn').disabled = true;

  var opts = state.currentTask.options || {};

  google.script.run.withSuccessHandler(function(text) {
    // If draft review enabled → show draft modal for approval
    if (opts.draft_review) {
      showDraftReviewModal(text);
      return;
    }
    // No draft review → show final result directly
    showFinalResult(text);
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
    resetGenUI();
  }).generateTextWithAI(state.currentTask.id, assembledPrompt, fv);
}

function saveLastGenToGDoc() {
  if (!state.lastGeneratedText || !state.lastGeneratedText.id) {
    showToast('Немає тексту для збереження', 'error');
    return;
  }
  var btn = document.getElementById('btn-save-gdoc');
  if (btn) { btn.disabled = true; btn.textContent = 'Збереження...'; }

  google.script.run.withSuccessHandler(function(url) {
    if (btn) { btn.disabled = false; btn.textContent = 'Зберегти в Google Doc'; }
    var link = document.getElementById('gen-gdoc-link');
    if (link && url) {
      link.href = url;
      link.style.display = 'inline';
    }
    showToast('Збережено в Google Doc!', 'success');
  }).withFailureHandler(function(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Зберегти в Google Doc'; }
    showToast(e.message, 'error');
  }).saveToGoogleDoc(state.lastGeneratedText.id);
}

function clearGenResult() {
  document.getElementById('gen-result').style.display = 'none';
  document.getElementById('gen-user-input').value = '';
  state.lastGeneratedText = null;
}

function resetGenUI() {
  document.getElementById('gen-loading').style.display = 'none';
  document.getElementById('gen-send-btn').disabled = false;
}

function openEditorForLastGen() {
  if (!state.lastGeneratedText || !state.currentTask) return;
  navigateTo('#editor/' + state.currentTask.id + '/' + state.lastGeneratedText.id);
}

// --- История ---
// ===========================================
// Імпорт даних з Google Sheets
// ===========================================
var _taskImportData = null;
var _taskImportSelectedRow = -1;

function openTaskImportModal() {
  document.getElementById('task-import-step-url').style.display = 'block';
  document.getElementById('task-import-step-select').style.display = 'none';
  document.getElementById('task-import-accept-btn').style.display = 'none';
  document.getElementById('task-import-url').value = '';
  document.getElementById('task-import-loading').style.display = 'none';
  document.getElementById('task-import-btn').style.display = 'block';
  _taskImportData = null;
  _taskImportSelectedRow = -1;
  openModal('modal-task-import');
}

function taskImportLoadRows() {
  var url = document.getElementById('task-import-url').value.trim();
  if (!url) { showToast('Вставте посилання', 'error'); return; }

  document.getElementById('task-import-btn').style.display = 'none';
  document.getElementById('task-import-loading').style.display = 'block';

  google.script.run.withSuccessHandler(function(data) {
    _taskImportData = data;
    document.getElementById('task-import-loading').style.display = 'none';
    document.getElementById('task-import-step-url').style.display = 'none';
    document.getElementById('task-import-step-select').style.display = 'block';
    document.getElementById('task-import-accept-btn').style.display = 'inline-block';

    var h = '';
    var rows = data.rows || [];
    for (var ri = 0; ri < rows.length; ri++) {
      var row = rows[ri];
      h += '<label class="checkbox-label" style="padding:8px 0;border-bottom:1px solid #F0F0EC;align-items:flex-start;">' +
        '<input type="radio" name="task-import-row" value="' + ri + '" onchange="onTaskImportRowSelect(' + ri + ')" style="margin-top:2px;">' +
        '<div>' +
          '<strong style="font-size:13px;">#' + row.rowNum + '</strong> ' +
          '<span style="font-size:12px;color:#555;">' + escapeHtml(row.topic) + '</span>' +
        '</div>' +
      '</label>';
    }
    document.getElementById('task-import-rows-list').innerHTML = h;
    showToast('Знайдено ' + data.rows.length + ' рядків', 'success');
  }).withFailureHandler(function(e) {
    document.getElementById('task-import-loading').style.display = 'none';
    document.getElementById('task-import-btn').style.display = 'block';
    showToast(e.message, 'error');
  }).getSheetRows(url);
}

function onTaskImportRowSelect(index) {
  _taskImportSelectedRow = index;
}

function taskImportAcceptRow() {
  if (_taskImportSelectedRow < 0 || !_taskImportData) {
    showToast('Оберіть рядок', 'error');
    return;
  }

  var task = state.currentTask;
  if (!task) return;

  var row = _taskImportData.rows[_taskImportSelectedRow];
  var headers = _taskImportData.headers || [];

  // Собрать список полей задачи для AI-маппинга
  var taskFieldNames = [
    { key: 'url', label: 'URL сторінки (одна конкретна URL-адреса сторінки)' },
    { key: 'keywords', label: 'Анкор (ключове слово для посилання, зазвичай 1-3 слова)' },
    { key: 'topic', label: 'Тема статті / заголовок H1' },
    { key: 'language', label: 'Мова (UA/RU/EN)' },
    { key: 'volume', label: "Об'єм тексту в символах (збп), наприклад 2000-2300" }
  ];
  var flexBlocks = task.flex_blocks || [];
  for (var fi = 0; fi < flexBlocks.length; fi++) {
    taskFieldNames.push({ key: flexBlocks[fi].key, label: flexBlocks[fi].label });
  }

  // Закрити модалку імпорту і показати прелоадер
  closeModal('modal-task-import');
  openModal('modal-import-loading');

  // Вызвать AI-маппинг на сервере
  google.script.run.withSuccessHandler(function(mapping) {
    closeModal('modal-import-loading');
    if (!task.field_values) task.field_values = {};
    if (!task.active_flex_blocks) task.active_flex_blocks = [];

    var mappedCount = 0;
    var mappedColumns = {};
    for (var fieldKey in mapping) {
      var sheetColumn = mapping[fieldKey];
      if (!sheetColumn) continue;
      mappedColumns[sheetColumn] = true;
      var val = row.cells[sheetColumn];
      if (val === undefined || val === null) continue;
      val = String(val).trim();
      if (!val) continue;

      task.field_values[fieldKey] = val;
      mappedCount++;

      // Активировать flex block если это flex
      for (var bfi = 0; bfi < flexBlocks.length; bfi++) {
        if (flexBlocks[bfi].key === fieldKey && task.active_flex_blocks.indexOf(fieldKey) === -1) {
          task.active_flex_blocks.push(fieldKey);
          break;
        }
      }
    }

    // Данные из колонок, которые AI не замаппил — заполнить существующие или создать новые
    for (var hi = 0; hi < headers.length; hi++) {
      var header = headers[hi];
      if (mappedColumns[header]) continue;
      var cellVal = row.cells[header];
      if (!cellVal || !String(cellVal).trim()) continue;
      if (header.match(/^(№|#|id|номер)$/i)) continue;

      var newKey = generateFlexKey(header);

      // Спочатку шукаємо існуючий блок по ключу або лейблу
      var existingIdx = -1;
      for (var ci = 0; ci < flexBlocks.length; ci++) {
        if (flexBlocks[ci].key === newKey || flexBlocks[ci].label.toLowerCase() === header.toLowerCase()) {
          existingIdx = ci;
          break;
        }
      }

      if (existingIdx >= 0) {
        // Існуючий блок — просто заповнити значення
        var existKey = flexBlocks[existingIdx].key;
        task.field_values[existKey] = String(cellVal).trim();
        if (task.active_flex_blocks.indexOf(existKey) === -1) {
          task.active_flex_blocks.push(existKey);
        }
      } else {
        // Новий блок
        flexBlocks.push({ key: newKey, label: header, type: 'textarea', enabled: true });
        task.field_values[newKey] = String(cellVal).trim();
        task.active_flex_blocks.push(newKey);
      }
    }

    task.flex_blocks = flexBlocks;

    // Обновить UI
    populateFieldValues();
    renderCoreFields();
    renderFlexToggleBar();
    renderActiveFlexBlocks();
    autoSaveTask();

    showToast('Заповнено ' + mappedCount + ' полів з рядка #' + row.rowNum, 'success');

  }).withFailureHandler(function(e) {
    closeModal('modal-import-loading');
    showToast(e.message, 'error');
  }).mapSheetRowToFields(headers, row.cells, taskFieldNames);
}

function renderHistoryList() {
  var list = document.getElementById('history-list');
  var empty = document.getElementById('history-empty');
  if (!list) return;

  var texts = state.currentTexts || [];
  if (!texts.length) {
    empty.style.display = 'flex';
    list.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  var statusLabel = { pending: 'Очікує', processing: 'Генерація...', completed: 'Готово', failed: 'Помилка' };
  var statusClass = { pending: 'badge-neutral', processing: 'badge-warning', completed: 'badge-success', failed: 'badge-danger' };
  var h = '';
  for (var ti = 0; ti < texts.length; ti++) {
    var t = texts[ti];
    var regenBadge = t.regeneration_count ? ' <span class="badge badge-info" style="font-size:9px;">x' + t.regeneration_count + '</span>' : '';

    var preview = '';
    if (t.content) {
      var div = document.createElement('div');
      div.innerHTML = t.content;
      preview = div.textContent || div.innerText || '';
      preview = truncate(preview, 150);
    }

    h += '<div class="history-item" onclick="openEditorFromHistory(\'' + t.id + '\')">' +
      '<div class="history-item-header">' +
        '<span class="badge ' + (statusClass[t.status] || '') + '">' + (statusLabel[t.status] || t.status) + '</span>' +
        regenBadge +
        '<span class="text-secondary">' + formatDateTime(t.created_at) + '</span>' +
      '</div>' +
      '<div class="history-item-preview">' + escapeHtml(preview) + '</div>' +
      '<div class="history-item-meta">' +
        (t.uniqueness_score != null ? '<span class="badge badge-success">Унік: ' + t.uniqueness_score + '%</span>' : '') +
        (t.ai_score != null ? '<span class="badge badge-neutral">AI: ' + t.ai_score + '%</span>' : '') +
        '<span class="text-secondary">' + escapeHtml(t.used_llm_model || '') + '</span>' +
      '</div>' +
    '</div>';
  }
  list.innerHTML = h;
}

function openEditorFromHistory(textId) {
  if (!state.currentTask) return;
  navigateTo('#editor/' + state.currentTask.id + '/' + textId);
}

// ===========================================
// Voice Clone (Клон голосу)
// ===========================================
function openVoiceCloneModal() {
  var task = state.currentTask;
  if (!task) return;
  renderVoiceRefTexts();
  // Show profile status
  var status = document.getElementById('voice-profile-status');
  if (task.voice_profile) {
    status.innerHTML = '<div style="background:#ECFDF5;border:1px solid #16A34A;border-radius:6px;padding:8px 12px;font-size:11px;color:#16A34A;">✓ Голосовий профіль створено (' + task.voice_profile.length + ' символів)</div>';
  } else {
    status.innerHTML = '<div class="text-secondary" style="font-size:11px;">Профіль ще не створено. Додайте тексти та натисніть "Аналізувати".</div>';
  }
  openModal('modal-voice-clone');
}

function renderVoiceRefTexts() {
  var container = document.getElementById('voice-ref-texts-container');
  if (!container || !state.currentTask) return;
  var texts = state.currentTask.reference_texts || [];
  if (!texts.length) texts = [''];
  var h = '';
  for (var i = 0; i < texts.length; i++) {
    h += '<div style="margin-bottom:8px;position:relative;">' +
      '<label class="field-label">Текст ' + (i + 1) + (i > 0 ? ' <button class="btn btn-sm btn-danger" style="font-size:9px;padding:1px 4px;position:absolute;right:0;top:0;" onclick="removeVoiceRefText(' + i + ')">×</button>' : '') + '</label>' +
      '<textarea class="input-field textarea-mono" rows="6" id="voice-ref-' + i + '" placeholder="Вставте текст (мінімум 200 слів)...">' + escapeHtml(texts[i] || '') + '</textarea>' +
    '</div>';
  }
  container.innerHTML = h;
  // Hide add button if 4 texts
  var addBtn = document.getElementById('voice-add-ref-btn');
  if (addBtn) addBtn.style.display = texts.length >= 4 ? 'none' : 'inline-block';
}

function addVoiceRefText() {
  var task = state.currentTask;
  if (!task) return;
  if (!task.reference_texts) task.reference_texts = [''];
  if (task.reference_texts.length >= 4) { showToast('Максимум 4 тексти', 'error'); return; }
  // Save current values first
  collectVoiceRefTexts();
  task.reference_texts.push('');
  renderVoiceRefTexts();
}

function removeVoiceRefText(idx) {
  collectVoiceRefTexts();
  state.currentTask.reference_texts.splice(idx, 1);
  if (!state.currentTask.reference_texts.length) state.currentTask.reference_texts = [''];
  renderVoiceRefTexts();
}

function collectVoiceRefTexts() {
  if (!state.currentTask) return [];
  var texts = [];
  var count = (state.currentTask.reference_texts || ['']).length;
  for (var i = 0; i < count; i++) {
    var el = document.getElementById('voice-ref-' + i);
    texts.push(el ? el.value : '');
  }
  state.currentTask.reference_texts = texts;
  return texts;
}

function analyzeVoiceProfile() {
  collectVoiceRefTexts();
  var texts = (state.currentTask.reference_texts || []).filter(function(t) { return t && t.trim().length > 50; });
  if (!texts.length) { showToast('Додайте хоча б один текст (мінімум 200 слів)', 'error'); return; }

  var btn = document.getElementById('voice-analyze-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Аналізуємо...'; }

  google.script.run.withSuccessHandler(function(profile) {
    state.currentTask.voice_profile = profile;
    state.currentTask.reference_texts = texts;
    autoSaveTask();
    if (btn) { btn.disabled = false; btn.textContent = 'Аналізувати та зберегти'; }
    showToast('Голосовий профіль створено!', 'success');
    closeModal('modal-voice-clone');
  }).withFailureHandler(function(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Аналізувати та зберегти'; }
    showToast(e.message, 'error');
  }).analyzeVoiceProfile(state.currentTask.id, texts);
}

// ===========================================
// Interview Extraction (Інтерв'ю)
// ===========================================
var _interviewQuestions = [];
var _pendingGenArgs = null;

function showInterviewModal(questions) {
  _interviewQuestions = questions || [];
  var container = document.getElementById('interview-questions-container');
  document.getElementById('interview-loading').style.display = 'none';
  var h = '';
  for (var i = 0; i < _interviewQuestions.length; i++) {
    h += '<div class="field-group">' +
      '<label class="field-label" style="color:#1A1A1A;font-size:12px;text-transform:none;letter-spacing:0;">' + escapeHtml(_interviewQuestions[i]) + '</label>' +
      '<textarea class="input-field" rows="3" id="interview-answer-' + i + '" placeholder="Ваша відповідь..."></textarea>' +
    '</div>';
  }
  container.innerHTML = h;
  openModal('modal-interview');
}

function submitInterviewAnswers() {
  var answers = [];
  for (var i = 0; i < _interviewQuestions.length; i++) {
    var el = document.getElementById('interview-answer-' + i);
    var answer = el ? el.value.trim() : '';
    if (answer) {
      answers.push({ question: _interviewQuestions[i], answer: answer });
    }
  }
  state.currentTask.interview_answers = answers;
  autoSaveTask();
  closeModal('modal-interview');

  // Продовжити генерацію з відповідями
  if (_pendingGenArgs) {
    executeGeneration(_pendingGenArgs.assembledPrompt, _pendingGenArgs.fv);
    _pendingGenArgs = null;
  }
}

function skipInterview() {
  closeModal('modal-interview');
  state.currentTask.interview_answers = null;
  if (_pendingGenArgs) {
    executeGeneration(_pendingGenArgs.assembledPrompt, _pendingGenArgs.fv);
    _pendingGenArgs = null;
  }
}

// ===========================================
// Draft Review (Чернетка)
// ===========================================
var _draftResult = null;

function showDraftReviewModal(result) {
  _draftResult = result;
  document.getElementById('gen-loading').style.display = 'none';
  document.getElementById('gen-send-btn').disabled = false;
  document.getElementById('draft-content').innerHTML = result.content || '';
  document.getElementById('draft-feedback').value = '';
  openModal('modal-draft-review');
}

function approveDraft() {
  closeModal('modal-draft-review');
  if (_draftResult) {
    showFinalResult(_draftResult);
    _draftResult = null;
  }
}

function refineDraft() {
  var feedback = document.getElementById('draft-feedback').value.trim();
  if (!feedback) { showToast('Напишіть зворотній зв\'язок', 'error'); return; }
  closeModal('modal-draft-review');

  document.getElementById('gen-loading').style.display = 'block';
  document.getElementById('gen-send-btn').disabled = true;

  google.script.run.withSuccessHandler(function(refined) {
    document.getElementById('gen-loading').style.display = 'none';
    document.getElementById('gen-send-btn').disabled = false;
    showFinalResult(refined);
  }).withFailureHandler(function(e) {
    document.getElementById('gen-loading').style.display = 'none';
    document.getElementById('gen-send-btn').disabled = false;
    showToast(e.message, 'error');
  }).regenerateFullTextWithAI(_draftResult.id, feedback);
}

function showFinalResult(result) {
  state.lastGeneratedText = result;
  document.getElementById('gen-result').style.display = 'block';
  document.getElementById('gen-result-content').innerHTML = result.content || '';

  state.currentTexts.unshift(result);
  var countEl = document.getElementById('task-history-count');
  if (countEl) countEl.textContent = state.currentTexts.length;
  renderHistoryList();
  showToast('Текст згенеровано!', 'success');
}

</script>
