<script>
// ===========================================
// scripts_task.html - Экран задачи, генерация, история
// ===========================================

function loadTaskScreen(taskId) {
  google.script.run.withSuccessHandler(function(task) {
    if (!task) { showToast('Задача не найдена', 'error'); return; }
    state.currentTask = task;
    state.lastGeneratedText = null;

    // Заполнить UI
    document.getElementById('task-name-input').value = task.name || '';
    document.getElementById('task-breadcrumb-name').textContent = task.name || '';
    document.getElementById('task-system-prompt').value = task.system_prompt || '';
    document.getElementById('task-user-prompt').value = task.user_prompt || '';

    // Шаблон
    var tplName = '—';
    if (task.template_id) {
      var tpl = (state.taskTemplates || []).find(function(x) { return x.id === task.template_id; });
      if (tpl) tplName = tpl.name;
    }
    document.getElementById('task-template-name').textContent = tplName;

    // LLM
    if (task.llm_provider && task.llm_model) {
      document.getElementById('task-llm-select').value = task.llm_provider + '|' + task.llm_model;
    }

    // Опции
    var opts = task.options || {};
    document.getElementById('task-opt-humanize').checked = !!opts.humanize;
    document.getElementById('task-opt-uniqueness').checked = !!opts.uniqueness;
    document.getElementById('task-opt-factcheck').checked = !!opts.factcheck;
    document.getElementById('task-opt-ai-detector').checked = !!opts.ai_detector;

    // Клиент в хлебных крошках
    google.script.run.withSuccessHandler(function(clients) {
      var cl = (clients || []).find(function(c) { return c.id === task.client_id; });
      document.getElementById('task-breadcrumb-client').textContent = cl ? cl.name : '';
    }).getClients();

    // Рендер core fields
    renderCoreFields();

    // Рендер flex blocks
    renderFlexToggleBar();
    renderActiveFlexBlocks();

    // Заполнить field values
    populateFieldValues();

    // Сбросить UI генерации
    document.getElementById('gen-result').style.display = 'none';
    document.getElementById('gen-loading').style.display = 'none';
    document.getElementById('gen-user-input').value = '';

    switchTaskTab('generate');
    loadTaskHistory(taskId);
  }).getTask(taskId);
}

// --- Core Fields ---
function renderCoreFields() {
  var task = state.currentTask;
  if (!task) return;
  var cf = task.core_fields || { url: true, keywords: true, topic: true, language: true, volume: true };

  var fields = ['url', 'keywords', 'topic', 'language', 'volume'];
  fields.forEach(function(f) {
    var el = document.getElementById('cf-' + f);
    if (el) el.style.display = cf[f] ? '' : 'none';
  });
}

function populateFieldValues() {
  var task = state.currentTask;
  if (!task) return;
  var fv = task.field_values || {};

  // Core fields
  if (fv.url) document.getElementById('fv-url').value = fv.url;
  if (fv.keywords) document.getElementById('fv-keywords').value = fv.keywords;
  if (fv.topic) document.getElementById('fv-topic').value = fv.topic;
  if (fv.language) document.getElementById('fv-language').value = fv.language;
  if (fv.volume) document.getElementById('fv-volume').value = fv.volume;
}

// --- Flex Blocks ---
function renderFlexToggleBar() {
  var bar = document.getElementById('flex-toggle-bar');
  if (!bar || !state.currentTask) return;

  var blocks = state.currentTask.flex_blocks || [];
  var active = state.currentTask.active_flex_blocks || [];

  var h = '';
  blocks.forEach(function(b) {
    var isActive = active.indexOf(b.key) !== -1;
    h += '<button class="flex-toggle-btn' + (isActive ? ' active' : '') + '" onclick="toggleFlexBlock(\'' + b.key + '\')">' +
      (isActive ? '✓ ' : '+ ') + escapeHtml(b.label) +
    '</button>';
  });

  // Кнопка "Додати свій блок"
  h += '<button class="flex-toggle-btn flex-toggle-btn-add" onclick="openModal(\'modal-add-flex-block\')">+ Свій блок...</button>';

  bar.innerHTML = h;
}

function renderActiveFlexBlocks() {
  var container = document.getElementById('flex-blocks-container');
  if (!container || !state.currentTask) return;

  var blocks = state.currentTask.flex_blocks || [];
  var active = state.currentTask.active_flex_blocks || [];
  var fv = state.currentTask.field_values || {};

  var h = '';
  blocks.forEach(function(b) {
    if (active.indexOf(b.key) === -1) return;

    h += '<div class="flex-block-item" id="flex-block-' + b.key + '">';
    h += '<div class="flex-block-header">';
    h += '<span class="flex-block-title">' + escapeHtml(b.label) + '</span>';
    h += '<span style="display:flex;align-items:center;gap:8px;">';
    h += '<span style="font-family:\'DM Mono\',monospace;font-size:10px;color:#1A5FB4;">{{' + b.key + '}}</span>';
    h += '<button class="flex-block-close" onclick="toggleFlexBlock(\'' + b.key + '\')" title="Сховати блок">&times;</button>';
    h += '</span></div>';

    h += '<div class="flex-block-body">';

    if (b.type === 'repeatable') {
      var items = fv[b.key] || [''];
      h += '<div class="repeatable-list" id="rep-' + b.key + '">';
      items.forEach(function(item, i) {
        h += '<div class="repeatable-item">';
        h += '<span class="repeatable-item-prefix">' + (i + 1) + '.</span>';
        h += '<input type="text" value="' + escapeHtml(item) + '" onchange="updateRepeatableItem(\'' + b.key + '\',' + i + ',this.value)" placeholder="...">';
        h += '<button class="repeatable-remove" onclick="removeRepeatableItem(\'' + b.key + '\',' + i + ')">&times;</button>';
        h += '</div>';
      });
      h += '</div>';
      h += '<button class="repeatable-add" onclick="addRepeatableItem(\'' + b.key + '\')">+ Ще</button>';
    } else {
      // textarea
      var val = fv[b.key] || '';
      h += '<textarea onchange="updateFlexValue(\'' + b.key + '\',this.value)" placeholder="...">' + escapeHtml(val) + '</textarea>';
    }

    h += '</div></div>';
  });

  container.innerHTML = h;
}

function toggleFlexBlock(key) {
  var task = state.currentTask;
  if (!task) return;

  if (!task.active_flex_blocks) task.active_flex_blocks = [];
  var idx = task.active_flex_blocks.indexOf(key);
  if (idx !== -1) {
    task.active_flex_blocks.splice(idx, 1);
  } else {
    task.active_flex_blocks.push(key);
  }

  renderFlexToggleBar();
  renderActiveFlexBlocks();
  autoSaveTask();
}

// --- Repeatable items ---
function updateRepeatableItem(key, index, value) {
  var task = state.currentTask;
  if (!task) return;
  if (!task.field_values) task.field_values = {};
  if (!task.field_values[key]) task.field_values[key] = [];
  task.field_values[key][index] = value;
  autoSaveTask();
}

function addRepeatableItem(key) {
  var task = state.currentTask;
  if (!task) return;
  if (!task.field_values) task.field_values = {};
  if (!task.field_values[key]) task.field_values[key] = [];
  task.field_values[key].push('');
  renderActiveFlexBlocks();
  autoSaveTask();
}

function removeRepeatableItem(key, index) {
  var task = state.currentTask;
  if (!task || !task.field_values || !task.field_values[key]) return;
  task.field_values[key].splice(index, 1);
  if (task.field_values[key].length === 0) task.field_values[key] = [''];
  renderActiveFlexBlocks();
  autoSaveTask();
}

function updateFlexValue(key, value) {
  var task = state.currentTask;
  if (!task) return;
  if (!task.field_values) task.field_values = {};
  task.field_values[key] = value;
  autoSaveTask();
}

// --- Добавление пользовательского блока ---
function confirmAddFlexBlock() {
  var label = document.getElementById('new-flex-label').value.trim();
  var type = document.getElementById('new-flex-type').value;
  if (!label) { showToast('Вкажіть назву блоку', 'error'); return; }

  var key = generateFlexKey(label);
  var task = state.currentTask;
  if (!task) return;
  if (!task.flex_blocks) task.flex_blocks = [];

  // Проверить уникальность ключа
  var exists = task.flex_blocks.some(function(b) { return b.key === key; });
  if (exists) key = key + '_' + Date.now();

  task.flex_blocks.push({ key: key, label: label, type: type, enabled: true });
  if (!task.active_flex_blocks) task.active_flex_blocks = [];
  task.active_flex_blocks.push(key);

  // Init value
  if (!task.field_values) task.field_values = {};
  task.field_values[key] = type === 'repeatable' ? [''] : '';

  closeModal('modal-add-flex-block');
  document.getElementById('new-flex-label').value = '';

  renderFlexToggleBar();
  renderActiveFlexBlocks();
  autoSaveTask();
  showToast('Блок «' + label + '» додано', 'success');
}

// --- Сохранение field values ---
function saveFieldValues() {
  var task = state.currentTask;
  if (!task) return;
  if (!task.field_values) task.field_values = {};

  task.field_values.url = document.getElementById('fv-url').value;
  task.field_values.keywords = document.getElementById('fv-keywords').value;
  task.field_values.topic = document.getElementById('fv-topic').value;
  task.field_values.language = document.getElementById('fv-language').value;
  task.field_values.volume = document.getElementById('fv-volume').value;

  autoSaveTask();
}

function loadTaskHistory(taskId) {
  google.script.run.withSuccessHandler(function(texts) {
    state.currentTexts = texts || [];
    var countEl = document.getElementById('task-history-count');
    if (countEl) countEl.textContent = state.currentTexts.length;
    renderHistoryList();
  }).getGeneratedTexts(taskId);
}

// --- Табы задачи ---
function switchTaskTab(tab) {
  var tabs = document.querySelectorAll('.task-tabs .tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('active');
    if (tabs[i].getAttribute('data-tab') === tab) tabs[i].classList.add('active');
  }
  document.getElementById('task-tab-generate').style.display = tab === 'generate' ? 'flex' : 'none';
  document.getElementById('task-tab-history').style.display = tab === 'history' ? 'flex' : 'none';
}

// --- Сохранение настроек ---
function saveTaskName() {
  if (!state.currentTask) return;
  state.currentTask.name = document.getElementById('task-name-input').value.trim();
  document.getElementById('task-breadcrumb-name').textContent = state.currentTask.name;
  autoSaveTask();
}

function saveTaskPrompts() {
  if (!state.currentTask) return;
  state.currentTask.system_prompt = document.getElementById('task-system-prompt').value;
  state.currentTask.user_prompt = document.getElementById('task-user-prompt').value;
  autoSaveTask();
}

function saveTaskSettings() {
  if (!state.currentTask) return;
  var lSel = document.getElementById('task-llm-select');
  var parts = lSel.value.split('|');
  state.currentTask.llm_provider = parts[0];
  state.currentTask.llm_model = parts[1];
  state.currentTask.options = {
    humanize: document.getElementById('task-opt-humanize').checked,
    uniqueness: document.getElementById('task-opt-uniqueness').checked,
    factcheck: document.getElementById('task-opt-factcheck').checked,
    ai_detector: document.getElementById('task-opt-ai-detector').checked
  };
  autoSaveTask();
}

function autoSaveTask() {
  if (!state.currentTask) return;
  google.script.run.withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).saveTask(state.currentTask);
}

function deleteCurrentTask() {
  if (!state.currentTask) return;
  if (!confirm('Видалити задачу та всі її тексти?')) return;
  google.script.run.withSuccessHandler(function() {
    showToast('Задачу видалено', 'success');
    navigateTo('#dashboard');
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).deleteTask(state.currentTask.id);
}

// --- Генерация ---
function startGeneration() {
  if (!state.currentTask) return;

  // Собрать все field values
  saveFieldValues(); // сохранить актуальные значения core fields

  var task = state.currentTask;
  var fv = task.field_values || {};

  // Собрать промпт
  var assembledPrompt = assemblePrompt(task.user_prompt || '', fv);

  // Дополнительные инструкции
  var extra = document.getElementById('gen-user-input').value.trim();
  if (extra) {
    assembledPrompt += '\n\nДодаткові інструкції:\n' + extra;
  }

  if (!assembledPrompt.trim()) {
    showToast('Заповніть поля або додайте промт', 'error');
    return;
  }

  // Показать лоадер
  document.getElementById('gen-result').style.display = 'none';
  document.getElementById('gen-loading').style.display = 'block';
  document.getElementById('gen-send-btn').disabled = true;

  // Вызвать реальную генерацию через OpenAI
  google.script.run.withSuccessHandler(function(text) {
    state.lastGeneratedText = text;

    document.getElementById('gen-loading').style.display = 'none';
    document.getElementById('gen-result').style.display = 'block';
    document.getElementById('gen-result-content').innerHTML = text.content || '';
    document.getElementById('gen-send-btn').disabled = false;

    // Обновить историю
    state.currentTexts.unshift(text);
    var countEl = document.getElementById('task-history-count');
    if (countEl) countEl.textContent = state.currentTexts.length;
    renderHistoryList();

    showToast('Текст згенеровано!', 'success');
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
    resetGenUI();
  }).generateTextWithAI(state.currentTask.id, assembledPrompt, fv);
}

function clearGenResult() {
  document.getElementById('gen-result').style.display = 'none';
  document.getElementById('gen-user-input').value = '';
  state.lastGeneratedText = null;
}

function resetGenUI() {
  document.getElementById('gen-loading').style.display = 'none';
  document.getElementById('gen-send-btn').disabled = false;
}

function openEditorForLastGen() {
  if (!state.lastGeneratedText || !state.currentTask) return;
  navigateTo('#editor/' + state.currentTask.id + '/' + state.lastGeneratedText.id);
}

// --- История ---
// ===========================================
// Імпорт даних з Google Sheets
// ===========================================
var _taskImportData = null;
var _taskImportSelectedRow = -1;

function openTaskImportModal() {
  document.getElementById('task-import-step-url').style.display = 'block';
  document.getElementById('task-import-step-select').style.display = 'none';
  document.getElementById('task-import-accept-btn').style.display = 'none';
  document.getElementById('task-import-url').value = '';
  document.getElementById('task-import-loading').style.display = 'none';
  document.getElementById('task-import-btn').style.display = 'block';
  _taskImportData = null;
  _taskImportSelectedRow = -1;
  openModal('modal-task-import');
}

function taskImportLoadRows() {
  var url = document.getElementById('task-import-url').value.trim();
  if (!url) { showToast('Вставте посилання', 'error'); return; }

  document.getElementById('task-import-btn').style.display = 'none';
  document.getElementById('task-import-loading').style.display = 'block';

  google.script.run.withSuccessHandler(function(data) {
    _taskImportData = data;
    document.getElementById('task-import-loading').style.display = 'none';
    document.getElementById('task-import-step-url').style.display = 'none';
    document.getElementById('task-import-step-select').style.display = 'block';
    document.getElementById('task-import-accept-btn').style.display = 'inline-block';

    var h = '';
    data.rows.forEach(function(row, i) {
      h += '<label class="checkbox-label" style="padding:8px 0;border-bottom:1px solid #F0F0EC;align-items:flex-start;">' +
        '<input type="radio" name="task-import-row" value="' + i + '" onchange="onTaskImportRowSelect(' + i + ')" style="margin-top:2px;">' +
        '<div>' +
          '<strong style="font-size:13px;">#' + row.rowNum + '</strong> ' +
          '<span style="font-size:12px;color:#555;">' + escapeHtml(row.topic) + '</span>' +
        '</div>' +
      '</label>';
    });
    document.getElementById('task-import-rows-list').innerHTML = h;
    showToast('Знайдено ' + data.rows.length + ' рядків', 'success');
  }).withFailureHandler(function(e) {
    document.getElementById('task-import-loading').style.display = 'none';
    document.getElementById('task-import-btn').style.display = 'block';
    showToast(e.message, 'error');
  }).getSheetRows(url);
}

function onTaskImportRowSelect(index) {
  _taskImportSelectedRow = index;
}

function taskImportAcceptRow() {
  if (_taskImportSelectedRow < 0 || !_taskImportData) {
    showToast('Оберіть рядок', 'error');
    return;
  }

  var task = state.currentTask;
  if (!task) return;

  var row = _taskImportData.rows[_taskImportSelectedRow];
  var cells = row.cells; // { "Мова": "RU", "URL-адреса": "https://...", ... }
  var headers = _taskImportData.headers;

  if (!task.field_values) task.field_values = {};

  // Маппинг названий колонок на core fields
  var coreMapping = {
    url: ['url', 'url-адреса', 'url-адрес', 'url адреса', 'url адрес', 'адреса', 'адрес', 'посилання', 'ссылка', 'link'],
    keywords: ['анкор', 'anchor', 'анкоры', 'ключ', 'ключевое', 'keyword'],
    topic: ['тема', 'тема статті', 'тема статьи', 'topic', 'h1', 'заголовок', 'назва', 'название'],
    language: ['мова', 'язык', 'lang', 'language'],
    volume: ["об'єм", 'обсяг', 'объем', 'объём', 'volume', 'збп', 'символів', 'символов']
  };

  // Пройтись по каждой колонке таблицы и заполнить поля
  var usedHeaders = {};

  for (var coreKey in coreMapping) {
    var synonyms = coreMapping[coreKey];
    for (var h = 0; h < headers.length; h++) {
      var headerLower = headers[h].toLowerCase().trim();
      for (var s = 0; s < synonyms.length; s++) {
        if (headerLower.indexOf(synonyms[s]) !== -1) {
          var val = cells[headers[h]] || '';
          if (val) {
            task.field_values[coreKey] = val;
            usedHeaders[headers[h]] = true;
          }
          break;
        }
      }
    }
  }

  // Остальные колонки → маппинг на flex blocks по похожести названий
  var flexBlocks = task.flex_blocks || [];
  for (var hi = 0; hi < headers.length; hi++) {
    if (usedHeaders[headers[hi]]) continue;
    var cellVal = cells[headers[hi]] || '';
    if (!cellVal) continue;

    var headerLower2 = headers[hi].toLowerCase().trim();
    var matched = false;

    // Поиск по существующим flex blocks
    for (var fi = 0; fi < flexBlocks.length; fi++) {
      var flexLabel = flexBlocks[fi].label.toLowerCase().trim();
      // Проверяем совпадение (содержит друг друга)
      if (headerLower2.indexOf(flexLabel) !== -1 || flexLabel.indexOf(headerLower2) !== -1 ||
          headerLower2 === flexLabel) {
        task.field_values[flexBlocks[fi].key] = cellVal;
        // Активировать блок
        if (!task.active_flex_blocks) task.active_flex_blocks = [];
        if (task.active_flex_blocks.indexOf(flexBlocks[fi].key) === -1) {
          task.active_flex_blocks.push(flexBlocks[fi].key);
        }
        usedHeaders[headers[hi]] = true;
        matched = true;
        break;
      }
    }

    // Если не нашли match — создаём новый flex block
    if (!matched) {
      var newKey = generateFlexKey(headers[hi]);
      var exists = flexBlocks.some(function(b) { return b.key === newKey; });
      if (exists) newKey = newKey + '_' + Date.now();

      flexBlocks.push({ key: newKey, label: headers[hi], type: 'textarea', enabled: true });
      task.field_values[newKey] = cellVal;
      if (!task.active_flex_blocks) task.active_flex_blocks = [];
      task.active_flex_blocks.push(newKey);
    }
  }

  task.flex_blocks = flexBlocks;

  // Обновить UI
  populateFieldValues();
  renderCoreFields();
  renderFlexToggleBar();
  renderActiveFlexBlocks();
  autoSaveTask();

  closeModal('modal-task-import');
  showToast('Дані з рядка #' + row.rowNum + ' заповнено', 'success');
}

function renderHistoryList() {
  var list = document.getElementById('history-list');
  var empty = document.getElementById('history-empty');
  if (!list) return;

  var texts = state.currentTexts || [];
  if (!texts.length) {
    empty.style.display = 'flex';
    list.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  var h = '';
  texts.forEach(function(t) {
    var statusLabel = { pending: 'Очікує', processing: 'Генерація...', completed: 'Готово', failed: 'Помилка' };
    var statusClass = { pending: 'badge-neutral', processing: 'badge-warning', completed: 'badge-success', failed: 'badge-danger' };
    var regenBadge = t.regeneration_count ? ' <span class="badge badge-info" style="font-size:9px;">x' + t.regeneration_count + '</span>' : '';

    var preview = '';
    if (t.content) {
      var div = document.createElement('div');
      div.innerHTML = t.content;
      preview = div.textContent || div.innerText || '';
      preview = truncate(preview, 150);
    }

    h += '<div class="history-item" onclick="openEditorFromHistory(\'' + t.id + '\')">' +
      '<div class="history-item-header">' +
        '<span class="badge ' + (statusClass[t.status] || '') + '">' + (statusLabel[t.status] || t.status) + '</span>' +
        regenBadge +
        '<span class="text-secondary">' + formatDateTime(t.created_at) + '</span>' +
      '</div>' +
      '<div class="history-item-preview">' + escapeHtml(preview) + '</div>' +
      '<div class="history-item-meta">' +
        (t.uniqueness_score != null ? '<span class="badge badge-success">Унік: ' + t.uniqueness_score + '%</span>' : '') +
        (t.ai_score != null ? '<span class="badge badge-neutral">AI: ' + t.ai_score + '%</span>' : '') +
        '<span class="text-secondary">' + escapeHtml(t.used_llm_model || '') + '</span>' +
      '</div>' +
    '</div>';
  });
  list.innerHTML = h;
}

function openEditorFromHistory(textId) {
  if (!state.currentTask) return;
  navigateTo('#editor/' + state.currentTask.id + '/' + textId);
}
</script>
