<!-- Экран: Управление клиентами -->
<div id="screen-clients" class="screen" style="display:none;">
  <div class="content-header">
    <div class="content-header-info">
      <h1 class="page-title">Управление клиентами</h1>
    </div>
    <div class="content-header-actions">
      <button class="btn btn-primary" onclick="openClientModal()">+ Добавить клиента</button>
    </div>
  </div>

  <div class="table-container">
    <table class="data-table clients-table">
      <thead>
        <tr>
          <th>Название</th>
          <th>Сайт</th>
          <th>Ниша</th>
          <th>Проектов</th>
          <th style="width:150px;">Действия</th>
        </tr>
      </thead>
      <tbody id="clients-table-body">
        <!-- Заполняется динамически -->
      </tbody>
    </table>
  </div>

  <!-- Развернутый блок с проектами клиента -->
  <div id="client-projects-expanded" style="display:none;">
    <div class="expanded-projects-header">
      <h3 id="expanded-client-name" class="section-title"></h3>
      <button class="btn btn-sm" onclick="openProjectModal(state.expandedClientId)">+ Добавить проект</button>
    </div>
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>Название</th>
            <th>Тип</th>
            <th>Текстов</th>
            <th>Ср. уникальность</th>
            <th style="width:150px;">Действия</th>
          </tr>
        </thead>
        <tbody id="client-projects-table">
          <!-- Заполняется динамически -->
        </tbody>
      </table>
    </div>
  </div>
</div>
