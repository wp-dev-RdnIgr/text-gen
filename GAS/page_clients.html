<!-- Екран: Клієнти -->
<div id="screen-clients" class="screen" style="display:none;">
  <div class="page-wrap">

    <div class="content-header">
      <div class="content-header-info">
        <div>
          <h1 class="page-title">Клієнти</h1>
          <div class="page-subtitle">Керуйте клієнтами та швидко переходьте до їхніх задач</div>
        </div>
      </div>
      <div class="content-header-actions">
        <button class="btn btn-primary" onclick="openClientModal()">
          <span style="font-size:14px;">＋</span> Додати клієнта
        </button>
      </div>
    </div>

    <!-- Search -->
    <div style="margin-bottom: 18px;">
      <input type="text" id="clients-grid-search" class="input-field"
        placeholder="Пошук клієнта за назвою, нішею або доменом…"
        oninput="filterClientsGrid()">
    </div>

    <!-- Grid -->
    <div id="clients-grid-container" class="clients-grid">
      <!-- Заповнюється через renderClientsGrid() -->
    </div>

    <!-- Empty state -->
    <div id="clients-empty-state" class="empty-state" style="display:none;">
      <div class="empty-state-icon">☻</div>
      <div class="empty-state-title">Ще немає клієнтів</div>
      <div class="empty-state-desc">Створіть першого клієнта, щоб почати генерувати для нього тексти.</div>
      <button class="btn btn-primary" onclick="openClientModal()">Додати клієнта</button>
    </div>

  </div>
</div>
