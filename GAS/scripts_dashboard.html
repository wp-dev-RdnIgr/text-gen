<script>
// ===========================================
// scripts_dashboard.html - Дашборд, карточки задач
// ===========================================

function renderTaskCards() {
  var grid = document.getElementById('tasks-grid');
  if (!grid) return;

  var tasks = state.dashboardTasks || [];
  var sorted = tasks.slice().sort(function(a, b) {
    return new Date(b.created_at) - new Date(a.created_at);
  });

  var h = '';
  sorted.forEach(function(t) {
    var tplName = '—';
    if (t.template_id) {
      var tpl = (state.taskTemplates || []).find(function(x) { return x.id == t.template_id; });
      if (tpl) tplName = tpl.name;
    }
    h += '<div class="task-card" onclick="navigateTo(\'#task/' + t.id + '\')">' +
      '<div class="task-card-header">' +
        '<div class="task-card-name">' + escapeHtml(t.name) + '</div>' +
        '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteTaskConfirm(\'' + t.id + '\')" title="Удалить задачу">&times;</button>' +
      '</div>' +
      '<div class="task-card-desc">' + escapeHtml(truncate(t.system_prompt, 80)) + '</div>' +
      '<div class="task-card-meta">' +
        '<span class="badge badge-info">' + escapeHtml(t.llm_model || '—') + '</span>' +
        (tplName !== '—' ? '<span class="badge badge-neutral">' + escapeHtml(tplName) + '</span>' : '') +
      '</div>' +
      '<div class="task-card-stats">' + formatDate(t.created_at) + '</div>' +
    '</div>';
  });

  // Карточка «создать новую»
  h += '<div class="task-card task-card-add" onclick="createNewTask()">+ Новая задача</div>';
  grid.innerHTML = h;
}

// --- Создание задачи ---
function createNewTask() {
  if (!state.selectedClientId) {
    showToast('Сначала выберите клиента', 'error');
    return;
  }
  renderNewTaskTemplateList();
  openModal('modal-new-task');
}

function renderNewTaskTemplateList() {
  var c = document.getElementById('new-task-template-list');
  if (!c) return;

  // Populate client filter multiselect
  populateNewTaskClientFilter();

  // Get selected client filter
  var selectedClients = getMultiselectSelected('new-task-client-ms-options');

  var tts = state.taskTemplates || [];

  // Filter by selected clients
  if (selectedClients.length > 0) {
    tts = tts.filter(function(tt) {
      var ids = tt.client_ids || [];
      if (ids.length === 0) return true; // no restriction = show for all
      return selectedClients.some(function(cid) { return ids.indexOf(cid) !== -1; });
    });
  }

  if (!tts.length) {
    c.innerHTML = '<div class="placeholder-message" style="height:80px;grid-column:1/-1;"><p>' +
      (selectedClients.length ? 'Нет шаблонов для выбранных клиентов' : 'Нет сохранённых шаблонов') + '</p></div>';
    return;
  }
  var h = '';
  tts.forEach(function(tt) {
    // Show client tags
    var clientTags = '';
    (tt.client_ids || []).forEach(function(cid) {
      var cl = (state.clients || []).find(function(c) { return c.id == cid; });
      if (cl) clientTags += '<span class="task-template-card-tag">' + escapeHtml(cl.name) + '</span>';
    });
    h += '<div class="task-template-card" onclick="createTaskFromTemplate(\'' + tt.id + '\')">' +
      '<div class="task-template-card-name">' + escapeHtml(tt.name) + '</div>' +
      '<div class="task-template-card-desc">' + escapeHtml(tt.description || '') + '</div>' +
      '<div class="task-template-card-meta">' +
        '<span class="task-template-card-tag" style="background:#EBF5FF;color:#1A5FB4;">' + escapeHtml(tt.llm_model || '—') + '</span>' +
        clientTags +
      '</div>' +
    '</div>';
  });
  c.innerHTML = h;
}

function populateNewTaskClientFilter() {
  var opts = document.getElementById('new-task-client-ms-options');
  if (!opts) return;
  if (opts.children.length > 0) return; // already populated
  var h = '';
  (state.clients || []).forEach(function(cl) {
    h += '<label class="multiselect-option"><input type="checkbox" value="' + cl.id + '" onchange="onNewTaskClientFilterChange()">' + escapeHtml(cl.name) + '</label>';
  });
  opts.innerHTML = h || '<div style="padding:8px 12px;color:#888;font-size:12px;">Нет клиентов</div>';
}

function onNewTaskClientFilterChange() {
  var selected = getMultiselectSelected('new-task-client-ms-options');
  var label = document.getElementById('new-task-client-ms-label');
  if (selected.length === 0) {
    label.textContent = 'Все клиенты';
    label.className = 'multiselect-placeholder';
  } else {
    var names = selected.map(function(id) {
      var cl = (state.clients || []).find(function(c) { return c.id == id; });
      return cl ? cl.name : '';
    }).join(', ');
    label.textContent = names;
    label.className = 'multiselect-placeholder has-selection';
  }
  renderNewTaskTemplateList();
}

function createTaskFromScratch() {
  closeModal('modal-new-task');
  var defaultFlexBlocks = [
    { key: 'h2_structure', label: 'Структура H2', type: 'repeatable', enabled: true },
    { key: 'notes', label: 'Примітки', type: 'textarea', enabled: false }
  ];
  var task = {
    client_id: state.selectedClientId,
    name: 'Нова задача',
    system_prompt: '',
    user_prompt: '',
    core_fields: { url: true, keywords: true, topic: true, language: true, volume: true },
    flex_blocks: defaultFlexBlocks,
    active_flex_blocks: ['h2_structure'],
    field_values: {},
    llm_provider: 'anthropic',
    llm_model: 'Claude Sonnet',
    options: { humanize: false, uniqueness: true, factcheck: false, ai_detector: false },
    status: 'active'
  };
  google.script.run.withSuccessHandler(function(s) {
    showToast('Задача создана', 'success');
    navigateTo('#task/' + s.id);
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).saveTask(task);
}

function createTaskFromTemplate(ttId) {
  closeModal('modal-new-task');
  var tt = (state.taskTemplates || []).find(function(x) { return String(x.id) === String(ttId); });
  if (!tt) { createTaskFromScratch(); return; }

  // Копировать flex_blocks с enabled → active_flex_blocks
  var flexBlocks = (tt.flex_blocks || []).map(function(b) {
    return { key: b.key, label: b.label, type: b.type, enabled: b.enabled };
  });
  var activeFlexBlocks = flexBlocks.filter(function(b) { return b.enabled; }).map(function(b) { return b.key; });

  // Инициализировать field_values для repeatable блоков
  var fieldValues = {};
  flexBlocks.forEach(function(b) {
    if (b.type === 'repeatable') fieldValues[b.key] = [''];
    else fieldValues[b.key] = '';
  });

  var task = {
    client_id: state.selectedClientId,
    name: tt.name,
    system_prompt: tt.system_prompt || '',
    user_prompt: tt.user_prompt || '',
    template_id: tt.id,
    core_fields: tt.core_fields || { url: true, keywords: true, topic: true, language: true, volume: true },
    flex_blocks: flexBlocks,
    active_flex_blocks: activeFlexBlocks,
    field_values: fieldValues,
    llm_provider: tt.llm_provider || 'anthropic',
    llm_model: tt.llm_model || 'Claude Sonnet',
    options: tt.options || {},
    status: 'active'
  };
  google.script.run.withSuccessHandler(function(s) {
    showToast('Задачу створено з шаблону', 'success');
    navigateTo('#task/' + s.id);
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).saveTask(task);
}

function deleteTaskConfirm(tid) {
  if (!confirm('Удалить задачу и все её тексты?')) return;
  google.script.run.withSuccessHandler(function() {
    showToast('Задача удалена', 'success');
    if (state.selectedClientId) selectClient(state.selectedClientId);
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).deleteTask(tid);
}
</script>
