<script>
// ===========================================
// scripts_dashboard.html — Дашборд (overview)
// ===========================================

// --- Head greeting (time-based) ---
function getGreeting() {
  var h = new Date().getHours();
  if (h < 6)  return 'Доброї ночі';
  if (h < 12) return 'Доброго ранку';
  if (h < 18) return 'Доброго дня';
  return 'Доброго вечора';
}

// --- Main render (called on showScreen) ---
function renderDashboardOverview() {
  var greet = document.getElementById('dashboard-greeting');
  if (greet) greet.textContent = getGreeting() + ' 👋';

  renderDashboardStats();
  renderDashboardClientsPreview();
  loadDashboardRecentTasks();
}

// --- Stats ---
function renderDashboardStats() {
  var totalTasks = 0;
  (state.clients || []).forEach(function(c) { totalTasks += (c.tasks_count || 0); });

  var setTxt = function(id, val) {
    var el = document.getElementById(id);
    if (el) el.textContent = val;
  };
  setTxt('stat-total-tasks', totalTasks);
  setTxt('stat-clients-count', (state.clients || []).length);
  setTxt('stat-templates-count', (state.taskTemplates || []).length);

  // "У роботі" — порахуємо після завантаження задач у recent
  // Тимчасово показуємо те саме що total, оновимо після fetch
  setTxt('stat-active-tasks', totalTasks);
}

// --- Clients preview row (4 cards) ---
function renderDashboardClientsPreview() {
  var section = document.getElementById('dashboard-clients-section');
  var grid = document.getElementById('dashboard-clients-grid');
  if (!section || !grid) return;

  var clients = state.clients || [];
  if (!clients.length) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';

  var preview = clients.slice(0, 4);
  var h = '';
  preview.forEach(function(cl) {
    h += '<div class="client-card" onclick="dashboardOpenClient(\'' + cl.id + '\')">' +
      '<div class="client-card-name">' + escapeHtml(cl.name) + '</div>' +
      '<div class="client-card-meta">' +
        (cl.niche ? escapeHtml(cl.niche) : '<span class="text-muted">Без ніші</span>') +
        (cl.domain ? ' · ' + escapeHtml(cl.domain) : '') +
      '</div>' +
      '<div class="client-card-stats">' +
        '<span class="badge badge-neutral">' + (cl.tasks_count || 0) + ' задач</span>' +
      '</div>' +
    '</div>';
  });
  grid.innerHTML = h;
}

function dashboardOpenClient(clientId) {
  // Stage 4 задасть filter по клієнту для #tasks
  state.filterClientId = clientId;
  navigateTo('#tasks');
}

// --- Recent tasks (cross-client) ---
function loadDashboardRecentTasks() {
  var grid = document.getElementById('dashboard-recent-grid');
  var empty = document.getElementById('dashboard-recent-empty');
  var loader = document.getElementById('dashboard-recent-loading');
  if (!grid) return;

  var clients = state.clients || [];
  if (!clients.length) {
    grid.innerHTML = '';
    if (empty) empty.style.display = 'flex';
    return;
  }

  // --- TTL-кеш: якщо дані свіжі, беремо їх миттєво ---
  if (isCacheFresh(state._allTasksFetchedAt) && state.allTasks && state.allTasks.length) {
    if (loader) loader.style.display = 'none';
    renderDashboardRecentTasks(state.allTasks);
    var totalEl = document.getElementById('stat-total-tasks');
    if (totalEl) totalEl.textContent = state.allTasks.length;
    return;
  }

  // --- Skeleton замість spinner ---
  if (loader) loader.style.display = 'none';
  grid.innerHTML = skeletonTaskCards(6);
  if (empty) empty.style.display = 'none';

  // Завантажуємо задачі по всім клієнтам паралельно
  var remaining = clients.length;
  var allTasks = [];
  var perClientCount = {};
  clients.forEach(function(cl) {
    google.script.run.withSuccessHandler(function(tasks) {
      perClientCount[cl.id] = (tasks || []).length;
      (tasks || []).forEach(function(t) {
        t._clientName = cl.name;
        t._clientId = cl.id;
        allTasks.push(t);
      });
      remaining--;
      if (remaining === 0) {
        // Кешуємо tasks_count у state.clients для sidebar
        (state.clients || []).forEach(function(c) {
          c.tasks_count = perClientCount[c.id] || 0;
        });
        // Зберігаємо у спільний кеш для #tasks сторінки
        state.allTasks = allTasks;
        state._allTasksFetchedAt = Date.now();
        updateSidebarCounts();
        // Оновити stat-total-tasks на реальні числа
        var totalEl = document.getElementById('stat-total-tasks');
        if (totalEl) totalEl.textContent = allTasks.length;
        renderDashboardClientsPreview();
        renderDashboardRecentTasks(allTasks);
      }
    }).withFailureHandler(function(e) {
      console.error('loadDashboardRecentTasks', e);
      remaining--;
      if (remaining === 0) renderDashboardRecentTasks(allTasks);
    }).getTasks(cl.id);
  });
}

function renderDashboardRecentTasks(tasks) {
  var grid = document.getElementById('dashboard-recent-grid');
  var empty = document.getElementById('dashboard-recent-empty');
  var loader = document.getElementById('dashboard-recent-loading');
  if (loader) loader.style.display = 'none';

  if (!tasks || !tasks.length) {
    if (empty) empty.style.display = 'flex';
    grid.innerHTML = '';
    return;
  }

  // Оновимо stat-active-tasks (тих що не done/archived)
  var active = tasks.filter(function(t) { return !t.status || t.status === 'active'; }).length;
  var el = document.getElementById('stat-active-tasks');
  if (el) el.textContent = active;

  // Сортуємо за датою, беремо 6 останніх
  var sorted = tasks.slice().sort(function(a, b) {
    return new Date(b.updated_at || b.created_at) - new Date(a.updated_at || a.created_at);
  }).slice(0, 6);

  var h = '';
  sorted.forEach(function(t) {
    var statusCls = 'status-progress';
    if (t.status === 'done') statusCls = 'status-done';
    else if (t.status === 'draft') statusCls = 'status-draft';
    else if (t.status === 'error') statusCls = 'status-error';

    var clientBadge = t._clientName ? '<span class="badge badge-neutral">' + escapeHtml(t._clientName) + '</span>' : '';
    var modelBadge = t.llm_model ? '<span class="badge badge-info">' + escapeHtml(t.llm_model) + '</span>' : '';
    var desc = truncate(t.system_prompt || t.description || '', 90);

    h += '<div class="task-card ' + statusCls + '" onclick="navigateTo(\'#task/' + t.id + '\')" onmouseenter="prefetchTask(\'' + t.id + '\')">' +
      '<div class="task-card-header">' +
        '<div class="task-card-name">' + escapeHtml(t.name || 'Без назви') + '</div>' +
      '</div>' +
      '<div class="task-card-desc">' + escapeHtml(desc) + '</div>' +
      '<div class="task-card-meta">' + clientBadge + modelBadge + '</div>' +
      '<div class="task-card-stats">' + formatDate(t.updated_at || t.created_at) + '</div>' +
    '</div>';
  });
  grid.innerHTML = h;
  if (empty) empty.style.display = 'none';
}

// --- Create task flow ---
function dashboardCreateTask() {
  if (!(state.clients || []).length) {
    showToast('Спочатку створіть клієнта', 'info');
    openClientModal();
    return;
  }
  renderNewTaskTemplateList();
  openModal('modal-new-task');
}

// Legacy alias used by older code
function createNewTask() {
  dashboardCreateTask();
}

function renderNewTaskTemplateList() {
  var c = document.getElementById('new-task-template-list');
  if (!c) return;

  populateNewTaskClientFilter();
  var selectedClients = getMultiselectSelected('new-task-client-ms-options');

  var tts = state.taskTemplates || [];
  if (selectedClients.length > 0) {
    tts = tts.filter(function(tt) {
      var ids = tt.client_ids || [];
      if (ids.length === 0) return true;
      return selectedClients.some(function(cid) { return ids.indexOf(cid) !== -1; });
    });
  }

  if (!tts.length) {
    c.innerHTML = '<div class="placeholder-message" style="height:80px;grid-column:1/-1;"><p>' +
      (selectedClients.length ? 'Немає шаблонів для обраних клієнтів' : 'Немає збережених шаблонів') + '</p></div>';
    return;
  }
  var h = '';
  tts.forEach(function(tt) {
    var clientTags = '';
    (tt.client_ids || []).forEach(function(cid) {
      var cl = (state.clients || []).find(function(c) { return c.id == cid; });
      if (cl) clientTags += '<span class="task-template-card-tag">' + escapeHtml(cl.name) + '</span>';
    });
    h += '<div class="task-template-card" onclick="createTaskFromTemplate(\'' + tt.id + '\')">' +
      '<div class="task-template-card-name">' + escapeHtml(tt.name) + '</div>' +
      '<div class="task-template-card-desc">' + escapeHtml(tt.description || '') + '</div>' +
      '<div class="task-template-card-meta">' +
        '<span class="task-template-card-tag" style="background:var(--primary-light); color:var(--primary);">' + escapeHtml(tt.llm_model || '—') + '</span>' +
        clientTags +
      '</div>' +
    '</div>';
  });
  c.innerHTML = h;
}

function populateNewTaskClientFilter() {
  var opts = document.getElementById('new-task-client-ms-options');
  if (!opts) return;
  if (opts.children.length > 0) return; // already populated
  var h = '';
  (state.clients || []).forEach(function(cl) {
    h += '<label class="multiselect-option"><input type="checkbox" value="' + cl.id + '" onchange="onNewTaskClientFilterChange()">' + escapeHtml(cl.name) + '</label>';
  });
  opts.innerHTML = h || '<div style="padding:8px 12px;color:var(--text-muted);font-size:12px;">Немає клієнтів</div>';
}

function onNewTaskClientFilterChange() {
  var selected = getMultiselectSelected('new-task-client-ms-options');
  var label = document.getElementById('new-task-client-ms-label');
  if (selected.length === 0) {
    label.textContent = 'Усі клієнти';
    label.className = 'multiselect-placeholder';
  } else {
    var names = selected.map(function(id) {
      var cl = (state.clients || []).find(function(c) { return c.id == id; });
      return cl ? cl.name : '';
    }).join(', ');
    label.textContent = names;
    label.className = 'multiselect-placeholder has-selection';
  }
  renderNewTaskTemplateList();
}

// --- Resolve target client for creation ---
function resolveNewTaskClientId() {
  // 1) selected in multiselect (modal-new-task own filter) → first
  var selected = getMultiselectSelected('new-task-client-ms-options');
  if (selected && selected.length === 1) return selected[0];
  if (selected && selected.length > 1) {
    showToast('Оберіть одного клієнта у фільтрі', 'error');
    return null;
  }
  // 2) filter from Tasks page (#tasks-filter-client)
  var tasksFilter = document.getElementById('tasks-filter-client');
  if (tasksFilter && tasksFilter.value) return tasksFilter.value;
  // 3) filter (from openClient) legacy
  if (state.filterClientId) return state.filterClientId;
  // 4) якщо лише один клієнт у системі — беремо його
  if ((state.clients || []).length === 1) return state.clients[0].id;
  // 5) інакше помилка
  showToast('Оберіть клієнта у фільтрі зверху', 'error');
  return null;
}

function createTaskFromScratch() {
  var clientId = resolveNewTaskClientId();
  if (!clientId) return;

  closeModal('modal-new-task');
  var defaultFlexBlocks = [
    { key: 'h2_structure', label: 'Структура H2', type: 'repeatable', enabled: true },
    { key: 'notes', label: 'Примітки', type: 'textarea', enabled: false }
  ];
  var task = {
    client_id: clientId,
    name: 'Нова задача',
    system_prompt: '',
    user_prompt: '',
    core_fields: { url: true, keywords: true, topic: true, language: true, volume: true },
    flex_blocks: defaultFlexBlocks,
    active_flex_blocks: ['h2_structure'],
    field_values: {},
    llm_provider: 'anthropic',
    llm_model: 'Claude Sonnet',
    options: { humanize: false, uniqueness: true, factcheck: false, ai_detector: false },
    status: 'active'
  };
  google.script.run.withSuccessHandler(function(s) {
    showToast('Задачу створено', 'success');
    invalidateTasksCache();
    pushRecentTask(s.id, task.name);
    navigateTo('#task/' + s.id);
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).saveTask(task);
}

function createTaskFromTemplate(ttId) {
  var clientId = resolveNewTaskClientId();
  if (!clientId) return;

  closeModal('modal-new-task');
  var tt = (state.taskTemplates || []).find(function(x) { return String(x.id) === String(ttId); });
  if (!tt) { createTaskFromScratch(); return; }

  var flexBlocks = (tt.flex_blocks || []).map(function(b) {
    return { key: b.key, label: b.label, type: b.type, enabled: b.enabled };
  });
  var activeFlexBlocks = flexBlocks.filter(function(b) { return b.enabled; }).map(function(b) { return b.key; });

  var fieldValues = {};
  flexBlocks.forEach(function(b) {
    if (b.type === 'repeatable') fieldValues[b.key] = [''];
    else fieldValues[b.key] = '';
  });

  var task = {
    client_id: clientId,
    name: tt.name,
    system_prompt: tt.system_prompt || '',
    user_prompt: tt.user_prompt || '',
    template_id: tt.id,
    core_fields: tt.core_fields || { url: true, keywords: true, topic: true, language: true, volume: true },
    flex_blocks: flexBlocks,
    active_flex_blocks: activeFlexBlocks,
    field_values: fieldValues,
    llm_provider: tt.llm_provider || 'anthropic',
    llm_model: tt.llm_model || 'Claude Sonnet',
    options: tt.options || {},
    status: 'active'
  };
  google.script.run.withSuccessHandler(function(s) {
    showToast('Задачу створено з шаблону', 'success');
    invalidateTasksCache();
    pushRecentTask(s.id, task.name);
    navigateTo('#task/' + s.id);
  }).withFailureHandler(function(e) {
    showToast(e.message, 'error');
  }).saveTask(task);
}

function deleteTaskConfirm(tid) {
  if (!confirm('Видалити задачу та всі її тексти?')) return;
  // Optimistic: видаляємо з локальних списків одразу
  state.allTasks = (state.allTasks || []).filter(function(t) { return String(t.id) !== String(tid); });
  if (typeof renderDashboardRecentTasks === 'function') renderDashboardRecentTasks(state.allTasks);

  google.script.run.withSuccessHandler(function() {
    showToast('Задачу видалено', 'success');
    invalidateTasksCache();
  }).withFailureHandler(function(e) {
    showToast('Не вдалося видалити: ' + e.message, 'error');
    invalidateTasksCache();
    if (typeof renderDashboardOverview === 'function') renderDashboardOverview();
  }).deleteTask(tid);
}

// --- Legacy no-op для сумісності (Stage 5 перевизначить) ---
function selectClient(clientId) {
  state.selectedClientId = clientId;
}
</script>
