<!-- Экран: Шаблоны задач -->
<div id="screen-task-templates" class="screen" style="display:none;">
  <div class="templates-layout">
    <!-- Левая панель: список шаблонов задач -->
    <aside class="templates-sidebar">
      <h2 class="sidebar-title">Шаблоны задач</h2>
      <input type="text" id="tt-search" class="input-field" placeholder="Поиск шаблона..." oninput="filterTaskTemplateList(this.value)">

      <div id="tt-list" class="template-list">
        <!-- Заполняется динамически -->
      </div>

      <div class="sidebar-footer">
        <button class="btn btn-block" onclick="createNewTaskTemplate()">+ Новый шаблон задачи</button>
      </div>
    </aside>

    <!-- Правая часть: редактор шаблона задачи -->
    <main class="templates-editor">
      <div id="tt-placeholder" class="placeholder-message">
        <p>Выберите шаблон задачи из списка слева или создайте новый</p>
      </div>

      <div id="tt-editor-content" style="display:none;">
        <!-- Хедер -->
        <div class="content-header">
          <div class="content-header-info">
            <input type="text" id="tt-name" class="input-title" placeholder="Название шаблона задачи">
          </div>
          <div class="content-header-actions">
            <button class="btn btn-danger" onclick="deleteCurrentTaskTemplate()">Удалить</button>
            <button class="btn btn-primary" onclick="saveCurrentTaskTemplate()">Сохранить</button>
          </div>
        </div>

        <!-- Описание -->
        <div class="field-group">
          <label class="field-label">Описание</label>
          <textarea id="tt-description" class="input-field" rows="2" placeholder="Краткое описание шаблона..."></textarea>
        </div>

        <!-- Привязка к клиентам -->
        <div class="field-group">
          <label class="field-label">Привязка к клиентам</label>
          <div class="tt-client-tags" id="tt-client-tags">
            <!-- Заполняется динамически: теги клиентов -->
          </div>
        </div>

        <!-- Колонки данных -->
        <div class="field-group">
          <div class="columns-variables-block">
            <div class="columns-variables-header">
              <span class="columns-variables-title">Колонки данных</span>
              <button class="column-add-btn" style="min-height:auto;padding:4px 12px;" onclick="openModal('modal-tt-addcolumn')">+ Колонка</button>
            </div>
            <div id="tt-columns-grid" class="columns-grid">
              <!-- Заполняется динамически -->
            </div>
          </div>
        </div>

        <!-- Настройки генерации — единый блок -->
        <div class="tt-settings-section">
          <h3 class="section-title" style="margin-bottom:16px;">Настройки генерации</h3>

          <div class="settings-tab-layout">
            <!-- Левая часть: промты -->
            <div class="settings-prompts-col">
              <!-- Шаблон промта + версия -->
              <div class="settings-template-row">
                <div class="field-group" style="flex:1;">
                  <label class="field-label">Шаблон промта</label>
                  <select id="tt-template-select" class="input-field" onchange="onTTTemplateChange()">
                  </select>
                </div>
              </div>

              <!-- Промты -->
              <div id="tt-prompt-group">
                <div class="prompts-grid">
                  <div class="prompt-block">
                    <label class="field-label">Системный промт</label>
                    <textarea id="tt-system-prompt" class="input-field textarea-mono" rows="10" placeholder="Системный промт..."></textarea>
                  </div>
                  <div class="prompt-block">
                    <label class="field-label">Пользовательский промт</label>
                    <textarea id="tt-user-prompt" class="input-field textarea-mono" rows="10" placeholder="Пользовательский промт с переменными {{url}}, {{keywords}}..."></textarea>
                  </div>
                </div>
              </div>
            </div>

            <!-- Правая часть: настройки -->
            <div class="settings-options-col">
              <!-- LLM -->
              <div class="field-group">
                <label class="field-label">LLM модель</label>
                <select id="tt-llm-select" class="input-field">
                  <option value="openai|ChatGPT (GPT-4o)">ChatGPT (GPT-4o)</option>
                  <option value="openai|ChatGPT (GPT-4o-mini)">ChatGPT (GPT-4o-mini)</option>
                  <option value="anthropic|Claude Sonnet" selected>Claude Sonnet</option>
                  <option value="anthropic|Claude Opus">Claude Opus</option>
                  <option value="perplexity|Perplexity Online">Perplexity Online</option>
                </select>
              </div>

              <!-- Постобработка -->
              <div class="field-group">
                <label class="field-label">Постобработка</label>
                <label class="checkbox-label">
                  <input type="checkbox" id="tt-opt-humanize"> Гуманизация
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="tt-opt-uniqueness" checked> Проверка уникальности
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="tt-opt-factcheck"> Фактчекинг
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" id="tt-opt-ai-detector"> AI-детектор
                </label>
              </div>

              <!-- Папка Google Drive -->
              <div class="field-group">
                <label class="field-label">Папка Google Drive</label>
                <input type="text" id="tt-drive-folder" class="input-field" placeholder="ID папки или URL">
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Модалка: Добавление колонки в шаблон задачи -->
<div id="modal-tt-addcolumn" class="modal-overlay" style="display:none;">
  <div class="modal-card" style="max-width:400px;">
    <div class="modal-header">
      <h3>Добавить колонку</h3>
      <button class="modal-close" onclick="closeModal('modal-tt-addcolumn')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Название колонки</label>
        <input type="text" id="tt-new-col-label" class="input-field" placeholder="Например: Целевая аудитория">
      </div>
      <div class="field-group">
        <label class="field-label">Тип ввода</label>
        <select id="tt-new-col-type" class="input-field">
          <option value="short">Короткий текст (одна строка)</option>
          <option value="long">Длинный текст (многострочный)</option>
        </select>
      </div>
      <div class="field-group">
        <label class="checkbox-label">
          <input type="checkbox" id="tt-new-col-required"> Обязательная колонка
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-tt-addcolumn')">Отмена</button>
      <button class="btn btn-primary" onclick="confirmAddTTColumn()">Добавить</button>
    </div>
  </div>
</div>
